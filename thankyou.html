<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=no,viewport-fit=cover,interactive-widget=resizes-content"/>
<meta name="theme-color" content="#F4F7FF"/>
<meta name="mobile-web-app-capable" content="yes"/>
<meta name="apple-mobile-web-app-capable" content="yes"/>
<meta name="apple-mobile-web-app-status-bar-style" content="default"/>
<title>Confirmed · EcoCash</title>
<link rel="icon" href="assets/econet.png">
<link rel="apple-touch-icon" href="assets/econet.png">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&family=JetBrains+Mono:wght@500;600;700&display=swap" rel="stylesheet">
<style>
*{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent;-webkit-user-select:none;user-select:none}
img{image-rendering:-webkit-optimize-contrast;-webkit-backface-visibility:hidden}
svg{shape-rendering:geometricPrecision;text-rendering:geometricPrecision}
html{-webkit-font-smoothing:antialiased;-moz-osx-font-smoothing:grayscale}
:root{
  --bg:#F4F7FF;--s1:#FFFFFF;--s2:#EEF2FA;--s3:#E2E8F6;--s4:#D4DCEF;
  --ink1:#0D1B3E;--ink2:#3A567A;--ink3:#6E8CAE;
  --line:#D0DCEF;--line2:#E8EDF8;
  --acc:#0060DF;--acc-d:#1478FF;--acc-dk:#0048B0;
  --acc-a:rgba(0,96,223,.12);--acc-b:rgba(0,96,223,.07);
  --grn:#00A046;--grn-a:rgba(0,160,70,.12);--grn-b:rgba(0,160,70,.07);--on-grn:#fff;
  --gold:#E08800;--err:#D42B3A;
  --f:'Inter',system-ui,-apple-system,sans-serif;
  --fm:'JetBrains Mono','Roboto Mono',monospace;
  --r8:8px;--r10:10px;--r12:12px;--r14:14px;--r16:16px;--r18:18px;--r20:20px;--rp:999px;
  --ease:cubic-bezier(.22,1,.36,1);--spring:cubic-bezier(.34,1.56,.64,1);--sb:0px;
  --sh1:0 1px 3px rgba(0,30,80,.08),0 1px 2px rgba(0,30,80,.06);
  --sh2:0 4px 14px rgba(0,30,80,.1),0 1px 4px rgba(0,30,80,.06);
  --sh-acc:0 4px 20px rgba(0,96,223,.3),0 1px 4px rgba(0,96,223,.18);
}
html{width:100%;height:100%;overflow:hidden;background:#F4F7FF}
body{width:100%;height:100dvh;font-family:var(--f);background:var(--bg);color:var(--ink1);-webkit-font-smoothing:antialiased;overflow:hidden;overscroll-behavior:none}

@keyframes fadeUp{from{opacity:0;transform:translateY(8px)}to{opacity:1;transform:none}}
@keyframes scaleIn{from{transform:scale(0);opacity:0}to{transform:scale(1);opacity:1}}
@keyframes drawCheck{to{stroke-dashoffset:0}}
@keyframes rip{to{transform:scale(3);opacity:0}}
@keyframes pgIn{from{opacity:0;transform:translateY(5px)}to{opacity:1;transform:none}}

.intro{position:fixed;inset:0;background:#fff;z-index:9999;pointer-events:none;transition:opacity .35s var(--ease)}
.intro.clear{opacity:0}
#fw{position:fixed;inset:0;pointer-events:none;z-index:10}

.page{display:flex;flex-direction:column;width:100%;height:100dvh;overflow:hidden;animation:pgIn .24s var(--ease) both}

/* ── HERO ── */
.hero{
  flex-shrink:0;
  background:
    radial-gradient(ellipse 70% 60% at 50% 0%,rgba(0,96,223,.1) 0%,transparent 100%),
    var(--s1);
  border-bottom:1px solid var(--line2);
  box-shadow:var(--sh1);
  padding:calc(var(--sb) + 50px) 18px 20px;
  position:relative;
  display:flex;flex-direction:column;align-items:flex-start;justify-content:flex-end;
}
.hero-top{
  position:absolute;top:calc(var(--sb) + 8px);left:18px;right:18px;
  display:flex;align-items:center;justify-content:space-between;
}
.hero-logos{display:flex;align-items:center;gap:8px}
.hero-econet{height:20px;width:auto;object-fit:contain}
.hero-div{width:1px;height:16px;background:var(--line)}
.hero-ecocash{height:18px;width:auto;object-fit:contain}
.status-chip{
  display:flex;align-items:center;gap:5px;
  background:var(--grn-a);border:1px solid rgba(0,160,70,.25);
  border-radius:var(--rp);padding:4px 10px;
  font-size:10px;font-weight:700;color:var(--grn);
}
.status-chip svg{display:block}

/* Check orb */
.check-orb{
  width:58px;height:58px;border-radius:50%;
  background:radial-gradient(circle at 30% 26%,rgba(0,160,70,.08) 0%,transparent 50%),var(--s1);
  border:2px solid rgba(0,160,70,.35);
  box-shadow:0 0 0 4px var(--grn-a),var(--sh2);
  display:flex;align-items:center;justify-content:center;
  margin-bottom:12px;flex-shrink:0;
  animation:scaleIn .45s .08s var(--spring) both;
}
.check-svg{width:26px;height:26px}
.check-path{stroke-dasharray:48;stroke-dashoffset:48;animation:drawCheck .4s .5s ease forwards}

.hero-title{font-size:22px;font-weight:800;letter-spacing:-.4px;color:var(--ink1);line-height:1.2;margin-bottom:2px;animation:fadeUp .3s .18s both}
.hero-sub{font-size:11px;color:var(--ink3);font-weight:500;animation:fadeUp .3s .25s both}
.hero-amt-row{display:flex;align-items:flex-start;gap:2px;margin-top:12px;animation:fadeUp .3s .2s both}
.hero-cur{font-family:var(--fm);font-size:13px;font-weight:500;color:var(--ink3);margin-top:7px}
.hero-amt{font-family:var(--fm);font-size:44px;font-weight:800;color:var(--acc);line-height:1;letter-spacing:-.05em;font-feature-settings:"tnum"}

/* ── SCROLL ── */
.scroll{flex:1;min-height:0;overflow-y:auto;overflow-x:hidden;background:var(--bg);scrollbar-width:none;overscroll-behavior-y:contain}
.scroll::-webkit-scrollbar{display:none}
.scroll-inner{padding:14px 14px 14px;display:flex;flex-direction:column;gap:10px}

/* ── RECEIPT ── */
.receipt{
  background:var(--s1);border:1px solid var(--line);
  border-left:3px solid var(--acc);
  border-radius:var(--r20);overflow:hidden;
  box-shadow:var(--sh1);
  animation:fadeUp .34s .05s var(--ease) both;
}
.rec-head{padding:11px 14px;border-bottom:1px solid var(--line2);display:flex;align-items:center;justify-content:space-between}
.rec-head-t{font-size:13px;font-weight:700;color:var(--ink1)}
.rec-badge{
  background:var(--grn-a);border:1px solid rgba(0,160,70,.25);
  border-radius:var(--rp);padding:3px 9px;
  font-size:10px;font-weight:700;color:var(--grn);
}
.rec-row{display:flex;align-items:center;justify-content:space-between;padding:10px 14px;border-bottom:1px solid var(--line2);opacity:0;animation:fadeUp .28s var(--ease) forwards}
.rec-row:last-child{border-bottom:none}
.rec-row:nth-child(1){animation-delay:.08s}.rec-row:nth-child(2){animation-delay:.13s}.rec-row:nth-child(3){animation-delay:.18s}.rec-row:nth-child(4){animation-delay:.23s}.rec-row:nth-child(5){animation-delay:.28s}
.rec-key{display:flex;align-items:center;gap:9px;font-size:11px;color:var(--ink2);font-weight:500}
.rec-ico{width:28px;height:28px;border-radius:8px;display:flex;align-items:center;justify-content:center;font-size:13px;flex-shrink:0}
.rec-val{font-family:var(--fm);font-size:12px;font-weight:700;color:var(--ink1);text-align:right;max-width:56%}
.rec-total{background:var(--acc-b);border-top:1px solid var(--acc-a);padding:11px 14px;display:flex;align-items:center;justify-content:space-between}
.rec-total-lbl{font-size:11px;color:var(--ink3);font-weight:500}
.rec-total-val{font-family:var(--fm);font-size:20px;font-weight:800;color:var(--acc);letter-spacing:-.03em;font-feature-settings:"tnum"}
.ref-row{display:flex;align-items:center;justify-content:space-between;padding:10px 14px;border-top:1px solid var(--line2)}
.ref-stack{display:flex;flex-direction:column;gap:1px}
.ref-lbl{font-size:9px;font-weight:700;color:var(--ink3);text-transform:uppercase;letter-spacing:.5px}
.ref-hint{font-size:9px;color:var(--ink3);opacity:.6}
.ref-val{font-family:var(--fm);font-size:11px;font-weight:700;color:var(--acc);cursor:pointer;touch-action:manipulation}
.ref-val:active{opacity:.6}
.ts-row{display:flex;align-items:center;justify-content:space-between;padding:9px 14px;border-top:1px solid var(--line2)}
.ts-lbl{font-size:9px;font-weight:700;color:var(--ink3);text-transform:uppercase;letter-spacing:.5px}
.ts-val{font-family:var(--fm);font-size:10px;font-weight:600;color:var(--ink2)}

/* Notice */
.notice{
  background:var(--s1);border:1px solid var(--line);border-left:3px solid var(--acc);
  border-radius:var(--r12);padding:11px 13px;
  font-size:11px;line-height:1.65;color:var(--ink3);font-weight:500;
  box-shadow:var(--sh1);
  animation:fadeUp .34s .1s var(--ease) both;
}
.notice strong{color:var(--ink1);font-weight:700}

/* ── ACTIONS ── */
.actions{
  flex-shrink:0;
  padding:10px 14px 10px;
  background:var(--s1);border-top:1px solid var(--line2);
  box-shadow:0 -2px 8px rgba(0,30,80,.06);
  display:flex;flex-direction:column;gap:7px;
}
.btn-p{
  width:100%;min-height:50px;padding:0 16px;border:none;border-radius:var(--r18);
  background:var(--acc);color:#fff;font-family:var(--f);font-size:14px;font-weight:700;
  cursor:pointer;touch-action:manipulation;
  box-shadow:var(--sh-acc);
  transition:transform .12s var(--spring);position:relative;overflow:hidden;outline:none;
}
.btn-p:active{transform:scale(.97);background:var(--acc-dk)}
.btn-o{
  width:100%;min-height:44px;padding:0 16px;border:none;border-radius:var(--r18);
  background:var(--s2);border:1.5px solid var(--line);color:var(--ink2);
  font-family:var(--f);font-size:13px;font-weight:600;
  cursor:pointer;touch-action:manipulation;outline:none;
  position:relative;overflow:hidden;transition:background .12s;
}
.btn-o:active{background:var(--s3)}
.rip{position:absolute;border-radius:50%;pointer-events:none;background:rgba(0,96,223,.1);transform:scale(0);animation:rip .5s ease forwards}

/* ── FOOTER ── */
.eco-footer{
  flex-shrink:0;
  background:var(--s1);border-top:2px solid var(--acc);
  padding:9px 16px max(10px,env(safe-area-inset-bottom));
  display:flex;align-items:center;justify-content:center;gap:8px;
}
.eco-footer-txt{font-size:11px;font-weight:600;letter-spacing:.5px;text-transform:uppercase;color:var(--ink2)}
.eco-footer-logo{height:18px;width:auto;object-fit:contain}
</style>
</head>
<body>
<div class="intro" id="intro"></div>
<canvas id="fw"></canvas>

<div class="page">

  <div class="hero">
    <div class="hero-top">
      <div class="hero-logos">
        <img class="hero-econet" src="assets/econet.png" alt="Econet">
        <div class="hero-div"></div>
        <img class="hero-ecocash" src="assets/ecocash.png" alt="EcoCash">
      </div>
      <div class="status-chip">
        <svg width="11" height="11" viewBox="0 0 24 24" fill="var(--grn)"><path d="M12 2C6.48 2 2 6.48 2 12s4.48 10 10 10 10-4.48 10-10S17.52 2 12 2zm-2 15l-5-5 1.41-1.41L10 14.17l7.59-7.59L19 8l-9 9z"/></svg>
        Confirmed
      </div>
    </div>

    <div class="check-orb">
      <svg class="check-svg" viewBox="0 0 28 28" fill="none">
        <path class="check-path" d="M4 14 L10.5 20.5 L24 7" stroke="var(--grn)" stroke-width="3" stroke-linecap="round" stroke-linejoin="round"/>
      </svg>
    </div>
    <div class="hero-title" id="heroTitle">Bundle Activated!</div>
    <div class="hero-sub">Your services are live · Instant activation</div>
    <div class="hero-amt-row">
      <span class="hero-cur">USD</span>
      <span class="hero-amt" id="heroAmt">0.00</span>
    </div>
  </div>

  <div class="scroll">
    <div class="scroll-inner">

      <div class="receipt">
        <div class="rec-head">
          <div class="rec-head-t">Bundle Receipt</div>
          <div class="rec-badge">✓ Confirmed</div>
        </div>
        <div id="recRows"></div>
        <div class="rec-total">
          <div class="rec-total-lbl">Total charged</div>
          <div class="rec-total-val" id="recTotal">USD 0.00</div>
        </div>
        <div class="ref-row">
          <div class="ref-stack">
            <div class="ref-lbl">Reference</div>
            <div class="ref-hint">Tap to copy</div>
          </div>
          <div class="ref-val" id="refVal" onclick="copyRef()">—</div>
        </div>
        <div class="ts-row">
          <div class="ts-lbl">Date &amp; Time</div>
          <div class="ts-val" id="tsVal">—</div>
        </div>
      </div>

      <div class="notice">Bundle is now active. For support dial <strong>*143#</strong> or contact Econet via official channels.</div>

    </div>
  </div>

  <div class="actions">
    <button class="btn-p" onclick="buyAnother()">Buy Another Bundle</button>
    <button class="btn-o" onclick="goHome()">Done</button>
  </div>

  <div class="eco-footer">
    <span class="eco-footer-txt">Powered by</span>
    <img class="eco-footer-logo" src="assets/ecocash.png" alt="EcoCash">
  </div>

</div>

<script>
'use strict';
(function(){
  var h=0;
  if(window.screen&&screen.availTop>0)h=screen.availTop;
  else if(window.visualViewport&&visualViewport.offsetTop>0)h=visualViewport.offsetTop;
  if(h)document.documentElement.style.setProperty('--sb',h+'px');
})();
function hap(t){if(!navigator.vibrate)return;try{navigator.vibrate(t);}catch(e){}}

function copyRef(){
  var el=document.getElementById('refVal');if(!el)return;
  var ref=el.dataset.ref||el.textContent;
  navigator.clipboard&&navigator.clipboard.writeText(ref).catch(function(){});
  var orig=el.textContent;el.textContent='Copied!';el.style.color='var(--grn)';
  setTimeout(function(){el.textContent=orig;el.style.color='';},1600);hap(8);
}
function goHome(){['selectedPlan','ecoRecipient','ecoTxn','ecoCorrelator'].forEach(function(k){sessionStorage.removeItem(k);});window.location.href='index.html';}
function buyAnother(){['selectedPlan','ecoTxn','ecoCorrelator'].forEach(function(k){sessionStorage.removeItem(k);});window.location.href='index.html';}

requestAnimationFrame(function(){requestAnimationFrame(function(){var i=document.getElementById('intro');if(i)i.classList.add('clear');});});

(function(){
  var plan={},recip=null,txn=null;
  try{plan=JSON.parse(sessionStorage.getItem('selectedPlan')||'{}');}catch(e){}
  try{recip=JSON.parse(sessionStorage.getItem('ecoRecipient')||'null');}catch(e){}
  try{txn=JSON.parse(sessionStorage.getItem('ecoTxn')||'null');}catch(e){}
  if(!plan.amount){document.getElementById('heroAmt').textContent='0.00';document.getElementById('heroTitle').textContent='No Transaction';return;}
  document.getElementById('heroAmt').textContent=plan.amount||'0.00';
  document.getElementById('recTotal').textContent='USD '+(plan.amount||'0.00');
  if(plan.duration)document.getElementById('heroTitle').textContent=plan.duration+' Bundle Activated!';
  var ref=(txn&&txn.correlator)||('ECX-'+Date.now().toString(36).toUpperCase().slice(-7));
  var refEl=document.getElementById('refVal');refEl.textContent=ref;refEl.dataset.ref=ref;
  var ts=txn&&txn.timestamp?new Date(txn.timestamp):new Date();
  document.getElementById('tsVal').textContent=
    ts.toLocaleDateString('en-ZW',{day:'numeric',month:'short',year:'numeric'})+
    ' · '+ts.toLocaleTimeString('en-ZW',{hour:'2-digit',minute:'2-digit'});
  var rows=[
    recip?['📱','rgba(0,160,70,.09)','rgba(0,160,70,.2)','Delivered to',recip.display]:null,
    ['📦','rgba(0,96,223,.07)','rgba(0,96,223,.15)','Bundle',(plan.duration||'')+' Mix Bundle'],
    ['📞','rgba(0,96,223,.07)','rgba(0,96,223,.15)','Voice',(plan.voice||0)+' Minutes'],
    ['💬','rgba(0,96,223,.07)','rgba(0,96,223,.15)','SMS',(plan.sms||0)+' SMS'],
    ['🌐','rgba(0,160,70,.09)','rgba(0,160,70,.2)','Data',(plan.data||0)+' GB'],
  ].filter(Boolean);
  var html='';
  rows.forEach(function(r){
    html+='<div class="rec-row"><div class="rec-key"><div class="rec-ico" style="background:'+r[1]+';border:1px solid '+r[2]+'">'+r[0]+'</div>'+r[3]+'</div><div class="rec-val">'+r[4]+'</div></div>';
  });
  document.getElementById('recRows').innerHTML=html;
  hap([10,50,10]);
  document.querySelectorAll('.btn-p,.btn-o').forEach(function(b){
    b.addEventListener('pointerdown',function(e){
      var r=b.getBoundingClientRect(),sz=Math.max(r.width,r.height)*2;
      var rip=document.createElement('span');rip.className='rip';
      rip.style.cssText='width:'+sz+'px;height:'+sz+'px;left:'+(e.clientX-r.left-sz/2)+'px;top:'+(e.clientY-r.top-sz/2)+'px;position:absolute;';
      b.appendChild(rip);rip.addEventListener('animationend',function(){rip.remove();});
    },{passive:true});
  });
})();

/* Fireworks */
(function(){
  var cv=document.getElementById('fw'),ctx=cv.getContext('2d');
  var C=['#0060DF','#1478FF','#00A046','#E08800','#0D1B3E'];
  function rs(){cv.width=innerWidth;cv.height=innerHeight;}rs();
  window.addEventListener('resize',rs,{passive:true});
  var pts=[];
  function P(x,y){var a=Math.random()*Math.PI*2,sp=2+Math.random()*5;this.x=x;this.y=y;this.vx=Math.cos(a)*sp;this.vy=Math.sin(a)*sp-Math.random()*1.5;this.a=.85;this.d=.013+Math.random()*.012;this.c=C[0|Math.random()*C.length];this.sz=1+Math.random()*2;}
  P.prototype.update=function(){this.vx*=.97;this.vy=this.vy*.97+.08;this.x+=this.vx;this.y+=this.vy;this.a-=this.d;};
  P.prototype.draw=function(){if(this.a<=0)return;ctx.save();ctx.globalAlpha=this.a;ctx.fillStyle=this.c;ctx.beginPath();ctx.arc(this.x,this.y,this.sz,0,Math.PI*2);ctx.fill();ctx.restore();};
  function burst(x,y){for(var i=0;i<35;i++)pts.push(new P(x,y));}
  function loop(){ctx.clearRect(0,0,cv.width,cv.height);for(var i=pts.length-1;i>=0;i--){pts[i].update();pts[i].draw();if(pts[i].a<=0)pts.splice(i,1);}if(pts.length)requestAnimationFrame(loop);else{try{cv.parentNode.removeChild(cv);}catch(e){}}}
  [[.25,.28],[.5,.14],[.75,.26],[.4,.48],[.6,.4]].forEach(function(p,i){
    setTimeout(function(){burst(cv.width*p[0],cv.height*p[1]);if(i===0)requestAnimationFrame(loop);},i*320+80);
  });
  setTimeout(function(){try{cv.parentNode.removeChild(cv);}catch(e){}},4500);
})();
</script>
</body>
</html>
