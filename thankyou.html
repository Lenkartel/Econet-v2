<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=no,viewport-fit=cover"/>
<meta name="theme-color" content="#10B981"/>
<title>Confirmed · EcoCash</title>
<link rel="icon" href="assets/econet.png">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:opsz,wght@9..40,300;9..40,400;9..40,500;9..40,600;9..40,700&family=DM+Mono:wght@400;500;600&display=swap" rel="stylesheet">
<style>
*{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent}
:root{
  --blue:#005F8E;--blue2:#004470;--blue3:#003558;
  --bg:#F2F6FA;--card:#FFFFFF;--line:rgba(0,0,0,.07);
  --t1:#0A1628;--t2:#2D3F55;--t3:#5C7088;--t4:#9BAABB;
  --ok:#10B981;--ok2:#059669;
  --vc:#E8335A;--sc:#7C3AED;--dc:#0284C7;
  --f:'DM Sans',system-ui,sans-serif;--fm:'DM Mono',monospace;
  --rp:999px;--r12:12px;--r16:16px;--r20:20px;--r24:24px;
  --sp:cubic-bezier(.34,1.56,.64,1);--ease:cubic-bezier(.2,0,0,1);
  --elev1:0 1px 3px rgba(0,0,0,.08),0 1px 2px rgba(0,0,0,.05);
  --elev2:0 4px 16px rgba(0,0,0,.1),0 2px 6px rgba(0,0,0,.05);
}
@media(prefers-reduced-motion:reduce){*{animation-duration:.01ms!important;transition-duration:.01ms!important}}
html,body{width:100%;height:100dvh;overflow:hidden;font-family:var(--f);background:var(--ok);color:var(--t1);-webkit-font-smoothing:antialiased}

/* Curtain fade out on load */
.intro-curtain{position:fixed;inset:0;background:var(--blue);z-index:9999;pointer-events:none;transition:opacity .5s var(--ease)}
.intro-curtain.clear{opacity:0}

/* Canvas */
#fwCanvas{position:fixed;inset:0;pointer-events:none;z-index:100}

/* ── Screen ── */
@keyframes pageIn{from{opacity:0;transform:translateY(16px)}to{opacity:1;transform:none}}
.screen{display:flex;flex-direction:column;width:100%;height:100dvh;overflow:hidden;animation:pageIn .4s var(--ease) both}

/* ── Success header ── */
.success-hdr{
  flex-shrink:0;
  background:linear-gradient(160deg,var(--ok2) 0%,var(--ok) 100%);
  padding:max(14px,env(safe-area-inset-top)) 20px 24px;
  position:relative;overflow:hidden;
}
.success-hdr::before{content:'';position:absolute;top:-40px;right:-40px;width:200px;height:200px;border-radius:50%;background:rgba(255,255,255,.06);pointer-events:none}
.success-hdr::after{content:'';position:absolute;bottom:-60px;left:-30px;width:240px;height:240px;border-radius:50%;background:rgba(255,255,255,.04);pointer-events:none}

.hdr-top{display:flex;align-items:center;justify-content:space-between;margin-bottom:24px;position:relative;z-index:1}
.brand{display:flex;align-items:center;gap:10px}
.brand img{height:17px;object-fit:contain;filter:brightness(0)invert(1)}
.brand-sep{width:1px;height:13px;background:rgba(255,255,255,.3)}
.confirmed-pill{background:rgba(255,255,255,.18);border:1px solid rgba(255,255,255,.25);border-radius:var(--rp);padding:6px 14px;font-size:12px;font-weight:700;color:#fff;letter-spacing:.2px;display:flex;align-items:center;gap:6px}
.confirmed-pill-dot{width:7px;height:7px;border-radius:50%;background:#fff;animation:pulse2 2s ease-in-out infinite}
@keyframes pulse2{0%,100%{opacity:.4}50%{opacity:1}}

/* Big checkmark */
.check-wrap{display:flex;align-items:center;gap:20px;position:relative;z-index:1}
.check-circle{
  width:60px;height:60px;border-radius:50%;flex-shrink:0;
  background:rgba(255,255,255,.2);border:2px solid rgba(255,255,255,.3);
  display:flex;align-items:center;justify-content:center;
  animation:checkPop .6s .15s var(--sp) both;
}
@keyframes checkPop{from{transform:scale(0);opacity:0}to{transform:scale(1);opacity:1}}
.check-svg{width:28px;height:28px}
.check-path{stroke-dasharray:50;stroke-dashoffset:50;animation:drawCheck .5s .5s ease forwards}
@keyframes drawCheck{to{stroke-dashoffset:0}}
.check-text{flex:1}
.check-title{font-size:22px;font-weight:700;color:#fff;letter-spacing:-.3px;line-height:1.2;animation:fadeUp .4s .3s both}
.check-sub{font-size:13px;color:rgba(255,255,255,.6);margin-top:4px;animation:fadeUp .4s .45s both}
@keyframes fadeUp{from{opacity:0;transform:translateY(8px)}to{opacity:1;transform:none}}

/* Amount */
.amount-row{display:flex;align-items:flex-start;gap:4px;margin-top:18px;position:relative;z-index:1;animation:fadeUp .4s .35s both}
.amount-cur{font-family:var(--fm);font-size:16px;color:rgba(255,255,255,.5);margin-top:8px}
.amount-val{font-family:var(--fm);font-size:52px;font-weight:700;color:#fff;line-height:1;letter-spacing:-.04em;font-feature-settings:"tnum"}

/* ── Body ── */
.body{
  flex:1;background:var(--bg);border-radius:24px 24px 0 0;margin-top:-1px;
  overflow-y:auto;overflow-x:hidden;padding:16px 16px max(120px,calc(108px + env(safe-area-inset-bottom)));
  scrollbar-width:none;overscroll-behavior:contain;
}
.body::-webkit-scrollbar{display:none}

/* ── Receipt card ── */
@keyframes cardIn{from{opacity:0;transform:translateY(12px)}to{opacity:1;transform:none}}
.receipt-card{background:var(--card);border-radius:var(--r16);border:1px solid var(--line);box-shadow:var(--elev1);overflow:hidden;margin-bottom:12px;animation:cardIn .4s .1s var(--ease) both}

.receipt-hdr{padding:14px 16px;border-bottom:1px solid var(--line);display:flex;align-items:center;justify-content:space-between}
.receipt-hdr-title{font-size:15px;font-weight:700;color:var(--t1)}
.receipt-badge{background:rgba(16,185,129,.1);border:1px solid rgba(16,185,129,.2);border-radius:var(--rp);padding:5px 11px;font-size:11px;font-weight:700;color:var(--ok);letter-spacing:.2px;animation:badgePop .5s .4s var(--sp) both}
@keyframes badgePop{from{transform:scale(.8);opacity:0}to{transform:scale(1);opacity:1}}

.receipt-row{display:flex;align-items:center;justify-content:space-between;padding:12px 16px;border-bottom:1px solid var(--line)}
.receipt-row:last-child{border-bottom:none}
.receipt-row-key{display:flex;align-items:center;gap:10px;font-size:13px;color:var(--t3)}
.receipt-row-icon{width:28px;height:28px;border-radius:8px;display:flex;align-items:center;justify-content:center;font-size:14px;flex-shrink:0}
.receipt-row-val{font-family:var(--fm);font-size:13px;font-weight:700;color:var(--t1);text-align:right;max-width:55%}

.receipt-total{background:linear-gradient(135deg,var(--blue) 0%,var(--blue2) 100%);padding:14px 16px;display:flex;align-items:center;justify-content:space-between}
.receipt-total-lbl{font-size:13px;color:rgba(255,255,255,.55);font-weight:500}
.receipt-total-val{font-family:var(--fm);font-size:24px;font-weight:700;color:#fff;letter-spacing:-.02em;font-feature-settings:"tnum"}

/* Reference row */
.ref-row{display:flex;align-items:center;justify-content:space-between;padding:11px 16px;background:var(--bg);border-top:1px solid var(--line)}
.ref-left{display:flex;flex-direction:column;gap:2px}
.ref-label{font-size:10px;font-weight:700;color:var(--t4);text-transform:uppercase;letter-spacing:.5px}
.ref-hint{font-size:10px;color:var(--t4)}
.ref-val{font-family:var(--fm);font-size:12px;font-weight:700;color:var(--blue);cursor:pointer;letter-spacing:.05em;padding:4px 0}

/* Timestamp */
.ts-row{display:flex;align-items:center;justify-content:space-between;padding:10px 16px;border-top:1px solid var(--line)}
.ts-label{font-size:10px;font-weight:700;color:var(--t4);text-transform:uppercase;letter-spacing:.5px}
.ts-val{font-family:var(--fm);font-size:12px;font-weight:600;color:var(--t2)}

/* Notice */
.notice{background:var(--card);border-radius:var(--r12);border:1px solid var(--line);border-left:4px solid var(--ok);padding:12px 14px;margin-bottom:12px;font-size:13px;line-height:1.65;color:var(--t2);box-shadow:var(--elev1);animation:cardIn .4s .2s var(--ease) both}
.notice strong{color:var(--t1);font-weight:700}

/* Bottom actions */
.actions{display:flex;flex-direction:column;gap:8px;animation:cardIn .4s .25s var(--ease) both}
.btn-primary{width:100%;min-height:52px;padding:14px;border-radius:var(--r16);border:none;background:linear-gradient(135deg,var(--blue) 0%,var(--blue2) 100%);color:#fff;font-family:var(--f);font-size:15px;font-weight:700;cursor:pointer;box-shadow:0 4px 16px rgba(0,95,142,.28);transition:transform .14s var(--sp),box-shadow .15s;position:relative;overflow:hidden;outline:none}
.btn-primary:active{transform:scale(.97);box-shadow:0 2px 8px rgba(0,95,142,.18)}
.btn-outlined{width:100%;min-height:50px;padding:13px;border-radius:var(--r16);border:2px solid var(--line);background:var(--card);font-family:var(--f);font-size:15px;font-weight:600;color:var(--t2);cursor:pointer;transition:background .14s,border-color .14s;outline:none}
.btn-outlined:active{background:var(--bg);border-color:rgba(0,0,0,.12)}

.powered{text-align:center;padding:12px 0 4px;font-size:10px;color:var(--t4);letter-spacing:.3px}

/* Ripple */
.rip{position:absolute;border-radius:50%;pointer-events:none;background:rgba(255,255,255,.28);transform:scale(0);animation:rip .5s ease forwards}
@keyframes rip{to{transform:scale(4);opacity:0}}

/* Sticky action bar */
.action-bar{position:fixed;bottom:0;left:0;right:0;padding:10px 16px max(20px,env(safe-area-inset-bottom));background:rgba(242,246,250,.97);backdrop-filter:blur(12px);-webkit-backdrop-filter:blur(12px);border-top:1px solid var(--line);z-index:50;display:flex;flex-direction:column;gap:8px}
</style>
</head>
<body>
<div class="intro-curtain" id="introCurtain"></div>
<canvas id="fwCanvas"></canvas>

<div class="screen">

  <!-- Success header -->
  <div class="success-hdr">
    <div class="hdr-top">
      <div class="brand">
        <img src="assets/econet.png" alt="Econet">
        <div class="brand-sep"></div>
        <img src="assets/ecocash.png" alt="EcoCash">
      </div>
      <div class="confirmed-pill">
        <div class="confirmed-pill-dot"></div>
        Confirmed
      </div>
    </div>

    <div class="check-wrap">
      <div class="check-circle">
        <svg class="check-svg" viewBox="0 0 28 28" fill="none">
          <path class="check-path" d="M5 14 L11 20 L23 8" stroke="white" stroke-width="3" stroke-linecap="round" stroke-linejoin="round"/>
        </svg>
      </div>
      <div class="check-text">
        <div class="check-title" id="checkTitle">Bundle Activated!</div>
        <div class="check-sub">Services are ready to use</div>
      </div>
    </div>

    <div class="amount-row">
      <span class="amount-cur">USD</span>
      <span class="amount-val" id="heroAmt">0.00</span>
    </div>
  </div>

  <!-- Body -->
  <div class="body">

    <div class="receipt-card">
      <div class="receipt-hdr">
        <div class="receipt-hdr-title">Bundle Receipt</div>
        <div class="receipt-badge">✓ Confirmed</div>
      </div>

      <div id="receiptRows"></div>

      <div class="receipt-total">
        <div class="receipt-total-lbl">Total charged</div>
        <div class="receipt-total-val" id="receiptTotal">USD 0.00</div>
      </div>

      <div class="ref-row">
        <div class="ref-left">
          <div class="ref-label">Reference</div>
          <div class="ref-hint">Tap to copy</div>
        </div>
        <div class="ref-val" id="refVal" onclick="copyRef()">—</div>
      </div>

      <div class="ts-row">
        <div class="ts-label">Date &amp; Time</div>
        <div class="ts-val" id="tsVal">—</div>
      </div>
    </div>

    <div class="notice">
      Your bundle is now active. Services available within moments. Contact Econet on <strong>*143#</strong> or official channels for any issues.
    </div>

    <div style="height:130px"></div>
  </div>

  <!-- Fixed bottom buttons -->
  <div class="action-bar">
    <button class="btn-primary" id="buyAgainBtn" onclick="buyAnother()">Buy Another Bundle</button>
    <button class="btn-outlined" onclick="goHome()">Done</button>
  </div>

</div>

<script>
function haptic(s){if(!navigator.vibrate)return;const m={light:8,med:18,ok:[10,50,10]};try{navigator.vibrate(m[s]||10)}catch(e){}}

/* ── Init ── */
(function(){
  // Fade out curtain
  const c=document.getElementById('introCurtain');
  requestAnimationFrame(()=>requestAnimationFrame(()=>c.classList.add('clear')));

  let plan={},recip=null,txn=null;
  try{plan=JSON.parse(sessionStorage.getItem('selectedPlan')||'{}')}catch(e){}
  try{recip=JSON.parse(sessionStorage.getItem('ecoRecipient')||'null')}catch(e){}
  try{txn=JSON.parse(sessionStorage.getItem('ecoTxn')||'null')}catch(e){}

  if(!plan.amount){setTimeout(()=>window.location.replace('index.html'),600);return}

  // Hero
  document.getElementById('heroAmt').textContent=plan.amount||'0.00';
  document.getElementById('receiptTotal').textContent='USD '+(plan.amount||'0.00');
  if(plan.duration)document.getElementById('checkTitle').textContent=plan.duration+' Bundle Activated!';

  // Reference
  const ref=(txn&&txn.correlator)||('ECX-'+Date.now().toString(36).toUpperCase().slice(-6)+'-'+(plan.duration||'BND').toUpperCase().slice(0,3));
  const refEl=document.getElementById('refVal');
  refEl.textContent=ref;refEl.dataset.ref=ref;

  // Timestamp
  const ts=txn?.timestamp?new Date(txn.timestamp):new Date();
  document.getElementById('tsVal').textContent=
    ts.toLocaleDateString('en-ZW',{day:'numeric',month:'short',year:'numeric'})
    +' · '+ts.toLocaleTimeString('en-ZW',{hour:'2-digit',minute:'2-digit'});

  // Receipt rows
  const rows=document.getElementById('receiptRows');
  const defs=[
    recip?['👤','#F0FDF4','var(--ok)','Delivered to',recip.display]:null,
    ['📦','#EFF6FF','var(--blue)','Bundle',plan.duration+' Mix Bundle'],
    ['📞','#FEF2F2','var(--vc)','Voice',(plan.voice||0)+' Minutes'],
    ['💬','#F5F3FF','var(--sc)','SMS',(plan.sms||0)+' SMS'],
    ['🌐','#F0FDF4','var(--dc)','Data',(plan.data||0)+' GB'],
  ].filter(Boolean);

  rows.innerHTML=defs.map(([icon,bg,color,key,val])=>`
    <div class="receipt-row">
      <div class="receipt-row-key">
        <div class="receipt-row-icon" style="background:${bg};color:${color}">${icon}</div>
        ${key}
      </div>
      <div class="receipt-row-val">${val}</div>
    </div>`).join('');

  haptic('ok');
})();

/* ── Copy ref ── */
function copyRef(){
  const el=document.getElementById('refVal'),ref=el.dataset.ref||el.textContent;
  navigator.clipboard?.writeText(ref).catch(()=>{});
  const orig=el.textContent;el.textContent='Copied!';el.style.color='var(--ok)';
  setTimeout(()=>{el.textContent=orig;el.style.color=''},1800);
  haptic('light');
}

/* ── Navigation ── */
function goHome(){
  ['selectedPlan','ecoRecipient','ecoTxn','ecoCorrelator'].forEach(k=>sessionStorage.removeItem(k));
  window.location.href='index.html';
}
function buyAnother(){
  // Keep recipient so index can prefill it next time
  sessionStorage.removeItem('selectedPlan');
  sessionStorage.removeItem('ecoTxn');
  sessionStorage.removeItem('ecoCorrelator');
  window.location.href='index.html';
}

/* ── Ripple ── */
document.querySelectorAll('.btn-primary,.btn-outlined').forEach(btn=>{
  btn.addEventListener('pointerdown',e=>{
    const r=btn.getBoundingClientRect(),sz=Math.max(r.width,r.height)*2;
    const rip=document.createElement('span');rip.className='rip';
    rip.style.cssText=`width:${sz}px;height:${sz}px;left:${e.clientX-r.left-sz/2}px;top:${e.clientY-r.top-sz/2}px`;
    btn.appendChild(rip);rip.addEventListener('animationend',()=>rip.remove());
  },{passive:true});
});

/* ── Fireworks ── */
(function(){
  const canvas=document.getElementById('fwCanvas'),ctx=canvas.getContext('2d');
  const COLS=['#fff','#FFE082','#A5D6A7','#90CAF9','#CE93D8','#FFCC02','#80DEEA','#4ADE80'];
  function resize(){canvas.width=innerWidth;canvas.height=innerHeight}
  resize();window.addEventListener('resize',resize,{passive:true});
  class Shell{
    constructor(){this.x=innerWidth*(0.15+Math.random()*.7);this.y=innerHeight;this.vy=-(10+Math.random()*9);this.vx=(Math.random()-.5)*2;this.peakY=innerHeight*(0.08+Math.random()*.35);this.exploded=false;this.trail=[];this.color=COLS[0|Math.random()*COLS.length]}
    update(){if(this.exploded)return;this.vy+=0.34;this.x+=this.vx;this.y+=this.vy;this.trail.push({x:this.x,y:this.y,a:1});if(this.trail.length>10)this.trail.shift();this.trail.forEach(t=>t.a*=.78);if(this.vy>=0||this.y<=this.peakY){this.exploded=true;burst(this)}}
    draw(){this.trail.forEach(t=>{ctx.save();ctx.globalAlpha=t.a*.5;ctx.fillStyle=this.color;ctx.beginPath();ctx.arc(t.x,t.y,2,0,Math.PI*2);ctx.fill();ctx.restore()})}
  }
  class Particle{
    constructor(x,y,color,star){const a=Math.random()*Math.PI*2,sp=star?(1.8+Math.random()*5):(1.4+Math.random()*6.2);this.x=x;this.y=y;this.vx=Math.cos(a)*sp;this.vy=Math.sin(a)*sp;this.alpha=1;this.decay=.01+Math.random()*.013;this.gravity=star?.05:.09;this.color=color;this.size=star?2.2:1.4+Math.random()*2;this.star=star;this.trail=[]}
    update(){this.trail.push({x:this.x,y:this.y});if(this.trail.length>7)this.trail.shift();this.vx*=.985;this.vy=this.vy*.985+this.gravity;this.x+=this.vx;this.y+=this.vy;this.alpha-=this.decay}
    draw(){if(this.alpha<=0)return;this.trail.forEach((t,i)=>{ctx.save();ctx.globalAlpha=(i/this.trail.length)*this.alpha*.35;ctx.fillStyle=this.color;ctx.beginPath();ctx.arc(t.x,t.y,this.size*.5,0,Math.PI*2);ctx.fill();ctx.restore()});ctx.save();ctx.globalAlpha=this.alpha;ctx.fillStyle=this.color;if(this.star){ctx.shadowBlur=8;ctx.shadowColor=this.color}ctx.beginPath();ctx.arc(this.x,this.y,this.size,0,Math.PI*2);ctx.fill();ctx.restore()}
    get dead(){return this.alpha<=0}
  }
  const shells=[],particles=[];
  function burst(s){
    const cnt=50+0|Math.random()*45,star=Math.random()<.4,c2=COLS[0|Math.random()*COLS.length];
    for(let i=0;i<cnt;i++)particles.push(new Particle(s.x,s.y,i%3===0?c2:s.color,star));
    for(let i=0;i<16;i++){const p=new Particle(s.x,s.y,'#fff',true);const a=(i/16)*Math.PI*2,sp=3+Math.random()*2;p.vx=Math.cos(a)*sp;p.vy=Math.sin(a)*sp;p.size=1;p.decay=.022;particles.push(p)}
    haptic('light');
  }
  let running=true;
  function loop(){
    if(!running)return;ctx.clearRect(0,0,canvas.width,canvas.height);
    shells.forEach(s=>{s.update();s.draw()});
    for(let i=particles.length-1;i>=0;i--){particles[i].update();particles[i].draw();if(particles[i].dead)particles.splice(i,1)}
    if(shells.some(s=>!s.dead)||particles.length>0)requestAnimationFrame(loop);
    else{ctx.clearRect(0,0,canvas.width,canvas.height);canvas.style.display='none'}
  }
  [200,580,940,1340,1760,2240].forEach(d=>setTimeout(()=>shells.push(new Shell()),d));
  setTimeout(loop,150);
  setTimeout(()=>{running=false;try{canvas.parentNode.removeChild(canvas)}catch(e){}},6000);
})();
</script>
</body>
</html>
