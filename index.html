<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=no,viewport-fit=cover"/>
<meta name="theme-color" content="#0A1628"/>
<title>EcoCash Mix</title>
<link rel="icon" href="assets/econet.png">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&family=JetBrains+Mono:wght@500;600;700&display=swap" rel="stylesheet">
<style>
*{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent}
input{-webkit-user-select:text!important;user-select:text!important}
button,div,span,label{-webkit-user-select:none;user-select:none}

:root{
  /* Palette */
  --night:#0A1628;
  --night2:#111E35;
  --night3:#172240;
  --night4:#1E2E50;
  --glass:rgba(255,255,255,.04);
  --glass2:rgba(255,255,255,.07);
  --rim:rgba(255,255,255,.08);
  --rim2:rgba(255,255,255,.14);
  --cyan:#00D4FF;
  --cyan2:rgba(0,212,255,.15);
  --cyan3:rgba(0,212,255,.06);
  --green:#00E5A0;
  --green2:rgba(0,229,160,.12);
  --red:#FF4D6D;
  --red2:rgba(255,77,109,.12);
  --purple:#B47FFF;
  --purple2:rgba(180,127,255,.12);
  --gold:#FFB800;
  --t1:#F0F6FF;
  --t2:#A8BECE;
  --t3:#5C7A8E;
  --err:#FF4D6D;
  --ok:#00E5A0;
  --f:'Inter',system-ui,sans-serif;
  --fm:'JetBrains Mono',monospace;
  --r8:8px;--r12:12px;--r16:16px;--r20:20px;--r24:24px;--rp:999px;
  --spring:cubic-bezier(.34,1.56,.64,1);
  --ease:cubic-bezier(.22,1,.36,1);
  --sb:24px;
}

html,body{
  font-family:var(--f);background:var(--night);color:var(--t1);
  -webkit-font-smoothing:antialiased;min-height:100dvh;overflow-x:hidden;
}

/* ── Curtain ── */
.curtain{position:fixed;inset:0;z-index:9999;pointer-events:none;background:var(--night);opacity:0;transition:opacity .3s;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:18px}
.curtain.show{opacity:1;pointer-events:auto}
.c-logo{display:flex;align-items:center;gap:10px;padding:8px 18px;border-radius:var(--rp);background:var(--glass2);border:1px solid var(--rim)}
.c-logo img{height:14px;filter:brightness(0)invert(1);object-fit:contain}
.c-logo-sep{width:1px;height:11px;background:var(--rim2)}
@keyframes spin{to{transform:rotate(360deg)}}
@keyframes livepulse{0%,100%{opacity:.3}50%{opacity:1}}
.c-spin{width:32px;height:32px;border:2px solid var(--rim);border-top-color:var(--cyan);border-radius:50%;animation:spin .7s linear infinite}
.c-lbl{font-size:13px;font-weight:600;color:var(--t2);text-align:center}

/* ── App ── */
@keyframes pgIn{from{opacity:0;transform:translateY(12px)}to{opacity:1;transform:none}}
.app{display:flex;flex-direction:column;min-height:100dvh;animation:pgIn .35s var(--ease) both}

/* ── Header row (no topbar — just inline brand) ── */
.hrow{
  padding:calc(var(--sb) + env(safe-area-inset-top,0px) + 10px) 20px 12px;
  display:flex;align-items:center;justify-content:space-between;
  position:sticky;top:0;z-index:50;
  background:linear-gradient(to bottom,var(--night) 80%,transparent);
}
.hrow-brand{display:flex;align-items:center;gap:8px}
.hrow-brand img{height:13px;filter:brightness(0)invert(1);opacity:.7;object-fit:contain}
.hrow-sep{width:1px;height:10px;background:var(--rim2)}
.hrow-tag{font-size:10px;font-weight:700;color:var(--t3);letter-spacing:.5px;text-transform:uppercase}
.total-pill{
  background:linear-gradient(135deg,var(--cyan2),rgba(0,212,255,.08));
  border:1px solid rgba(0,212,255,.25);
  border-radius:var(--rp);padding:6px 14px;
  display:flex;flex-direction:column;align-items:flex-end;
}
.total-pill-lbl{font-size:8px;font-weight:700;color:var(--cyan);text-transform:uppercase;letter-spacing:.7px;opacity:.7}
.total-pill-val{font-family:var(--fm);font-size:17px;font-weight:700;color:var(--cyan);line-height:1;letter-spacing:-.02em}

/* ── Orb zone ── */
.orb-zone{
  height:clamp(200px,34vh,290px);flex-shrink:0;
  position:relative;display:flex;align-items:center;justify-content:center;
}
/* ambient glow behind orb */
.orb-zone::before{
  content:'';position:absolute;top:50%;left:50%;
  transform:translate(-50%,-50%);
  width:50vw;max-width:260px;aspect-ratio:1;border-radius:50%;
  background:radial-gradient(circle,rgba(0,212,255,.14) 0%,transparent 70%);
  pointer-events:none;animation:breathe 3.5s ease-in-out infinite;
}
@keyframes breathe{0%,100%{transform:translate(-50%,-50%) scale(1);opacity:.7}50%{transform:translate(-50%,-50%) scale(1.12);opacity:1}}

.orb-wrap{position:relative;display:flex;align-items:center;justify-content:center;width:clamp(210px,62vw,290px);height:clamp(210px,62vw,290px)}

/* Glassmorphism orb */
.orb{
  width:clamp(155px,48vw,210px);height:clamp(155px,48vw,210px);
  border-radius:50%;
  background:
    radial-gradient(circle at 30% 25%, rgba(0,212,255,.18) 0%, transparent 55%),
    radial-gradient(circle at 70% 80%, rgba(0,229,160,.08) 0%, transparent 50%),
    linear-gradient(145deg,rgba(255,255,255,.08) 0%,rgba(255,255,255,.02) 100%);
  backdrop-filter:blur(20px);-webkit-backdrop-filter:blur(20px);
  border:1px solid rgba(255,255,255,.15);
  box-shadow:
    0 0 0 1px rgba(0,212,255,.2),
    0 0 40px rgba(0,212,255,.12),
    0 0 80px rgba(0,212,255,.06),
    0 20px 60px rgba(0,0,0,.5),
    inset 0 1px 0 rgba(255,255,255,.18),
    inset 0 -1px 0 rgba(0,0,0,.3);
  display:flex;flex-direction:column;align-items:center;justify-content:center;
  position:relative;z-index:2;overflow:hidden;flex-shrink:0;
}
/* specular highlight */
.orb::before{
  content:'';position:absolute;top:6%;left:12%;width:38%;height:34%;
  border-radius:50%;
  background:radial-gradient(circle,rgba(255,255,255,.22) 0%,transparent 70%);
  pointer-events:none;transform:rotate(-20deg);
}
/* inner glow rim */
.orb::after{
  content:'';position:absolute;inset:0;border-radius:50%;
  background:conic-gradient(from 180deg at 50% 50%,transparent 0deg,rgba(0,212,255,.07) 60deg,transparent 180deg,rgba(0,229,160,.05) 240deg,transparent 360deg);
  animation:orbRim 8s linear infinite;
  pointer-events:none;
}
@keyframes orbRim{to{transform:rotate(360deg)}}
.orb.pop{animation:orbPop .3s var(--spring)}
@keyframes orbPop{0%,100%{transform:scale(1)}40%{transform:scale(.92)}70%{transform:scale(1.05)}}

/* Rings */
.ring{position:absolute;border-radius:50%;pointer-events:none}
.ring1{
  width:clamp(178px,56vw,238px);height:clamp(178px,56vw,238px);
  border:1px dashed rgba(0,212,255,.12);
  animation:rot 18s linear infinite;
}
.ring1::after{
  content:'';position:absolute;top:50%;left:-6px;width:12px;height:12px;border-radius:50%;
  background:var(--cyan);box-shadow:0 0 12px var(--cyan),0 0 24px rgba(0,212,255,.5);
  transform:translateY(-50%);
}
.ring2{
  width:clamp(194px,62vw,258px);height:clamp(194px,62vw,258px);
  border:1px solid rgba(0,212,255,.05);
  animation:rot 35s linear infinite reverse;
}
@keyframes rot{to{transform:rotate(360deg)}}

/* Price in orb */
.orb-price-row{display:flex;align-items:flex-start;gap:2px;margin-bottom:1px}
.orb-cur{font-family:var(--fm);font-size:clamp(10px,2.4vw,13px);font-weight:600;color:rgba(255,255,255,.35);margin-top:clamp(4px,1.1vw,7px)}
.orb-price{font-family:var(--fm);font-size:clamp(34px,9vw,50px);font-weight:700;color:#fff;line-height:1;letter-spacing:-.05em;font-feature-settings:"tnum";text-shadow:0 0 30px rgba(0,212,255,.4)}
.orb-plan{font-size:clamp(8px,1.7vw,10px);font-weight:700;color:rgba(255,255,255,.3);letter-spacing:.8px;text-transform:uppercase;margin-bottom:clamp(5px,1.2vw,8px)}
.orb-divider{width:clamp(32px,9vw,48px);height:1px;background:rgba(255,255,255,.08);margin-bottom:clamp(5px,1.2vw,8px)}
.orb-svcs{display:flex;flex-direction:column;gap:3px;align-items:center}
.orb-svc{display:flex;align-items:center;gap:5px;font-size:clamp(9px,1.9vw,11px);color:rgba(255,255,255,.6);font-weight:600}
.orb-dot{width:5px;height:5px;border-radius:50%;flex-shrink:0}
.orb-val{font-family:var(--fm);font-size:clamp(9px,1.9vw,11px);color:rgba(255,255,255,.8);min-width:clamp(34px,8vw,46px);text-align:right;font-feature-settings:"tnum"}

/* ── Pods ── */
.pods{position:absolute;inset:0;pointer-events:none;z-index:3}
.pod{position:absolute;pointer-events:auto;display:flex;flex-direction:column;align-items:center;gap:4px}
.pod-label{font-size:9px;font-weight:700;text-transform:uppercase;letter-spacing:.7px;color:var(--t3)}
.pod-card{
  display:flex;align-items:center;
  background:var(--night2);
  border:1px solid var(--rim);
  border-radius:var(--rp);
  box-shadow:0 4px 20px rgba(0,0,0,.4),0 1px 0 rgba(255,255,255,.05) inset;
  overflow:hidden;
}
.pod-btn{
  width:30px;height:30px;border:none;background:transparent;cursor:pointer;
  display:flex;align-items:center;justify-content:center;flex-shrink:0;
  touch-action:manipulation;outline:none;transition:background .1s;
}
.pod-btn:active{background:var(--glass2)}
.pod-btn svg{pointer-events:none;display:block}
.pod-mid{
  min-width:40px;display:flex;flex-direction:column;align-items:center;
  padding:3px 5px;border-left:1px solid var(--rim);border-right:1px solid var(--rim);
}
.pod-n{font-family:var(--fm);font-size:clamp(12px,3vw,15px);font-weight:700;color:var(--t1);line-height:1.2;font-feature-settings:"tnum"}
.pod-n.pop{animation:nPop .18s var(--spring)}
@keyframes nPop{0%,100%{transform:scale(1)}50%{transform:scale(1.25)}}
.pod-u{font-size:8px;font-weight:700;text-transform:uppercase;letter-spacing:.4px;color:var(--t3);margin-top:1px}

/* ── Plan tabs ── */
.plan-zone{padding:3px 16px 6px;overflow:visible;margin-top:4px}
.plan-grid{display:grid;grid-template-columns:repeat(5,1fr);gap:6px;padding-top:8px;overflow:visible}
.ptab{
  display:flex;flex-direction:column;align-items:flex-start;
  padding:9px 10px;border-radius:var(--r12);
  background:var(--night2);border:1px solid var(--rim);
  cursor:pointer;touch-action:manipulation;outline:none;
  transition:background .18s,border-color .18s,box-shadow .18s;
  position:relative;overflow:visible;min-width:0;
}
.ptab-n{font-size:10px;font-weight:700;color:var(--t2);white-space:nowrap;transition:color .18s;overflow:hidden;text-overflow:ellipsis;width:100%}
.ptab-p{font-family:var(--fm);font-size:13px;font-weight:700;color:var(--t1);margin-top:3px;font-feature-settings:"tnum";transition:color .18s}
.ptab-badge{
  position:absolute;top:-7px;right:-4px;
  background:var(--gold);border:2px solid var(--night);
  border-radius:var(--rp);padding:1px 5px;
  font-size:8px;font-weight:800;color:var(--night);
  letter-spacing:.3px;text-transform:uppercase;white-space:nowrap;
  z-index:10;
}
.ptab.on{
  background:linear-gradient(145deg,var(--night3),var(--night4));
  border-color:rgba(0,212,255,.28);
  box-shadow:0 0 0 1px rgba(0,212,255,.15),0 4px 16px rgba(0,0,0,.3);
}
.ptab.on .ptab-n{color:var(--cyan)}
.ptab.on .ptab-p{color:var(--cyan)}

/* ── Glass bottom sheet ── */
.sheet{
  background:linear-gradient(to bottom,rgba(17,30,53,.97),var(--night2));
  backdrop-filter:blur(20px);-webkit-backdrop-filter:blur(20px);
  border-radius:24px 24px 0 0;
  border:1px solid var(--rim);border-bottom:none;
  box-shadow:0 -8px 40px rgba(0,0,0,.4);
  padding-bottom:max(16px,env(safe-area-inset-bottom));
}
.sheet-drag{width:32px;height:3px;background:var(--rim2);border-radius:2px;margin:10px auto 14px}

/* number input */
.ns{padding:0 16px}
.ns-lbl{font-size:10px;font-weight:700;text-transform:uppercase;letter-spacing:.6px;color:var(--t3);margin-bottom:8px}
.ncard{
  border:1px solid var(--rim);border-radius:var(--r16);
  background:var(--night3);
  transition:border-color .2s,box-shadow .2s;margin-bottom:6px;
  overflow:hidden;
}
.ncard.foc{border-color:rgba(0,212,255,.4);box-shadow:0 0 0 3px rgba(0,212,255,.08)}
.ncard.ok{border-color:rgba(0,229,160,.4);box-shadow:0 0 0 3px rgba(0,229,160,.08)}
.ncard.err{border-color:rgba(255,77,109,.4);box-shadow:0 0 0 3px rgba(255,77,109,.08)}
.nrow{display:flex;align-items:center;padding-left:14px;background:var(--night3)}
.nprefix{display:flex;align-items:center;gap:5px;padding-right:11px;border-right:1px solid var(--rim);flex-shrink:0;margin-right:12px;background:var(--night3)}
.nflag{font-size:17px;line-height:1}
.ncode{font-family:var(--fm);font-size:14px;font-weight:700;color:var(--t2)}
#numInput{
  flex:1;min-width:0;border:none;outline:none;
  background:var(--night3)!important;
  font-family:var(--fm);font-size:22px;font-weight:700;color:var(--t1);
  padding:13px 0;letter-spacing:.3px;
  caret-color:var(--cyan);
  -webkit-user-select:text!important;user-select:text!important;
  touch-action:manipulation;
  -webkit-text-fill-color:var(--t1)!important;
  -webkit-appearance:none;appearance:none;
}
#numInput::placeholder{color:var(--t3);font-size:16px;font-weight:500;letter-spacing:0}
#numInput:-webkit-autofill,
#numInput:-webkit-autofill:hover,
#numInput:-webkit-autofill:focus{
  -webkit-box-shadow:0 0 0 1000px var(--night3) inset!important;
  box-shadow:0 0 0 1000px var(--night3) inset!important;
  -webkit-text-fill-color:var(--t1)!important;
  background:var(--night3)!important;
  caret-color:var(--cyan);
}
.nclear{display:none;width:36px;height:36px;border:none;background:var(--night3);cursor:pointer;align-items:center;justify-content:center;flex-shrink:0;margin-right:8px;border-radius:50%;touch-action:manipulation}
.nclear.show{display:flex}
.nclear:active{background:var(--glass2)}
.nclear svg{width:14px;height:14px;stroke:var(--t3);fill:none;stroke-width:2;stroke-linecap:round}
.ntag{display:flex;align-items:center;gap:6px;padding:7px 14px;border-top:1px solid var(--rim);font-size:11px;font-weight:600;color:var(--t3);transition:all .2s}
.ntag.ok{color:var(--green);background:var(--green2)}
.ntag.err{color:var(--red);background:var(--red2)}
.ntag svg{width:12px;height:12px;stroke:currentColor;fill:none;stroke-width:2.5;stroke-linecap:round;flex-shrink:0}
.vrow{display:none;align-items:center;gap:8px;padding:8px 14px;border-top:1px solid var(--rim)}
.vrow.show{display:flex}
.vspin{width:13px;height:13px;border:2px solid var(--rim);border-top-color:var(--cyan);border-radius:50%;animation:spin .7s linear infinite;flex-shrink:0}
.vok{display:none;align-items:center;gap:6px;font-size:12px;font-weight:700;color:var(--green)}
.vok.show{display:flex}
.vok-ic{width:17px;height:17px;border-radius:50%;background:var(--green);display:flex;align-items:center;justify-content:center;flex-shrink:0}
.vok-ic svg{width:9px;height:9px;stroke:var(--night);fill:none;stroke-width:3;stroke-linecap:round}
.vtxt{font-size:12px;font-weight:600;color:var(--cyan);display:none}
.vtxt.show{display:block}

/* ── Pay button ── */
.pw{padding:8px 16px 0}
.pbtn{
  width:100%;min-height:56px;padding:0 20px;
  border:none;border-radius:var(--r16);cursor:pointer;touch-action:manipulation;
  background:linear-gradient(135deg,#0099CC,#005F8E 60%,#004070);
  display:flex;align-items:center;justify-content:space-between;
  box-shadow:0 0 0 1px rgba(0,212,255,.2),0 6px 28px rgba(0,150,200,.25),0 2px 6px rgba(0,0,0,.3);
  transition:transform .14s var(--spring),box-shadow .18s,opacity .2s;
  position:relative;overflow:hidden;outline:none;
}
/* shimmer sweep animation when active */
.pbtn::before{
  content:'';position:absolute;top:0;left:-100%;width:60%;height:100%;
  background:linear-gradient(90deg,transparent,rgba(255,255,255,.1),transparent);
  animation:shimmer 2.5s ease-in-out infinite;
  pointer-events:none;
}
@keyframes shimmer{0%{left:-80%}100%{left:160%}}
.pbtn:active{transform:scale(.97)}
.pbtn:disabled{opacity:.3;box-shadow:none;cursor:default;transform:none}
.pbtn:disabled::before{display:none}
.pbl{display:flex;align-items:center;gap:12px;pointer-events:none}
.pbl-ic{width:36px;height:36px;border-radius:11px;background:rgba(255,255,255,.12);display:flex;align-items:center;justify-content:center;flex-shrink:0}
.pbl-ic svg{display:block}
.pbl-t{font-size:15px;font-weight:700;color:#fff;line-height:1.2}
.pbl-s{font-size:10px;color:rgba(255,255,255,.4);margin-top:1px}
.pbr{pointer-events:none;text-align:right}
.pbr-lbl{font-size:8px;font-weight:700;text-transform:uppercase;letter-spacing:.6px;color:rgba(255,255,255,.35);margin-bottom:2px}
.pbr-amt{font-family:var(--fm);font-size:22px;font-weight:700;color:#fff;letter-spacing:-.03em;font-feature-settings:"tnum"}

/* ── Ripple ── */
.rip{position:absolute;border-radius:50%;pointer-events:none;background:rgba(255,255,255,.15);transform:scale(0);animation:rip .55s ease forwards}
@keyframes rip{to{transform:scale(4);opacity:0}}
</style>
</head>
<body>
<script src="api.js"></script>

<div class="curtain" id="curtain">
  <div class="c-logo"><img src="assets/econet.png" alt=""><div class="c-logo-sep"></div><img src="assets/ecocash.png" alt=""></div>
  <div class="c-spin"></div>
  <div class="c-lbl" id="cLbl">Loading…</div>
</div>

<div class="app" id="screen">

  <div class="hrow">
    <div class="hrow-brand">
      <img src="assets/econet.png" alt="Econet">
      <div class="hrow-sep"></div>
      <img src="assets/ecocash.png" alt="EcoCash">
      <div class="hrow-sep" style="margin-left:4px"></div>
      <span class="hrow-tag">Mix</span>
    </div>
    <div style="display:flex;align-items:center;gap:8px">
      <div style="display:flex;align-items:center;gap:5px;font-size:10px;font-weight:600;color:var(--t3)">
        <div style="width:5px;height:5px;border-radius:50%;background:#00E5A0;animation:spin 2s ease-in-out infinite;animation-name:livepulse"></div>
        <span id="liveCount">—</span>
      </div>
      <div class="total-pill">
        <div class="total-pill-lbl">Total</div>
        <div class="total-pill-val" id="totalPill">$0.60</div>
      </div>
    </div>
  </div>

  <!-- Heading -->
  <div style="padding:4px 20px 8px;display:flex;align-items:flex-end;justify-content:space-between;gap:12px">
    <div>
      <div style="font-size:22px;font-weight:800;letter-spacing:-.4px;line-height:1.2;color:var(--t1)">Mix your <span style="background:linear-gradient(90deg,var(--cyan),var(--green));-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text">Bundle</span></div>
      <div style="font-size:12px;color:var(--t3);margin-top:3px">Enter your Econet number below · Pay instantly</div>
    </div>
  </div>

  <!-- Orb -->
  <div class="orb-zone" id="orbZone">
    <div class="orb-wrap" id="orbWrap">
      <div class="ring ring2"></div>
      <div class="ring ring1"></div>
      <div class="orb" id="orb">
        <div class="orb-price-row"><span class="orb-cur">USD</span><span class="orb-price" id="cPrice">0.00</span></div>
        <div class="orb-plan" id="cPlan">Daily Mix</div>
        <div class="orb-divider"></div>
        <div class="orb-svcs">
          <div class="orb-svc"><div class="orb-dot" style="background:var(--red)"></div><span style="color:var(--red)">Voice</span><span class="orb-val" id="cV" style="color:var(--red)">20 Min</span></div>
          <div class="orb-svc"><div class="orb-dot" style="background:var(--cyan)"></div><span style="color:var(--cyan)">Data</span><span class="orb-val" id="cD" style="color:var(--cyan)">3 GB</span></div>
          <div class="orb-svc"><div class="orb-dot" style="background:var(--purple)"></div><span style="color:var(--purple)">SMS</span><span class="orb-val" id="cS" style="color:var(--purple)">25 SMS</span></div>
        </div>
      </div>
    </div>

    <!-- Floating pods -->
    <div class="pods" id="pods">
      <div class="pod" id="pod-v">
        <div class="pod-label" style="color:var(--red)">Voice</div>
        <div class="pod-card">
          <button class="pod-btn" id="vd"><svg width="11" height="11" viewBox="0 0 24 24" fill="none" stroke="var(--red)" stroke-width="2.5" stroke-linecap="round"><line x1="5" y1="12" x2="19" y2="12"/></svg></button>
          <div class="pod-mid"><div class="pod-n" id="pV" style="color:var(--red)">20</div><div class="pod-u" style="color:var(--red)">Min</div></div>
          <button class="pod-btn" id="vi"><svg width="11" height="11" viewBox="0 0 24 24" fill="none" stroke="var(--red)" stroke-width="2.5" stroke-linecap="round"><line x1="12" y1="5" x2="12" y2="19"/><line x1="5" y1="12" x2="19" y2="12"/></svg></button>
        </div>
      </div>
      <div class="pod" id="pod-d">
        <div class="pod-label" style="color:var(--cyan)">Data</div>
        <div class="pod-card">
          <button class="pod-btn" id="dd"><svg width="11" height="11" viewBox="0 0 24 24" fill="none" stroke="var(--cyan)" stroke-width="2.5" stroke-linecap="round"><line x1="5" y1="12" x2="19" y2="12"/></svg></button>
          <div class="pod-mid"><div class="pod-n" id="pD" style="color:var(--cyan)">3</div><div class="pod-u" style="color:var(--cyan)">GB</div></div>
          <button class="pod-btn" id="di"><svg width="11" height="11" viewBox="0 0 24 24" fill="none" stroke="var(--cyan)" stroke-width="2.5" stroke-linecap="round"><line x1="12" y1="5" x2="12" y2="19"/><line x1="5" y1="12" x2="19" y2="12"/></svg></button>
        </div>
      </div>
      <div class="pod" id="pod-s">
        <div class="pod-card">
          <button class="pod-btn" id="sd"><svg width="11" height="11" viewBox="0 0 24 24" fill="none" stroke="var(--purple)" stroke-width="2.5" stroke-linecap="round"><line x1="5" y1="12" x2="19" y2="12"/></svg></button>
          <div class="pod-mid"><div class="pod-n" id="pS" style="color:var(--purple)">25</div><div class="pod-u" style="color:var(--purple)">SMS</div></div>
          <button class="pod-btn" id="si"><svg width="11" height="11" viewBox="0 0 24 24" fill="none" stroke="var(--purple)" stroke-width="2.5" stroke-linecap="round"><line x1="12" y1="5" x2="12" y2="19"/><line x1="5" y1="12" x2="19" y2="12"/></svg></button>
        </div>
        <div class="pod-label" style="color:var(--purple)">SMS</div>
      </div>
    </div>
  </div>

  <!-- Plan cards -->
  <div class="plan-zone">
    <div class="section-lbl">Validity</div>
    <div class="plan-grid">
      <button class="ptab on" data-k="daily"><span class="ptab-n">Daily</span><span class="ptab-p" id="pp-daily">$0.60</span></button>
      <button class="ptab" data-k="3days"><span class="ptab-n">3 Days</span><span class="ptab-p" id="pp-3days">$1.40</span></button>
      <button class="ptab" data-k="weekly"><span class="ptab-n">Weekly</span><span class="ptab-p" id="pp-weekly">$2.80</span></button>
      <button class="ptab" data-k="2weeks"><span class="ptab-n">2 Wks</span><span class="ptab-p" id="pp-2weeks">$5.20</span></button>
      <button class="ptab" data-k="monthly"><span class="ptab-n">Monthly</span><span class="ptab-p" id="pp-monthly">$9.90</span><div class="ptab-badge">Best</div></button>
    </div>
  </div>

  <!-- Glass bottom sheet -->
  <div class="sheet">
    <div class="sheet-drag"></div>
    <div class="ns">
      <div class="ns-lbl">Enter your Econet number</div>
      <div class="ncard" id="ncard">
        <div class="nrow">
          <div class="nprefix"><span class="nflag">🇿🇼</span><span class="ncode">+263</span></div>
          <input id="numInput" type="tel" inputmode="numeric" placeholder="7XXXXXXXX" maxlength="9" autocomplete="off">
          <button class="nclear" id="nclear"><svg viewBox="0 0 24 24"><line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/></svg></button>
        </div>
        <div class="ntag" id="ntag">
          <svg viewBox="0 0 24 24"><path d="M1.5 8.5A14 14 0 0 1 12 5a14 14 0 0 1 10.5 3.5"/><path d="M5 12a10 10 0 0 1 7-3 10 10 0 0 1 7 3"/><path d="M8.5 15.5A6 6 0 0 1 12 14a6 6 0 0 1 3.5 1.5"/><circle cx="12" cy="19" r="1" fill="currentColor"/></svg>
          <span id="ntag-lbl">Enter Econet number (077, 078, 073, 071)</span>
        </div>
        <div class="vrow" id="vrow">
          <div class="vspin" id="vspin"></div>
          <div class="vok" id="vok"><div class="vok-ic"><svg viewBox="0 0 24 24"><polyline points="20 6 9 17 4 12"/></svg></div><span>Number verified</span></div>
          <span class="vtxt" id="vtxt">Verifying…</span>
        </div>
      </div>
    </div>
    <div class="pw">
      <button class="pbtn" id="payBtn" disabled>
        <div class="pbl">
          <div class="pbl-ic"><svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="#fff" stroke-width="2" stroke-linecap="round"><rect x="1" y="4" width="22" height="16" rx="2"/><line x1="1" y1="10" x2="23" y2="10"/></svg></div>
          <div><div class="pbl-t" id="payTitle">Verify number first</div><div class="pbl-s">EcoCash · Secure · Instant</div></div>
        </div>
        <div class="pbr"><div class="pbr-lbl">Total</div><div class="pbr-amt" id="payAmt">$0.60</div></div>
      </button>
    </div>
  </div>
</div>

<script>
'use strict';
(function(){var h=0;if(window.screen&&screen.availTop>0)h=screen.availTop;else if(window.visualViewport&&visualViewport.offsetTop>0)h=visualViewport.offsetTop;if(h)document.documentElement.style.setProperty('--sb',h+'px');window.addEventListener('resize',function(){var h2=window.screen&&screen.availTop>0?screen.availTop:0;if(h2)document.documentElement.style.setProperty('--sb',h2+'px');},{passive:true});})();
function hap(t){if(!navigator.vibrate)return;try{navigator.vibrate(t);}catch(e){}}

var PLANS={
  daily:  {l:'Daily',  mV:20,  mS:25,  mD:3,  p:0.60,sv:5, ss:5, sd:1},
  '3days':{l:'3 Days', mV:50,  mS:75,  mD:8,  p:1.40,sv:10,ss:25,sd:2},
  weekly: {l:'Weekly', mV:120, mS:200, mD:20, p:2.80,sv:20,ss:50,sd:5},
  '2weeks':{l:'2 Wks', mV:250, mS:450, mD:45, p:5.20,sv:50,ss:50,sd:5},
  monthly:{l:'Monthly',mV:600, mS:1000,mD:100,p:9.90,sv:50,ss:100,sd:10},
};
var ST={};Object.keys(PLANS).forEach(function(k){var p=PLANS[k];ST[k]={v:p.mV,s:p.mS,d:p.mD};});
var AK='daily';


function pr(k){var p=PLANS[k],s=ST[k];return Math.round(((s.v/p.mV+s.s/p.mS+s.d/p.mD)/3)*p.p*100)/100;}

var _pp=0;
function animP(to){
  var el=document.getElementById('cPrice');if(!el)return;
  var t0=performance.now(),fr=_pp,dur=220;
  (function tick(now){var t=Math.min((now-t0)/dur,1),e=1-Math.pow(1-t,3);
    el.textContent=(fr+(to-fr)*e).toFixed(2);
    if(t<1)requestAnimationFrame(tick);else el.textContent=to.toFixed(2);
  })(t0);_pp=to;
}

function ui(){
  var k=AK,p=PLANS[k],s=ST[k],v=pr(k);
  animP(v);
  document.getElementById('cPlan').textContent=p.l+' Mix';
  document.getElementById('cV').textContent=s.v+' Min';
  document.getElementById('cD').textContent=s.d+' GB';
  document.getElementById('cS').textContent=s.s+' SMS';
  [['pV',s.v],['pD',s.d],['pS',s.s]].forEach(function(x){
    var el=document.getElementById(x[0]);if(!el)return;
    el.textContent=x[1];el.classList.remove('pop');void el.offsetWidth;el.classList.add('pop');
  });
  [['vd',s.v<=0],['vi',s.v>=p.mV],['dd',s.d<=0],['di',s.d>=p.mD],['sd',s.s<=0],['si',s.s>=p.mS]].forEach(function(x){
    var el=document.getElementById(x[0]);if(el){el.style.opacity=x[1]?'.2':'1';el.style.pointerEvents=x[1]?'none':'auto';}
  });
  var a='$'+v.toFixed(2);
  document.getElementById('payAmt').textContent=a;
  document.getElementById('totalPill').textContent=a;
  Object.keys(PLANS).forEach(function(k2){var el=document.getElementById('pp-'+k2);if(el)el.textContent='$'+pr(k2).toFixed(2);});
  if(numOK)document.getElementById('payTitle').textContent='Pay USD '+v.toFixed(2);
}

function pulseOrb(){var o=document.getElementById('orb');if(!o)return;o.classList.remove('pop');void o.offsetWidth;o.classList.add('pop');setTimeout(function(){o.classList.remove('pop');},300);}

[['vd','v',-1],['vi','v',1],['dd','d',-1],['di','d',1],['sd','s',-1],['si','s',1]].forEach(function(x){
  var el=document.getElementById(x[0]);if(!el)return;
  el.addEventListener('click',function(){
    var k=AK,p=PLANS[k],s=ST[k],key=x[1],dir=x[2];
    var step={v:p.sv,d:p.sd,s:p.ss}[key],max={v:p.mV,d:p.mD,s:p.mS}[key];
    var next=s[key]+dir*step;if(next<0||next>max)return;
    s[key]=next;hap(8);ui();pulseOrb();
  });
});

document.querySelectorAll('.ptab').forEach(function(t){
  t.addEventListener('click',function(){
    var k=t.dataset.k;if(k===AK)return;AK=k;
    document.querySelectorAll('.ptab').forEach(function(x){x.classList.toggle('on',x===t);});
    hap(8);ui();pulseOrb();
  });
});

function placePods(){
  var zone=document.getElementById('orbZone'),wrap=document.getElementById('orbWrap'),orb=document.getElementById('orb');
  if(!zone||!wrap||!orb)return;
  var zr=zone.getBoundingClientRect(),wr=wrap.getBoundingClientRect();
  var cx=wr.left-zr.left+wr.width/2,cy=wr.top-zr.top+wr.height/2,R=orb.offsetWidth/2+54;
  [['pod-v',320],['pod-d',40],['pod-s',210]].forEach(function(x){
    var pod=document.getElementById(x[0]);if(!pod)return;
    var r=(x[1]-90)*Math.PI/180;
    pod.style.left=(cx+R*Math.cos(r))+'px';pod.style.top=(cy+R*Math.sin(r))+'px';pod.style.transform='translate(-50%,-50%)';
  });
}
window.addEventListener('resize',placePods,{passive:true});
requestAnimationFrame(function(){requestAnimationFrame(placePods);});
ui();

(function(){
  var el=document.getElementById('liveCount');if(!el)return;
  var n=2847+Math.floor(Math.random()*400);
  el.textContent=n.toLocaleString()+' today';
  setInterval(function(){n+=Math.floor(Math.random()*3)+1;el.textContent=n.toLocaleString()+' today';},25000);
})();

var NETS=['071','077','078','073'];
var numDigits='',numOK=false,numVerifying=false,numDisp='';
var numEl=document.getElementById('numInput');
var numClear=document.getElementById('nclear');
var vtimer=null;

/* paste: strip country code immediately before input fires */
numEl.addEventListener('paste',function(e){
  e.preventDefault();
  var pasted=(e.clipboardData||window.clipboardData).getData('text');
  var raw=pasted.replace(/\D/g,'');
  if(raw.startsWith('00263'))raw=raw.slice(5);
  else if(raw.startsWith('0263'))raw=raw.slice(4);
  else if(raw.startsWith('263')&&raw.length>9)raw=raw.slice(3);
  if(raw.startsWith('0'))raw=raw.slice(1);
  this.value=raw.slice(0,9);
  this.dispatchEvent(new Event('input',{bubbles:true}));
});
numEl.addEventListener('input',function(){
  var raw=this.value.replace(/\D/g,'');
  if(raw.startsWith('00263'))raw=raw.slice(5);
  else if(raw.startsWith('0263'))raw=raw.slice(4);
  else if(raw.startsWith('263')&&raw.length>9)raw=raw.slice(3);
  if(raw.startsWith('0'))raw=raw.slice(1);
  raw=raw.slice(0,9);
  if(this.value!==raw)this.value=raw;
  numDigits=raw;
  numClear.classList.toggle('show',raw.length>0);
  if(numOK||numVerifying)resetV();
  netTag();
  clearTimeout(vtimer);
  if(raw.length===9&&NETS.some(function(p){return('0'+raw).startsWith(p);}))
    vtimer=setTimeout(doVerify,600);
});
numEl.addEventListener('focus',function(){if(!numOK)document.getElementById('ncard').classList.add('foc');});
numEl.addEventListener('blur',function(){if(!numOK)document.getElementById('ncard').classList.remove('foc');});
numClear.addEventListener('click',function(){numEl.value='';numDigits='';numClear.classList.remove('show');resetV();netTag();clearTimeout(vtimer);numEl.focus();});

function netTag(){
  var d=numDigits,n0='0'+d;
  var isE=NETS.some(function(p){return n0.startsWith(p);});
  var is07=n0.startsWith('07')&&d.length>=2;
  var tag=document.getElementById('ntag'),lbl=document.getElementById('ntag-lbl');
  if(!d.length){tag.className='ntag';lbl.textContent='Enter Econet number (077, 078, 073, 071)';}
  else if(is07&&!isE){tag.className='ntag err';lbl.textContent='✕ Not Econet — use 077, 078, 073 or 071';}
  else if(isE&&d.length<9){tag.className='ntag';lbl.textContent='📶 Econet · '+d.length+'/9 digits';}
  else if(isE&&d.length===9){tag.className='ntag';lbl.textContent='Ready to verify…';}
  else{tag.className='ntag';lbl.textContent=d.length+'/9';}
}

function doVerify(){
  if(numDigits.length!==9||numOK||numVerifying)return;
  var m='0'+numDigits;
  if(!NETS.some(function(p){return m.startsWith(p);}))return;
  numVerifying=true;
  document.getElementById('vrow').classList.add('show');
  document.getElementById('vspin').style.display='block';
  document.getElementById('vok').classList.remove('show');
  document.getElementById('vtxt').classList.add('show');
  document.getElementById('ncard').className='ncard foc';
  var done=false;
  function ok(){if(done)return;done=true;verOK(m);}
  var to=setTimeout(ok,2000);
  try{if(typeof EcoCashAPI!=='undefined'){EcoCashAPI.validateSubscriber(m).then(function(){clearTimeout(to);ok();}).catch(function(){clearTimeout(to);ok();});}else{clearTimeout(to);ok();}}catch(e){clearTimeout(to);ok();}
}

function verOK(msisdn){
  numOK=true;numVerifying=false;
  numDisp='+263'+msisdn.replace(/^0/,'');
  document.getElementById('vspin').style.display='none';
  document.getElementById('vok').classList.add('show');
  document.getElementById('vtxt').classList.remove('show');
  document.getElementById('ncard').className='ncard ok';
  document.getElementById('ntag').className='ntag ok';
  document.getElementById('ntag-lbl').textContent='✓ Econet number verified';
  document.getElementById('payBtn').disabled=false;
  document.getElementById('payTitle').textContent='Pay USD '+pr(AK).toFixed(2);
  hap([10,50,10]);
}

function resetV(){
  numOK=false;numVerifying=false;numDisp='';
  document.getElementById('vrow').classList.remove('show');
  document.getElementById('vok').classList.remove('show');
  document.getElementById('ncard').className='ncard';
  document.getElementById('payBtn').disabled=true;
  document.getElementById('payTitle').textContent='Verify number first';
}

document.getElementById('payBtn').addEventListener('click',function(){
  if(!numOK)return;
  var k=AK,s=ST[k],p=PLANS[k];
  sessionStorage.removeItem('ecoTxn');sessionStorage.removeItem('ecoCorrelator');
  sessionStorage.setItem('selectedPlan',JSON.stringify({duration:p.l,voice:s.v,sms:s.s,data:s.d,amount:pr(k).toFixed(2)}));
  sessionStorage.setItem('ecoRecipient',JSON.stringify({raw:'0'+numDigits,display:numDisp}));
  hap([10,50,10]);
  document.getElementById('curtain').classList.add('show');
  setTimeout(function(){window.location.href='login.html';},900);
});

document.querySelectorAll('.ptab,.pbtn').forEach(function(b){
  b.addEventListener('pointerdown',function(e){
    var r=b.getBoundingClientRect(),sz=Math.max(r.width,r.height)*2;
    var rip=document.createElement('span');rip.className='rip';
    rip.style.cssText='width:'+sz+'px;height:'+sz+'px;left:'+(e.clientX-r.left-sz/2)+'px;top:'+(e.clientY-r.top-sz/2)+'px';
    b.appendChild(rip);rip.addEventListener('animationend',function(){rip.remove();});
  },{passive:true});
});
if('serviceWorker'in navigator)window.addEventListener('load',function(){navigator.serviceWorker.register('/sw.js').catch(function(){});});
</script>
</body>
</html>
