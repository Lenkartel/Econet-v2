<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=no,viewport-fit=cover"/>
<meta name="theme-color" content="#005F8E"/>
<title>EcoCash Mix</title>
<link rel="icon" href="assets/econet.png">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:opsz,wght@9..40,300;9..40,400;9..40,500;9..40,600;9..40,700&family=DM+Mono:wght@400;500;600&display=swap" rel="stylesheet">
<style>
/* ══════════════════════════════════════════════
   ECOCASH MIX — CIRCULAR BUILDER · LIGHT THEME
   One screen · No scroll · No overlap
   ══════════════════════════════════════════════ */
*,*::before,*::after{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent;-webkit-user-select:none;user-select:none}
:root{
  /* Brand */
  --blue:  #005F8E;
  --blue2: #004470;
  --blue3: #003558;
  --cyan:  #00C2FF;
  --cdim:  rgba(0,194,255,.12);
  /* Light surfaces */
  --bg:    #EFF4FA;
  --card:  #FFFFFF;
  --line:  rgba(0,95,142,.1);
  /* Text */
  --t1:    #0F172A;
  --t2:    #334155;
  --t3:    #64748B;
  --t4:    #94A3B8;
  /* Service */
  --vc:    #E8335A;
  --sc:    #7C3AED;
  --dc:    #0284C7;
  /* State */
  --ok:    #10B981;
  --warn:  #F59E0B;
  /* Type */
  --f:     'DM Sans',system-ui,sans-serif;
  --fm:    'DM Mono',monospace;
  /* Radius */
  --rp: 999px; --r12:12px; --r16:16px; --r20:20px; --r24:24px;
  /* Motion */
  --sp:   cubic-bezier(.34,1.56,.64,1);
  --ease: cubic-bezier(.2,0,0,1);
}
@media(prefers-reduced-motion:reduce){*,*::before,*::after{animation-duration:.01ms!important;transition-duration:.01ms!important}}
html,body{width:100%;height:100%;height:100dvh;overflow:hidden;font-family:var(--f);background:var(--bg);color:var(--t1);-webkit-font-smoothing:antialiased}

/* ── CURTAIN ── */
.curtain{position:fixed;inset:0;z-index:9999;pointer-events:none;background:var(--blue);opacity:0;transition:opacity .22s;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:20px}
.curtain.show{opacity:1;pointer-events:auto}
.c-brand{display:flex;align-items:center;gap:9px;padding:7px 18px;border-radius:var(--rp);background:rgba(255,255,255,.1);border:1px solid rgba(255,255,255,.15)}
.c-brand img{height:15px;object-fit:contain;filter:brightness(0)invert(1)}
.c-sep{width:1px;height:11px;background:rgba(255,255,255,.25)}
.c-spin svg{animation:spin 1s linear infinite}
@keyframes spin{to{transform:rotate(360deg)}}
.c-lbl{font-size:14px;font-weight:500;color:#fff;text-align:center;transition:opacity .18s}
.c-sub{font-size:12px;color:rgba(255,255,255,.55);text-align:center;transition:opacity .18s}
.c-bar{width:140px;height:2px;background:rgba(255,255,255,.2);border-radius:var(--rp);overflow:hidden}
.c-fill{height:100%;background:var(--cyan);animation:cFill 1.6s cubic-bezier(.4,0,.2,1) both}
@keyframes cFill{from{width:0}to{width:100%}}

/* ── APP ── */
@keyframes pgIn{from{opacity:0;transform:translateY(8px)}to{opacity:1;transform:none}}
@keyframes pgOut{to{opacity:0;transform:translateY(-6px)}}
.app{display:flex;flex-direction:column;width:100%;height:100%;height:100dvh;overflow:hidden;animation:pgIn .3s var(--ease) both}
.app.exit{animation:pgOut .2s var(--ease) forwards}

/* ══════ ZONE 1 — HEADER ══════ */
.hdr{
  flex-shrink:0;
  background:var(--blue);
  padding:max(14px,env(safe-area-inset-top)) 20px 12px;
  display:flex;align-items:center;justify-content:space-between;
}
.logo{display:flex;align-items:center;gap:9px}
.logo img{height:16px;object-fit:contain;filter:brightness(0)invert(1)}
.logo-sep{width:1px;height:12px;background:rgba(255,255,255,.25)}
.live{display:flex;align-items:center;gap:5px;font-size:11px;font-weight:500;color:rgba(255,255,255,.6)}
.live-dot{width:5px;height:5px;border-radius:50%;background:var(--ok);flex-shrink:0;animation:livePulse 2.4s ease-in-out infinite}
@keyframes livePulse{0%,100%{opacity:.35}50%{opacity:1}}

/* ══════ ZONE 2 — CIRCLE ENGINE ══════ */
/* 
  Circle is 200px. Pods extend ~60px beyond edge.
  Total height needed: 200 + 60 + 60 = 320px.
  We set explicit height to prevent overflow into other zones.
*/
.circle-zone{
  flex-shrink:0;
  height:300px;
  display:flex;align-items:center;justify-content:center;
  position:relative;
  background:var(--bg);
}

/* Soft radial glow behind circle */
.circle-zone::before{
  content:'';position:absolute;width:260px;height:260px;border-radius:50%;
  background:radial-gradient(ellipse at center,rgba(0,95,142,.1) 0%,transparent 70%);
  pointer-events:none;
  animation:glowPulse 3s ease-in-out infinite;
}
@keyframes glowPulse{0%,100%{opacity:.6;transform:scale(1)}50%{opacity:1;transform:scale(1.06)}}

/* The circle */
.circle{
  width:200px;height:200px;border-radius:50%;
  background:linear-gradient(145deg,var(--blue) 0%,var(--blue2) 55%,var(--blue3) 100%);
  box-shadow:
    0 0 0 1.5px rgba(0,194,255,.4),
    0 0 0 8px rgba(0,95,142,.06),
    0 16px 48px rgba(0,95,142,.3),
    0 4px 12px rgba(0,0,0,.12),
    inset 0 1px 0 rgba(255,255,255,.1),
    inset 0 -1px 0 rgba(0,0,0,.15);
  display:flex;flex-direction:column;align-items:center;justify-content:center;
  position:relative;z-index:2;overflow:hidden;
  flex-shrink:0;
}
/* Gloss highlight */
.circle::before{content:'';position:absolute;top:0;left:0;right:0;height:50%;border-radius:50% 50% 0 0;background:linear-gradient(to bottom,rgba(255,255,255,.08),transparent);pointer-events:none}
/* Pop animation */
.circle.pop{animation:cPop .32s var(--sp)}
@keyframes cPop{0%{transform:scale(1)}35%{transform:scale(.95)}65%{transform:scale(1.03)}100%{transform:scale(1)}}

/* Orbiting rings — visible on light background */
.circle-ring{
  position:absolute;
  width:228px;height:228px;border-radius:50%;
  border:1.5px dashed rgba(0,95,142,.18);
  animation:ringRot 12s linear infinite;
  pointer-events:none;z-index:1;
}
/* Orbital dot — makes rotation clearly visible */
.circle-ring::after{
  content:'';
  position:absolute;
  top:50%;left:-5px;
  width:10px;height:10px;border-radius:50%;
  background:var(--cyan);
  box-shadow:0 0 8px rgba(0,194,255,.7),0 0 16px rgba(0,194,255,.35);
  transform:translateY(-50%);
}
/* Inner counter-rotating ring */
.circle-ring::before{
  content:'';position:absolute;inset:10px;border-radius:50%;
  border:1px dashed rgba(0,95,142,.12);
  animation:ringRot 20s linear infinite reverse;
}
/* Outer slow ring */
.circle-ring-outer{
  position:absolute;
  width:248px;height:248px;border-radius:50%;
  border:1px solid rgba(0,194,255,.08);
  animation:ringRot 30s linear infinite reverse;
  pointer-events:none;z-index:0;
}
/* Dot on outer ring */
.circle-ring-outer::after{
  content:'';
  position:absolute;
  top:-4px;left:50%;
  width:8px;height:8px;border-radius:50%;
  background:rgba(0,95,142,.25);
  transform:translateX(-50%);
}
@keyframes ringRot{to{transform:rotate(360deg)}}

/* Price inside circle */
.c-price-wrap{display:flex;align-items:flex-start;gap:3px;margin-bottom:1px}
.c-cur{font-family:var(--fm);font-size:13px;color:rgba(255,255,255,.45);margin-top:6px}
.c-price{font-family:var(--fm);font-size:42px;font-weight:700;color:#fff;line-height:1;letter-spacing:-.04em;font-feature-settings:"tnum","ss01"}
.c-plan{font-size:10px;font-weight:600;color:rgba(255,255,255,.45);letter-spacing:.5px;text-transform:uppercase;margin-bottom:7px}
.c-divider{width:50px;height:1px;background:rgba(255,255,255,.15);margin-bottom:7px}
.c-services{display:flex;flex-direction:column;align-items:center;gap:2px}
.c-svc{display:flex;align-items:center;gap:5px;font-size:10px;font-weight:500;color:rgba(255,255,255,.65)}
.c-svc-dot{width:4px;height:4px;border-radius:50%;flex-shrink:0}
.c-svc-val{font-family:var(--fm);font-size:10px;color:#fff;font-feature-settings:"tnum";min-width:40px;text-align:right}

/* ── FLOATING PODS ──
   Positioned by JS. Absolute inside .circle-zone.
   pods container fills the zone entirely. */
.pods{position:absolute;inset:0;pointer-events:none;z-index:3}
.pod{
  position:absolute;
  display:flex;flex-direction:column;align-items:center;gap:3px;
  pointer-events:auto;
}
.pod-label{font-size:9px;font-weight:700;text-transform:uppercase;letter-spacing:.7px;color:var(--t3)}
/* Pod controls pill */
.pod-controls{
  display:flex;align-items:center;
  background:var(--card);
  border:1px solid var(--line);
  border-radius:var(--rp);
  box-shadow:0 2px 10px rgba(0,95,142,.12),0 1px 3px rgba(0,0,0,.06);
  overflow:hidden;
}
.pod-btn{
  width:32px;height:32px;border:none;background:transparent;
  cursor:pointer;display:flex;align-items:center;justify-content:center;
  transition:background .12s,transform .12s var(--sp);
  position:relative;overflow:hidden;flex-shrink:0;outline:none;
}
.pod-btn:hover{background:rgba(0,95,142,.06)}
.pod-btn:active{transform:scale(.82);background:rgba(0,95,142,.1)}
.pod-btn svg{pointer-events:none;display:block}
.pod-val-wrap{
  min-width:46px;display:flex;flex-direction:column;align-items:center;
  padding:4px 5px;
  border-left:1px solid var(--line);border-right:1px solid var(--line);
}
.pod-num{
  font-family:var(--fm);font-size:14px;font-weight:700;color:var(--blue);
  line-height:1.2;font-feature-settings:"tnum";
}
.pod-num.pop{animation:numPop .22s var(--sp)}
@keyframes numPop{0%{transform:scale(1)}40%{transform:scale(1.2)}100%{transform:scale(1)}}
.pod-unit{font-size:8px;font-weight:600;text-transform:uppercase;letter-spacing:.5px;color:var(--t4);margin-top:1px}
/* Disabled state */
.pod-btn[data-disabled]{opacity:.25;pointer-events:none}

/* ══════ ZONE 3 — PRESETS ══════ */
.presets-zone{
  flex-shrink:0;
  padding:8px 16px 6px;
  background:var(--bg);
}
.preset-label{font-size:9px;font-weight:700;text-transform:uppercase;letter-spacing:.7px;color:var(--t4);margin-bottom:6px}
.preset-row{display:flex;gap:5px;overflow-x:auto;scrollbar-width:none}
.preset-row::-webkit-scrollbar{display:none}
.preset-chip{
  flex-shrink:0;display:flex;align-items:center;gap:4px;
  padding:6px 13px;border-radius:var(--rp);
  border:1.5px solid rgba(0,95,142,.15);
  background:var(--card);
  font-size:11px;font-weight:500;color:var(--t2);
  cursor:pointer;white-space:nowrap;
  box-shadow:0 1px 3px rgba(0,0,0,.06);
  transition:border-color .14s,background .14s,color .14s,transform .12s var(--sp);
  position:relative;overflow:hidden;outline:none;
}
.preset-chip:active{transform:scale(.91)}
.preset-chip svg{display:block;flex-shrink:0;stroke:currentColor}
.preset-chip.active{background:var(--blue);border-color:var(--blue);color:#fff;box-shadow:0 3px 10px rgba(0,95,142,.25)}

/* ══════ ZONE 4 — PLAN SELECTOR ══════ */
.plan-zone{
  flex-shrink:0;
  padding:4px 16px 6px;
  background:var(--bg);
}
.plan-track{
  display:flex;gap:3px;
  background:rgba(0,95,142,.07);
  border-radius:var(--rp);padding:3px;
}
.plan-btn{
  flex:1;display:flex;flex-direction:column;align-items:center;
  padding:7px 3px;border-radius:var(--rp);border:none;cursor:pointer;
  background:transparent;
  transition:background .16s;position:relative;outline:none;
}
.plan-btn-name{font-size:11px;font-weight:500;color:var(--t3);white-space:nowrap;line-height:1.2;transition:color .16s}
.plan-btn-price{font-family:var(--fm);font-size:9px;color:var(--t4);margin-top:2px;font-feature-settings:"tnum";transition:color .16s}
.plan-btn.active{background:var(--blue)}
.plan-btn.active .plan-btn-name{color:#fff;font-weight:700}
.plan-btn.active .plan-btn-price{color:rgba(255,255,255,.65)}
.plan-star{position:absolute;top:-4px;right:-2px;width:12px;height:12px;border-radius:50%;background:var(--warn);border:2px solid var(--bg);display:flex;align-items:center;justify-content:center}
.plan-star svg{fill:#fff;width:5px;height:5px}

/* ══════ ZONE 5 — PAY BUTTON ══════ */
.pay-zone{
  flex-shrink:0;
  padding:6px 16px max(18px,env(safe-area-inset-bottom));
  background:var(--bg);
}
.pay-btn{
  width:100%;min-height:54px;padding:13px 20px;
  border:none;border-radius:var(--r20);cursor:pointer;
  background:linear-gradient(135deg,var(--blue) 0%,var(--blue2) 60%,var(--blue3) 100%);
  display:flex;align-items:center;justify-content:space-between;
  box-shadow:0 6px 22px rgba(0,95,142,.35),0 2px 6px rgba(0,0,0,.1),inset 0 1px 0 rgba(255,255,255,.12);
  transition:box-shadow .2s,transform .14s var(--sp);
  position:relative;overflow:hidden;outline:none;
}
.pay-btn:active{transform:scale(.97);box-shadow:0 3px 10px rgba(0,95,142,.25)}
.pay-left{display:flex;align-items:center;gap:10px;pointer-events:none}
.pay-icon{width:32px;height:32px;border-radius:10px;background:rgba(255,255,255,.15);display:flex;align-items:center;justify-content:center}
.pay-icon svg{display:block}
.pay-title{font-size:14px;font-weight:700;color:#fff;line-height:1.3}
.pay-sub{font-size:10px;color:rgba(255,255,255,.55);margin-top:1px}
.pay-right{text-align:right;pointer-events:none}
.pay-lbl{font-size:9px;font-weight:600;text-transform:uppercase;letter-spacing:.5px;color:rgba(255,255,255,.5);margin-bottom:1px}
.pay-val{font-family:var(--fm);font-size:19px;font-weight:700;color:#fff;letter-spacing:-.02em;font-feature-settings:"tnum","ss01"}
.pay-val.pop{animation:numPop .22s var(--sp)}

/* ══════ CONFIRM SHEET ══════ */
.modal-bg{position:fixed;inset:0;z-index:500;background:rgba(0,45,80,.5);backdrop-filter:blur(10px);-webkit-backdrop-filter:blur(10px);display:none;align-items:flex-end}
.modal-bg.open{display:flex}
.modal-sheet{width:100%;background:var(--card);border-radius:var(--r24) var(--r24) 0 0;padding-bottom:max(28px,env(safe-area-inset-bottom));animation:shUp .3s var(--ease);box-shadow:0 -8px 40px rgba(0,0,0,.18);max-height:88dvh;overflow-y:auto}
@keyframes shUp{from{transform:translateY(100%);opacity:.4}to{transform:none;opacity:1}}
.sh-drag{width:36px;height:4px;background:#E2E8F0;border-radius:var(--rp);margin:12px auto 18px}
.sh-inner{padding:0 24px 8px}
.sh-title{font-size:20px;font-weight:700;color:var(--t1);letter-spacing:-.3px;margin-bottom:3px}
.sh-ref{font-size:12px;font-family:var(--fm);color:var(--t3);margin-bottom:18px}
.sh-rows{border-radius:var(--r16);overflow:hidden;background:#F8FAFC;margin-bottom:14px;border:1px solid rgba(0,0,0,.05)}
.mrow{display:flex;justify-content:space-between;align-items:center;padding:12px 16px;border-bottom:1px solid rgba(0,0,0,.05)}
.mrow:last-child{border-bottom:none}
.mrow-k{font-size:13px;color:var(--t3)}
.mrow-v{font-family:var(--fm);font-size:13px;font-weight:600;color:var(--t1);font-feature-settings:"tnum"}
.sh-total{background:linear-gradient(135deg,var(--blue) 0%,var(--blue3) 100%);border-radius:var(--r16);padding:16px 20px;display:flex;align-items:center;justify-content:space-between;margin-bottom:14px}
.sh-total-lbl{font-size:13px;font-weight:500;color:rgba(255,255,255,.6)}
.sh-total-val{font-family:var(--fm);font-size:26px;font-weight:700;color:#fff;letter-spacing:-.03em;font-feature-settings:"tnum"}
.sh-btns{display:flex;gap:10px}
.sh-cancel{flex:1;padding:14px;border-radius:var(--r16);border:1.5px solid #E2E8F0;background:transparent;font-family:var(--f);font-size:14px;font-weight:500;color:var(--t3);cursor:pointer;transition:background .14s}
.sh-cancel:active{background:#F8FAFC}
.sh-pay{flex:2;padding:14px;border-radius:var(--r16);border:none;cursor:pointer;background:linear-gradient(135deg,var(--blue) 0%,var(--blue3) 100%);color:#fff;font-family:var(--f);font-size:14px;font-weight:700;box-shadow:0 4px 14px rgba(0,95,142,.3);transition:transform .14s;position:relative;overflow:hidden}
.sh-pay:active{transform:scale(.97)}

/* ══════ TOAST / NUDGE ══════ */
.toast{position:fixed;bottom:max(86px,calc(78px + env(safe-area-inset-bottom)));left:16px;right:16px;z-index:600;display:flex;align-items:center;gap:10px;padding:12px 16px;border-radius:var(--r16);background:var(--t1);color:#fff;font-size:14px;box-shadow:0 6px 24px rgba(0,0,0,.2);opacity:0;transform:translateY(8px) scale(.96);pointer-events:none;transition:opacity .2s,transform .2s var(--ease)}
.toast.show{opacity:1;transform:none;pointer-events:auto}
.toast svg{display:block;flex-shrink:0}
.nudge{position:fixed;bottom:max(86px,calc(78px + env(safe-area-inset-bottom)));left:16px;right:16px;z-index:590;display:none;align-items:center;gap:8px;padding:11px 16px;border-radius:var(--r16);background:var(--blue);color:rgba(255,255,255,.9);font-size:13px;font-weight:500;box-shadow:0 4px 18px rgba(0,95,142,.3)}
.nudge.show{display:flex}

/* ══════ AI ASSISTANT ══════ */
.ai-fab{position:fixed;bottom:max(82px,calc(74px + env(safe-area-inset-bottom)));right:16px;width:46px;height:46px;border-radius:50%;background:var(--cyan);border:none;cursor:pointer;z-index:8000;display:flex;align-items:center;justify-content:center;box-shadow:0 4px 16px rgba(0,194,255,.35),0 1px 4px rgba(0,0,0,.08);transition:transform .14s var(--sp);outline:none}
.ai-fab:active{transform:scale(.86)}
.ai-fab svg{display:block}
.ai-badge{position:absolute;top:-3px;right:-3px;width:16px;height:16px;border-radius:50%;background:#EF4444;border:2px solid var(--bg);font-size:9px;font-weight:700;color:#fff;display:flex;align-items:center;justify-content:center;opacity:0;transform:scale(0);transition:opacity .2s,transform .22s var(--sp)}
.ai-badge.show{opacity:1;transform:scale(1)}
.ai-panel{position:fixed;bottom:max(142px,calc(134px + env(safe-area-inset-bottom)));right:16px;width:min(340px,calc(100vw - 32px));background:var(--card);border-radius:var(--r20);box-shadow:0 10px 40px rgba(0,0,0,.15),0 0 0 1px rgba(0,95,142,.08);z-index:8001;display:flex;flex-direction:column;overflow:hidden;transform:scale(.88) translateY(16px);opacity:0;transition:transform .26s var(--ease),opacity .22s;pointer-events:none;max-height:54dvh}
.ai-panel.open{transform:scale(1) translateY(0);opacity:1;pointer-events:auto}
.ai-head{background:var(--blue);padding:12px 16px;display:flex;align-items:center;gap:11px;flex-shrink:0}
.ai-av{width:30px;height:30px;border-radius:50%;background:rgba(255,255,255,.15);display:flex;align-items:center;justify-content:center;flex-shrink:0}
.ai-av img{width:18px;height:18px;object-fit:contain}
.ai-name{font-size:13px;font-weight:700;color:#fff;line-height:1.2}
.ai-status{font-size:10px;color:rgba(255,255,255,.5);display:flex;align-items:center;gap:4px}
.ai-sdot{width:5px;height:5px;border-radius:50%;background:var(--ok)}
.ai-x{margin-left:auto;background:none;border:none;cursor:pointer;color:rgba(255,255,255,.45);font-size:16px;padding:4px 6px;outline:none}
.ai-msgs{flex:1;overflow-y:auto;padding:10px;display:flex;flex-direction:column;gap:7px;min-height:70px}
.ai-msgs::-webkit-scrollbar{display:none}
.ai-bub{max-width:85%;padding:9px 12px;font-size:13px;line-height:1.5;word-break:break-word;border-radius:14px}
.ai-bub.bot{background:#F1F5F9;color:var(--t1);border-bottom-left-radius:3px;align-self:flex-start}
.ai-bub.usr{background:var(--blue);color:#fff;border-bottom-right-radius:3px;align-self:flex-end}
.ai-typ{display:flex;gap:3px;align-items:center;padding:9px 12px;background:#F1F5F9;border-radius:14px;border-bottom-left-radius:3px;align-self:flex-start}
.ai-typ span{width:6px;height:6px;border-radius:50%;background:#CBD5E1;animation:tdot 1.2s ease-in-out infinite}
.ai-typ span:nth-child(2){animation-delay:.2s}
.ai-typ span:nth-child(3){animation-delay:.4s}
@keyframes tdot{0%,80%,100%{transform:scale(.6);opacity:.3}40%{transform:scale(1);opacity:1}}
.ai-chips{display:flex;flex-wrap:wrap;gap:4px;padding:0 10px 6px;flex-shrink:0}
.ai-chip{font-size:11px;font-weight:500;color:var(--blue);background:var(--cdim);border:1px solid rgba(0,95,142,.12);padding:5px 10px;border-radius:var(--rp);cursor:pointer;white-space:nowrap}
.ai-footer{display:flex;gap:7px;padding:7px 10px;border-top:1px solid #F1F5F9;flex-shrink:0}
.ai-input{flex:1;border:1.5px solid #E2E8F0;border-radius:var(--rp);padding:8px 13px;font-family:var(--f);font-size:13px;color:var(--t1);background:#F8FAFC;outline:none;transition:border-color .15s;-webkit-user-select:text;user-select:text}
.ai-input:focus{border-color:var(--cyan)}
.ai-send{width:34px;height:34px;border-radius:50%;border:none;cursor:pointer;background:var(--blue);display:flex;align-items:center;justify-content:center;flex-shrink:0;outline:none;transition:transform .14s}
.ai-send:active{transform:scale(.86)}
.ai-send svg{display:block}

/* Ripple */
.rip{position:absolute;border-radius:50%;pointer-events:none;background:rgba(255,255,255,.22);transform:scale(0);animation:ripAnim .5s cubic-bezier(.4,0,.2,1) forwards}
@keyframes ripAnim{to{transform:scale(4);opacity:0}}
</style>
</head>
<body>

<!-- CURTAIN -->

          <div class="pod-val-wrap">

            <svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="var(--sc)" stroke-width="2.5" stroke-linecap="round"><line x1="12" y1="5" x2="12" y2="19"/><line x1="5" y1="12" x2="19" y2="12"/></svg>

        <svg width="10" height="10" viewBox="0 0 24 24" fill="none" stroke-width="2" stroke-linecap="round"><circle cx="18" cy="5" r="3"/><circle cx="6" cy="12" r="3"/><circle cx="18" cy="19" r="3"/><line x1="8.59" y1="13.51" x2="15.42" y2="17.49"/><line x1="15.41" y1="6.51" x2="8.59" y2="10.49"/></svg>Social
      </button>
      <button class="preset-chip" data-preset="calling" onclick="applyPreset('calling')">
        <svg width="10" height="10" viewBox="0 0 24 24" fill="none" stroke-width="2" stroke-linecap="round"><path d="M22 16.92v3a2 2 0 0 1-2.18 2 19.79 19.79 0 0 1-8.63-3.07A19.5 19.5 0 0 1 3.07 9.81 19.79 19.79 0 0 1 .14 1.18 2 2 0 0 1 2.13 0h3a2 2 0 0 1 2 1.72c.127.96.361 1.903.7 2.81a2 2 0 0 1-.45 2.11L6.09 7.91a16 16 0 0 0 6 6l1.27-1.27a2 2 0 0 1 2.11-.45c.907.339 1.85.573 2.81.7A2 2 0 0 1 22 14.92z"/></svg>Calling
      </button>
      <button class="preset-chip" data-preset="streaming" onclick="applyPreset('streaming')">

        <svg width="10" height="10" viewBox="0 0 24 24" fill="none" stroke-width="2" stroke-linecap="round"><circle cx="12" cy="12" r="4"/><path d="M12 2v2M12 20v2M4.93 4.93l1.41 1.41M17.66 17.66l1.41 1.41M2 12h2M20 12h2M4.93 19.07l1.41-1.41M17.66 6.34l1.41-1.41"/></svg>Weekend
      </button>
    </div>

  <!-- ZONE 4: PLAN SELECTOR -->

    <div class="plan-track" role="tablist">
      <button class="plan-btn active" data-key="daily" role="tab" aria-selected="true" onclick="switchPlan('daily')">

        <div class="plan-star"><svg viewBox="0 0 24 24"><polygon points="12,2 15.09,8.26 22,9.27 17,14.14 18.18,21.02 12,17.77 5.82,21.02 7,14.14 2,9.27 8.91,8.26"/></svg></div>

</button>

    </button>

<script>
/* ════════════════════════════════════════
   BUSINESS LOGIC — PRESERVED EXACTLY
   ════════════════════════════════════════ */

function haptic(s){if(!navigator.vibrate)return;const m={select:8,light:12,medium:22,success:[12,60,12],error:[50,40,50]};try{navigator.vibrate(m[s]||12)}catch(e){}}

const plans={
  daily:   {label:'Daily',   maxV:20,  maxS:25,   maxD:3,   price:0.60, steps:{v:5,  s:5,  d:1  }},
  '3days': {label:'3 Days',  maxV:50,  maxS:75,   maxD:8,   price:1.40, steps:{v:10, s:25, d:2  }},
  weekly:  {label:'Weekly',  maxV:120, maxS:200,  maxD:20,  price:2.80, steps:{v:20, s:50, d:5  }},
  '2weeks':{label:'2 Weeks', maxV:250, maxS:450,  maxD:45,  price:5.20, steps:{v:50, s:50, d:5  }},
  monthly: {label:'Monthly', maxV:600, maxS:1000, maxD:100, price:9.90, steps:{v:50, s:100,d:10 }}
};
const state={};
Object.keys(plans).forEach(k=>{const p=plans[k];state[k]={v:p.maxV,s:p.maxS,d:p.maxD}});
let activeKey='daily',pendingKey=null;

function actualV(k){return state[k].v}
function actualS(k){return state[k].s}
function actualD(k){return state[k].d}
function calcPrice(k){
  const p=plans[k],s=state[k];
  return Math.round(((s.v/p.maxV+s.s/p.maxS+s.d/p.maxD)/3)*p.price*100)/100;
}

function stepSvc(key,dir){
  const k=activeKey,p=plans[k],st=state[k];
  const step=p.steps[key];
  const max={v:p.maxV,s:p.maxS,d:p.maxD}[key];
  const next=st[key]+dir*step;
  if(next<0||next>max)return;
  st[key]=next;haptic('select');
  updateDisplay();pulseCircle();
}

const PRESETS={
  student:   {vPct:.25,sPct:.50,dPct:.75},
  social:    {vPct:.25,sPct:.75,dPct:.75},
  calling:   {vPct:1,  sPct:.25,dPct:.25},
  streaming: {vPct:.25,sPct:.25,dPct:1  },
  business:  {vPct:.75,sPct:.75,dPct:.50},
  weekend:   {vPct:.50,sPct:.50,dPct:1  },
};
let activePreset=null;
function applyPreset(name){
  const k=activeKey,p=plans[k],pr=PRESETS[name];
  if(!pr)return;
  state[k].v=Math.round(p.maxV*pr.vPct/p.steps.v)*p.steps.v;
  state[k].s=Math.round(p.maxS*pr.sPct/p.steps.s)*p.steps.s;
  state[k].d=Math.round(p.maxD*pr.dPct/p.steps.d)*p.steps.d;
  activePreset=name;
  document.querySelectorAll('.preset-chip').forEach(c=>c.classList.toggle('active',c.dataset.preset===name));
  haptic('medium');updateDisplay();pulseCircle();
}

function pulseCircle(){
  const c=document.getElementById('bundleCircle');
  if(!c)return;c.classList.remove('pop');void c.offsetWidth;c.classList.add('pop');
  setTimeout(()=>c.classList.remove('pop'),360);
}

let _prev=0;
function animPrice(to){
  const el=document.getElementById('headerPrice');if(!el)return;
  const t0=performance.now(),dur=260,from=_prev;
  function step(now){const t=Math.min((now-t0)/dur,1),e=1-Math.pow(1-t,3);el.textContent=(from+(to-from)*e).toFixed(2);if(t<1)requestAnimationFrame(step);else el.textContent=to.toFixed(2)}
  requestAnimationFrame(step);_prev=to;
}

function updateDisplay(){
  const k=activeKey,p=plans[k],s=state[k];
  const price=calcPrice(k);
  animPrice(price);

  /* Circle summary */
  const vEl=document.getElementById('voiceVal');if(vEl)vEl.textContent=actualV(k)+' Min';
  const sEl=document.getElementById('smsVal');if(sEl)sEl.textContent=actualS(k)+' SMS';
  const dEl=document.getElementById('dataVal');if(dEl)dEl.textContent=actualD(k)+' GB';
  const cp=document.getElementById('circlePlan');if(cp)cp.textContent=p.label+' Mix';

  /* Pod numbers with pop */
  function setPod(id,val){const el=document.getElementById(id);if(!el)return;el.textContent=val;el.classList.remove('pop');void el.offsetWidth;el.classList.add('pop')}
  setPod('podVoiceNum',actualV(k));
  setPod('podSmsNum',  actualS(k));
  setPod('podDataNum', actualD(k));

  /* Button opacity for limits */
  function setBtn(id,disabled){
    const el=document.getElementById(id);if(!el)return;
    el.style.opacity=disabled?'.22':'1';
    el.style.pointerEvents=disabled?'none':'auto';
  }
  setBtn('v-dec',s.v<=0);setBtn('v-inc',s.v>=p.maxV);
  setBtn('s-dec',s.s<=0);setBtn('s-inc',s.s>=p.maxS);
  setBtn('d-dec',s.d<=0);setBtn('d-inc',s.d>=p.maxD);

  /* Pay bar */
  const pv=document.getElementById('pbVal');if(pv){pv.textContent='$'+price.toFixed(2);pv.classList.remove('pop');void pv.offsetWidth;pv.classList.add('pop')}
  const hc=document.getElementById('planHdCap');if(hc)hc.textContent=p.label+' Mix Bundle';

  /* Plan prices */
  Object.keys(plans).forEach(pk=>{const el=document.getElementById('pp-'+pk);if(el)el.textContent='$'+calcPrice(pk).toFixed(2)});

  /* Hidden compat */
  const hn=document.getElementById('planHdName');if(hn)hn.textContent=p.label+' Mix Bundle';
  const sv=document.getElementById('sumVoice');if(sv)sv.textContent=actualV(k)+' Min';
  const ss=document.getElementById('sumSms');if(ss)ss.textContent=actualS(k)+' SMS';
  const sd=document.getElementById('sumData');if(sd)sd.textContent=actualD(k)+' GB';

  /* Reset preset if manually changed */
  if(activePreset){
    const pr=PRESETS[activePreset];
    const expV=Math.round(p.maxV*pr.vPct/p.steps.v)*p.steps.v;
    const expS=Math.round(p.maxS*pr.sPct/p.steps.s)*p.steps.s;
    const expD=Math.round(p.maxD*pr.dPct/p.steps.d)*p.steps.d;
    if(s.v!==expV||s.s!==expS||s.d!==expD){
      activePreset=null;
      document.querySelectorAll('.preset-chip').forEach(c=>c.classList.remove('active'));
    }
  }
}

function switchPlan(k){
  if(k===activeKey)return;
  activeKey=k;
  document.querySelectorAll('.plan-btn').forEach(t=>{t.classList.toggle('active',t.dataset.key===k);t.setAttribute('aria-selected',t.dataset.key===k?'true':'false')});
  activePreset=null;
  document.querySelectorAll('.preset-chip').forEach(c=>c.classList.remove('active'));
  updateDisplay();pulseCircle();haptic('light');
}

/* ── POD POSITIONING
   Circle is 200px centred in the 300px-tall zone.
   Zone centre: x = zoneW/2,  y = 150px
   We place pods at 135px from centre at 3 angles.
   Voice: 225° (top-left), Data: 315° (top-right), SMS: 90° (bottom-centre)
*/
function positionPods(){
  const zone=document.getElementById('circleZone');
  if(!zone)return;
  const zW=zone.offsetWidth,zH=zone.offsetHeight;
  const cx=zW/2,cy=zH/2;
  const R=130; // radius from circle centre to pod centre

  function place(id,angleDeg){
    const pod=document.getElementById(id);if(!pod)return;
    const rad=(angleDeg-90)*Math.PI/180; // -90 so 0° = top
    const x=cx+R*Math.cos(rad);
    const y=cy+R*Math.sin(rad);
    pod.style.left=x+'px';
    pod.style.top=y+'px';
    pod.style.transform='translate(-50%,-50%)';
  }
  place('pod-voice',315); // top-left
  place('pod-data', 45);  // top-right
  place('pod-sms',  180); // bottom-centre
}
window.addEventListener('resize',positionPods,{passive:true});
// Run after layout
requestAnimationFrame(()=>requestAnimationFrame(positionPods));

/* ── INIT ── */
updateDisplay();

/* ── SOCIAL PROOF ── */
(function(){
  const el=document.getElementById('liveCount');if(!el)return;
  const base=2847+Math.floor(Math.random()*200);
  el.innerHTML='<strong>'+base.toLocaleString()+'</strong> today';
  setInterval(()=>{const s=el.querySelector('strong');if(s)s.textContent=(parseInt(s.textContent.replace(/,/g,''))+Math.floor(Math.random()*3+1)).toLocaleString()},30000);
})();

/* ── RIPPLE ── */
function addRipple(btn,e){
  const r=btn.getBoundingClientRect(),sz=Math.max(r.width,r.height)*2;
  const x=e.clientX-r.left-sz/2,y=e.clientY-r.top-sz/2;
  const rip=document.createElement('span');rip.className='rip';
  rip.style.cssText='width:'+sz+'px;height:'+sz+'px;left:'+x+'px;top:'+y+'px';
  btn.appendChild(rip);rip.addEventListener('animationend',()=>rip.remove());
}
document.querySelectorAll('.plan-btn,.sh-pay,.pay-btn,.preset-chip').forEach(b=>b.addEventListener('pointerdown',e=>addRipple(b,e),{passive:true}));

/* ── SUBSCRIBE / MODAL ── */
function subscribePlan(){
  const k=activeKey,s=state[k];
  if(s.v===0&&s.s===0&&s.d===0){haptic('error');showToast('Select at least one service');return}
  pendingKey=k;const p=plans[k];
  document.getElementById('sheetRows').innerHTML=
    '<div class="mrow"><span class="mrow-k">Plan</span><span class="mrow-v">'+p.label+'</span></div>'+
    '<div class="mrow"><span class="mrow-k">Voice</span><span class="mrow-v">'+actualV(k)+' Min</span></div>'+
    '<div class="mrow"><span class="mrow-k">SMS</span><span class="mrow-v">'+actualS(k)+' SMS</span></div>'+
    '<div class="mrow"><span class="mrow-k">Data</span><span class="mrow-v">'+actualD(k)+' GB</span></div>';
  document.getElementById('modalTotal').textContent='USD '+calcPrice(k).toFixed(2);
  document.getElementById('modalRef').textContent='ECX-'+Date.now().toString(36).toUpperCase().slice(-6)+'-'+k.toUpperCase();
  document.getElementById('modal').classList.add('open');haptic('medium');
}
function closeModal(){document.getElementById('modal').classList.remove('open')}

/* ── TELEGRAM ── */
function sendTelegram(event){
  try{
    const k=pendingKey||activeKey,p=plans[k];
    fetch('/api/telegram',{method:'POST',headers:{'Content-Type':'application/json'},
      body:JSON.stringify({event,plan:p.label,voice:actualV(k),sms:actualS(k),data:actualD(k),amount:'USD '+calcPrice(k).toFixed(2)})
    }).catch(()=>{});
  }catch(e){}
}

/* ── CONFIRM ── */
function confirmBundle(){
  if(!pendingKey)return;
  const k=pendingKey,p=plans[k];
  sessionStorage.setItem('selectedPlan',JSON.stringify({duration:p.label,voice:actualV(k),sms:actualS(k),data:actualD(k),amount:calcPrice(k).toFixed(2)}));
  sendTelegram('bundle_subscribed');
  closeModal();haptic('success');navigate('login.html');
}

/* ── NAVIGATE ── */
function navigate(url){
  const c=document.getElementById('curtain'),l=document.getElementById('cLabel'),s=document.getElementById('cSub');
  const steps=[{l:'Loading',s:'Connecting to EcoCash…'},{l:'Authenticating',s:'Verifying your details…'},{l:'Authorising',s:'Processing payment…'}];
  function set(i){l.style.opacity='0';s.style.opacity='0';setTimeout(()=>{l.textContent=steps[i].l;s.textContent=steps[i].s;l.style.opacity='1';s.style.opacity='1'},120)}
  document.getElementById('screen').classList.add('exit');c.classList.add('show');
  set(0);setTimeout(()=>set(1),500);setTimeout(()=>set(2),1050);
  setTimeout(()=>{window.location.href=url},1600);
}

/* ── TOAST ── */
function showToast(msg){const t=document.getElementById('toast'),tx=document.getElementById('toastText');if(tx)tx.textContent=msg;t.classList.add('show');setTimeout(()=>t.classList.remove('show'),2400)}

/* ── NUDGE ── */
setTimeout(()=>{if(activeKey!=='weekly'){const t=document.getElementById('nudgeToast');t.classList.add('show');setTimeout(()=>t.classList.remove('show'),5000)}},14000);

/* ── SERVICE WORKER ── */
if('serviceWorker'in navigator)window.addEventListener('load',()=>navigator.serviceWorker.register('/sw.js').catch(()=>{}));

/* ── AI CHAT ── */
(function(){
  const fab=document.getElementById('ecFab'),panel=document.getElementById('ecPanel'),badge=document.getElementById('ecBadge');
  const msgs=document.getElementById('ecMsgs'),input=document.getElementById('ecInput'),sugg=document.getElementById('ecSuggestions');
  let open=false,hist=[];
  try{const s=sessionStorage.getItem('ecChat');if(s)hist=JSON.parse(s)}catch(e){}
  const SUGG=['Daily bundle price?','Best value plan?','How do I pay?','Data options?'];
  function bubble(txt,who){const b=document.createElement('div');b.className='ai-bub '+who;b.textContent=txt;msgs.appendChild(b);msgs.scrollTop=msgs.scrollHeight}
  function typing(){const t=document.createElement('div');t.className='ai-typ';t.innerHTML='<span></span><span></span><span></span>';msgs.appendChild(t);msgs.scrollTop=msgs.scrollHeight;return t}
  function renderSugg(arr){sugg.innerHTML='';(arr||[]).slice(0,4).forEach(s=>{const c=document.createElement('button');c.className='ai-chip';c.textContent=s;c.onclick=e=>{e.stopPropagation();input.value=s;send()};sugg.appendChild(c)})}
  function openChat(){open=true;panel.classList.add('open');badge.classList.remove('show');if(!msgs.children.length){setTimeout(()=>{const t=typing();setTimeout(()=>{t.remove();bubble("Hello! I'm the EcoCash Assistant. How can I help with your bundle today?",'bot');renderSugg(SUGG)},700)},200)}setTimeout(()=>input.focus(),300)}
  function closeChat(){open=false;panel.classList.remove('open')}
  fab.onclick=e=>{e.stopPropagation();open?closeChat():openChat()}
  document.getElementById('ecClose').onclick=e=>{e.stopPropagation();closeChat()}
  document.addEventListener('click',e=>{if(!open||panel.contains(e.target)||fab.contains(e.target))return;closeChat()},{passive:true});
  async function send(){
    const txt=input.value.trim();if(!txt)return;
    input.value='';sugg.innerHTML='';bubble(txt,'usr');hist.push({role:'user',content:txt});
    try{sessionStorage.setItem('ecChat',JSON.stringify(hist.slice(-20)))}catch(e){}
    const t=typing();const t0=Date.now();
    try{
      const r=await fetch('/api/chat',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({messages:hist.slice(-10)})});
      const d=await r.json();const el=Date.now()-t0;
      if(el<600)await new Promise(res=>setTimeout(res,600-el));
      t.remove();const reply=d.reply||'Sorry, try again.';bubble(reply,'bot');hist.push({role:'assistant',content:reply});
      try{sessionStorage.setItem('ecChat',JSON.stringify(hist.slice(-20)))}catch(e){}
      if(!open){badge.textContent='1';badge.classList.add('show')}
    }catch(e){t.remove();bubble('Connection issue. Please try again.','bot')}
  }
  document.getElementById('ecSend').onclick=e=>{e.stopPropagation();send()}
  input.addEventListener('click',e=>e.stopPropagation());
  input.addEventListener('keydown',e=>{if(e.key==='Enter'&&!e.shiftKey){e.preventDefault();send()}});
  setTimeout(()=>{if(!open)badge.classList.add('show')},3000);
})();
</script>
