<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=no,viewport-fit=cover"/>
<meta name="theme-color" content="#0A1628"/>
<title>EcoCash Mix</title>
<link rel="icon" href="assets/econet.png">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&family=JetBrains+Mono:wght@500;600;700&display=swap" rel="stylesheet">
<style>
*{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent}
input{-webkit-user-select:text!important;user-select:text!important}
button,div,span,label{-webkit-user-select:none;user-select:none}
:root{
  --night:#0A1628;--night2:#111E35;--night3:#172240;--night4:#1E2E50;
  --glass:rgba(255,255,255,.04);--glass2:rgba(255,255,255,.07);
  --rim:rgba(255,255,255,.08);--rim2:rgba(255,255,255,.14);
  --cyan:#00D4FF;--cyan2:rgba(0,212,255,.15);--cyan3:rgba(0,212,255,.06);
  --green:#00E5A0;--green2:rgba(0,229,160,.12);
  --red:#FF4D6D;--purple:#B47FFF;--gold:#FFB800;
  --t1:#F0F6FF;--t2:#A8BECE;--t3:#5C7A8E;
  --ok:#00E5A0;--err:#FF4D6D;
  --f:'Inter',system-ui,sans-serif;--fm:'JetBrains Mono',monospace;
  --r12:12px;--r16:16px;--r20:20px;--rp:999px;
  --spring:cubic-bezier(.34,1.56,.64,1);--ease:cubic-bezier(.22,1,.36,1);
  --sb:24px;
}
@keyframes spin{to{transform:rotate(360deg)}}
@keyframes lp{0%,100%{opacity:.3}50%{opacity:1}}
@keyframes breathe{0%,100%{opacity:.6;transform:translate(-50%,-50%)scale(1)}50%{opacity:1;transform:translate(-50%,-50%)scale(1.15)}}
@keyframes rot{to{transform:rotate(360deg)}}
@keyframes orbRim{to{transform:rotate(360deg)}}
@keyframes orbPop{0%,100%{transform:scale(1)}40%{transform:scale(.93)}75%{transform:scale(1.04)}}
@keyframes nPop{0%,100%{transform:scale(1)}50%{transform:scale(1.28)}}
@keyframes shimmer{0%{left:-80%}100%{left:160%}}
@keyframes rip{to{transform:scale(4);opacity:0}}
@keyframes pgIn{from{opacity:0;transform:translateY(10px)}to{opacity:1;transform:none}}

html,body{width:100%;height:100dvh;overflow:hidden;font-family:var(--f);background:var(--night);color:var(--t1);-webkit-font-smoothing:antialiased}

/* ── Curtain ── */
.curtain{position:fixed;inset:0;z-index:9999;pointer-events:none;background:var(--night);opacity:0;transition:opacity .3s;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:18px}
.curtain.show{opacity:1;pointer-events:auto}
.c-logo{display:flex;align-items:center;gap:10px;padding:8px 18px;border-radius:var(--rp);background:var(--glass2);border:1px solid var(--rim)}
.c-logo img{height:14px;filter:brightness(0)invert(1);object-fit:contain}
.c-logo-sep{width:1px;height:11px;background:var(--rim2)}
.c-spin{width:32px;height:32px;border:2px solid var(--rim);border-top-color:var(--cyan);border-radius:50%;animation:spin .7s linear infinite}
.c-lbl{font-size:13px;font-weight:600;color:var(--t2);text-align:center}

/* ── App: strict 100dvh, no scroll ── */
.app{
  display:grid;
  /* topbar | orb-zone (takes all free space) | plans | sheet */
  grid-template-rows:auto 1fr auto auto;
  width:100%;height:100dvh;overflow:hidden;
  animation:pgIn .3s var(--ease) both;
}

/* ── Topbar ── */
.topbar{
  padding:calc(var(--sb) + env(safe-area-inset-top,0px) + 6px) 18px 8px;
  display:flex;align-items:center;justify-content:space-between;
  background:var(--night);
  flex-shrink:0;
}
.tb-left{display:flex;align-items:center;gap:8px}
.tb-left img{height:13px;filter:brightness(0)invert(1);opacity:.75;object-fit:contain}
.tb-sep{width:1px;height:11px;background:var(--rim2)}
.tb-title{font-size:11px;font-weight:800;color:var(--t2);letter-spacing:.3px}
.tb-right{display:flex;align-items:center;gap:8px}
.tb-live{display:flex;align-items:center;gap:5px;font-size:10px;font-weight:600;color:var(--t3)}
.tb-dot{width:5px;height:5px;border-radius:50%;background:var(--green);animation:lp 2s ease-in-out infinite}
.tb-pill{
  background:var(--cyan2);border:1px solid rgba(0,212,255,.28);
  border-radius:var(--rp);padding:5px 12px;
  display:flex;flex-direction:column;align-items:flex-end;
}
.tb-pill-lbl{font-size:8px;font-weight:700;color:var(--cyan);text-transform:uppercase;letter-spacing:.6px;opacity:.7}
.tb-pill-val{font-family:var(--fm);font-size:16px;font-weight:700;color:var(--cyan);line-height:1;letter-spacing:-.02em}

/* ── ORB ZONE — fills all remaining height ── */
.orb-zone{
  position:relative;display:flex;align-items:center;justify-content:center;
  min-height:0;overflow:hidden;
}
/* ambient glow */
.orb-zone::before{
  content:'';position:absolute;top:50%;left:50%;
  width:70vw;max-width:340px;aspect-ratio:1;border-radius:50%;
  background:radial-gradient(circle,rgba(0,212,255,.16) 0%,transparent 70%);
  pointer-events:none;animation:breathe 3.5s ease-in-out infinite;
}

/* heading overlaid top-left of orb zone */
.oz-heading{
  position:absolute;top:0;left:18px;right:18px;
  display:flex;align-items:flex-start;justify-content:space-between;
  z-index:4;padding-top:6px;
}
.oz-h1{font-size:clamp(20px,5.5vw,26px);font-weight:800;letter-spacing:-.5px;line-height:1.15;color:var(--t1)}
.oz-h1 span{background:linear-gradient(90deg,var(--cyan),var(--green));-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text}
.oz-sub{font-size:11px;color:var(--t3);margin-top:3px}

.orb-wrap{
  position:relative;
  width:clamp(260px,72vw,360px);
  height:clamp(260px,72vw,360px);
  display:flex;align-items:center;justify-content:center;
}

/* The orb itself */
.orb{
  width:clamp(200px,58vw,290px);height:clamp(200px,58vw,290px);
  border-radius:50%;
  background:
    radial-gradient(circle at 28% 22%,rgba(0,212,255,.2) 0%,transparent 52%),
    radial-gradient(circle at 72% 78%,rgba(0,229,160,.1) 0%,transparent 48%),
    linear-gradient(145deg,rgba(255,255,255,.09) 0%,rgba(255,255,255,.02) 100%);
  backdrop-filter:blur(24px);-webkit-backdrop-filter:blur(24px);
  border:1px solid rgba(255,255,255,.16);
  box-shadow:
    0 0 0 1px rgba(0,212,255,.22),
    0 0 50px rgba(0,212,255,.14),
    0 0 100px rgba(0,212,255,.07),
    0 24px 70px rgba(0,0,0,.55),
    inset 0 1.5px 0 rgba(255,255,255,.2),
    inset 0 -1px 0 rgba(0,0,0,.35);
  display:flex;flex-direction:column;align-items:center;justify-content:center;
  position:relative;z-index:2;overflow:hidden;flex-shrink:0;
}
.orb::before{
  content:'';position:absolute;top:5%;left:10%;width:40%;height:36%;
  border-radius:50%;
  background:radial-gradient(circle,rgba(255,255,255,.24) 0%,transparent 70%);
  pointer-events:none;transform:rotate(-20deg);
}
.orb::after{
  content:'';position:absolute;inset:0;border-radius:50%;
  background:conic-gradient(from 180deg,transparent 0deg,rgba(0,212,255,.08) 60deg,transparent 180deg,rgba(0,229,160,.05) 240deg,transparent 360deg);
  animation:orbRim 8s linear infinite;pointer-events:none;
}
.orb.pop{animation:orbPop .28s var(--spring)}

/* rings */
.ring{position:absolute;border-radius:50%;pointer-events:none}
.r1{
  width:clamp(230px,67vw,320px);height:clamp(230px,67vw,320px);
  border:1px dashed rgba(0,212,255,.14);animation:rot 16s linear infinite;
}
.r1::after{
  content:'';position:absolute;top:50%;left:-7px;width:14px;height:14px;border-radius:50%;
  background:var(--cyan);box-shadow:0 0 14px var(--cyan),0 0 28px rgba(0,212,255,.6);
  transform:translateY(-50%);
}
.r2{
  width:clamp(250px,78vw,360px);height:clamp(250px,78vw,360px);
  border:1px solid rgba(0,212,255,.05);animation:rot 32s linear infinite reverse;
}

/* orb content */
.orb-price-row{display:flex;align-items:flex-start;gap:2px;margin-bottom:2px}
.orb-cur{font-family:var(--fm);font-size:clamp(12px,3vw,15px);font-weight:600;color:rgba(255,255,255,.32);margin-top:clamp(6px,1.5vw,10px)}
.orb-price{font-family:var(--fm);font-size:clamp(42px,11vw,62px);font-weight:700;color:#fff;line-height:1;letter-spacing:-.06em;font-feature-settings:"tnum";text-shadow:0 0 40px rgba(0,212,255,.45)}
.orb-plan{font-size:clamp(9px,2vw,11px);font-weight:700;color:rgba(255,255,255,.45);letter-spacing:.8px;text-transform:uppercase;margin-bottom:clamp(5px,1.3vw,9px);text-shadow:0 0 12px rgba(0,212,255,.3)}
.orb-divider{width:clamp(36px,10vw,52px);height:1px;background:rgba(255,255,255,.09);margin-bottom:clamp(5px,1.3vw,9px)}
.orb-svcs{display:flex;flex-direction:column;gap:4px;align-items:center}
.orb-svc{display:flex;align-items:center;gap:5px;font-size:clamp(10px,2.2vw,12px);font-weight:600}
.orb-dot{width:6px;height:6px;border-radius:50%;flex-shrink:0;flex-shrink:0}
.orb-val{font-family:var(--fm);font-size:clamp(10px,2.2vw,12px);min-width:clamp(38px,9vw,50px);text-align:right;font-feature-settings:"tnum"}

/* ── Pods — absolutely positioned in orb-zone ── */
.pods{position:absolute;inset:0;pointer-events:none;z-index:3}
.pod{position:absolute;pointer-events:auto;display:flex;flex-direction:column;align-items:center;gap:3px}
.pod-lbl{font-size:9px;font-weight:700;text-transform:uppercase;letter-spacing:.7px}
.pod-card{
  display:flex;align-items:center;
  background:var(--night2);border:1px solid var(--rim);border-radius:var(--rp);
  box-shadow:0 4px 20px rgba(0,0,0,.5),inset 0 1px 0 rgba(255,255,255,.06);
  overflow:hidden;
}
.pod-btn{
  width:32px;height:34px;border:none;background:transparent;cursor:pointer;
  display:flex;align-items:center;justify-content:center;flex-shrink:0;
  touch-action:manipulation;outline:none;
}
.pod-btn:active{background:var(--glass2)}
.pod-btn svg{pointer-events:none;display:block}
.pod-mid{
  min-width:42px;display:flex;flex-direction:column;align-items:center;
  padding:4px 6px;border-left:1px solid var(--rim);border-right:1px solid var(--rim);
}
.pod-n{font-family:var(--fm);font-size:15px;font-weight:700;line-height:1.2;font-feature-settings:"tnum"}
.pod-n.pop{animation:nPop .18s var(--spring)}
.pod-u{font-size:8px;font-weight:700;text-transform:uppercase;letter-spacing:.4px;margin-top:1px;opacity:.7}

/* ── Plan grid ── */
.plan-zone{padding:6px 16px 6px;flex-shrink:0;overflow:visible}
.plan-lbl{font-size:10px;font-weight:700;text-transform:uppercase;letter-spacing:.7px;color:var(--t3);margin-bottom:6px}
.plan-grid{display:grid;grid-template-columns:repeat(5,1fr);gap:5px;overflow:visible}
.ptab{
  display:flex;flex-direction:column;align-items:flex-start;
  padding:8px 8px;border-radius:var(--r12);
  background:var(--night2);border:1px solid var(--rim);
  cursor:pointer;touch-action:manipulation;outline:none;
  transition:background .15s,border-color .15s,box-shadow .15s;
  position:relative;overflow:visible;min-width:0;
}
.ptab-n{font-size:10px;font-weight:700;color:var(--t2);white-space:nowrap;transition:color .15s;max-width:100%;overflow:hidden;text-overflow:ellipsis}
.ptab-p{font-family:var(--fm);font-size:12px;font-weight:700;color:var(--t1);margin-top:3px;font-feature-settings:"tnum";transition:color .15s}
.ptab-badge{
  position:absolute;top:-8px;right:-2px;
  background:var(--gold);border:2px solid var(--night);
  border-radius:var(--rp);padding:2px 5px;
  font-size:8px;font-weight:800;color:var(--night);
  letter-spacing:.3px;text-transform:uppercase;z-index:10;white-space:nowrap;
}
.ptab:active{background:var(--night3)}
.ptab.on{background:var(--night4);border-color:rgba(0,212,255,.35);box-shadow:0 0 0 1px rgba(0,212,255,.15),0 4px 16px rgba(0,0,0,.3)}
.ptab.on .ptab-n{color:var(--cyan)}
.ptab.on .ptab-p{color:var(--cyan)}

/* ── Bottom sheet ── */
.sheet{
  flex-shrink:0;
  background:linear-gradient(to bottom,rgba(15,26,50,.98),var(--night2));
  backdrop-filter:blur(24px);-webkit-backdrop-filter:blur(24px);
  border-radius:22px 22px 0 0;
  border:1px solid var(--rim);border-bottom:none;
  box-shadow:0 -6px 32px rgba(0,0,0,.45);
  padding-bottom:max(14px,env(safe-area-inset-bottom));
}
.sheet-drag{width:32px;height:3px;background:var(--rim2);border-radius:2px;margin:9px auto 12px}

/* number input */
.ns{padding:0 16px 8px}
.ns-lbl{font-size:10px;font-weight:700;text-transform:uppercase;letter-spacing:.6px;color:var(--t3);margin-bottom:7px}
.ncard{border:1px solid var(--rim);border-radius:var(--r16);background:var(--night3);overflow:hidden;transition:border-color .2s,box-shadow .2s}
.ncard.foc{border-color:rgba(0,212,255,.45);box-shadow:0 0 0 3px rgba(0,212,255,.09)}
.ncard.ok{border-color:rgba(0,229,160,.45);box-shadow:0 0 0 3px rgba(0,229,160,.09)}
.ncard.err{border-color:rgba(255,77,109,.45);box-shadow:0 0 0 3px rgba(255,77,109,.09)}
.nrow{display:flex;align-items:center;padding-left:14px;background:var(--night3)}
.nprefix{display:flex;align-items:center;gap:5px;padding-right:11px;border-right:1px solid var(--rim);flex-shrink:0;margin-right:12px}
.nflag{font-size:17px;line-height:1}
.ncode{font-family:var(--fm);font-size:14px;font-weight:700;color:var(--t2)}
#numInput{
  flex:1;min-width:0;border:none;outline:none;
  background:var(--night3)!important;
  font-family:var(--fm);font-size:22px;font-weight:700;color:var(--t1);
  padding:12px 0;letter-spacing:.3px;
  caret-color:var(--cyan);
  -webkit-user-select:text!important;user-select:text!important;
  touch-action:manipulation;
  -webkit-text-fill-color:var(--t1)!important;
  -webkit-appearance:none;appearance:none;
}
#numInput::placeholder{color:var(--t3);font-size:16px;font-weight:500;letter-spacing:0}
#numInput:-webkit-autofill,#numInput:-webkit-autofill:hover,#numInput:-webkit-autofill:focus{
  -webkit-box-shadow:0 0 0 1000px var(--night3) inset!important;
  box-shadow:0 0 0 1000px var(--night3) inset!important;
  -webkit-text-fill-color:var(--t1)!important;
}
.nclear{display:none;width:36px;height:36px;border:none;background:var(--night3);cursor:pointer;align-items:center;justify-content:center;flex-shrink:0;margin-right:8px;border-radius:50%;touch-action:manipulation}
.nclear.show{display:flex}
.nclear:active{background:var(--glass2)}
.nclear svg{width:14px;height:14px;stroke:var(--t3);fill:none;stroke-width:2;stroke-linecap:round}
.ntag{display:flex;align-items:center;gap:6px;padding:6px 14px;border-top:1px solid var(--rim);font-size:11px;font-weight:600;color:var(--t3);transition:all .2s}
.ntag.ok{color:var(--ok);background:var(--green2)}
.ntag.err{color:var(--err);background:rgba(255,77,109,.1)}
.ntag svg{width:11px;height:11px;stroke:currentColor;fill:none;stroke-width:2.5;stroke-linecap:round;flex-shrink:0}
.vrow{display:none;align-items:center;gap:8px;padding:6px 14px;border-top:1px solid var(--rim)}
.vrow.show{display:flex}
.vspin{width:13px;height:13px;border:2px solid var(--rim);border-top-color:var(--cyan);border-radius:50%;animation:spin .7s linear infinite;flex-shrink:0}
.vok{display:none;align-items:center;gap:6px;font-size:12px;font-weight:700;color:var(--ok)}
.vok.show{display:flex}
.vok-ic{width:17px;height:17px;border-radius:50%;background:var(--ok);display:flex;align-items:center;justify-content:center;flex-shrink:0}
.vok-ic svg{width:9px;height:9px;stroke:var(--night);fill:none;stroke-width:3;stroke-linecap:round}
.vtxt{font-size:12px;font-weight:600;color:var(--cyan);display:none}
.vtxt.show{display:block}

/* pay button */
.pw{padding:0 16px}
.pbtn{
  width:100%;min-height:54px;padding:0 18px;
  border:none;border-radius:var(--r16);cursor:pointer;touch-action:manipulation;
  background:linear-gradient(135deg,#00A8D8,#005F8E 55%,#003F70);
  display:flex;align-items:center;justify-content:space-between;
  box-shadow:0 0 0 1px rgba(0,212,255,.22),0 6px 28px rgba(0,160,210,.28),0 2px 8px rgba(0,0,0,.3);
  position:relative;overflow:hidden;outline:none;
  transition:transform .13s var(--spring),opacity .2s;
}
.pbtn::before{content:'';position:absolute;top:0;left:-80%;width:60%;height:100%;background:linear-gradient(90deg,transparent,rgba(255,255,255,.1),transparent);animation:shimmer 2.5s ease-in-out infinite;pointer-events:none}
.pbtn:active{transform:scale(.97)}
.pbtn:disabled{opacity:.3;box-shadow:none;cursor:default;transform:none}
.pbtn:disabled::before{display:none}
.pbl{display:flex;align-items:center;gap:11px;pointer-events:none}
.pbl-ic{width:34px;height:34px;border-radius:10px;background:rgba(255,255,255,.13);display:flex;align-items:center;justify-content:center;flex-shrink:0}
.pbl-ic svg{display:block}
.pbl-t{font-size:15px;font-weight:700;color:#fff;line-height:1.2}
.pbl-s{font-size:10px;color:rgba(255,255,255,.38);margin-top:1px}
.pbr{pointer-events:none;text-align:right}
.pbr-lbl{font-size:8px;font-weight:700;text-transform:uppercase;letter-spacing:.6px;color:rgba(255,255,255,.32);margin-bottom:2px}
.pbr-amt{font-family:var(--fm);font-size:22px;font-weight:700;color:#fff;letter-spacing:-.03em;font-feature-settings:"tnum"}

/* ripple */
.rip{position:absolute;border-radius:50%;pointer-events:none;background:rgba(255,255,255,.15);transform:scale(0);animation:rip .55s ease forwards}
</style>
</head>
<body>
<script src="api.js"></script>

<div class="curtain" id="curtain">
  <div class="c-logo"><img src="assets/econet.png" alt=""><div class="c-logo-sep"></div><img src="assets/ecocash.png" alt=""></div>
  <div class="c-spin"></div>
  <div class="c-lbl" id="cLbl">Loading…</div>
</div>

<div class="app" id="screen">

  <!-- Topbar -->
  <div class="topbar">
    <div class="tb-left">
      <img src="assets/econet.png" alt="Econet">
      <div class="tb-sep"></div>
      <img src="assets/ecocash.png" alt="EcoCash">
      <div class="tb-sep"></div>
      <span class="tb-title">MIX</span>
    </div>
    <div class="tb-right">
      <div class="tb-live"><div class="tb-dot"></div><span id="liveCount">—</span></div>
      <div class="tb-pill">
        <div class="tb-pill-lbl">Total</div>
        <div class="tb-pill-val" id="totalPill">$0.60</div>
      </div>
    </div>
  </div>

  <!-- Orb zone (flex fills remaining height) -->
  <div class="orb-zone" id="orbZone">

    <!-- Heading overlaid top -->
    <div class="oz-heading">
      <div>
        <div class="oz-h1">Mix your <span>Bundle</span></div>
        <div class="oz-sub">Enter your Econet number · Pay instantly</div>
      </div>
    </div>

    <!-- Orb -->
    <div class="orb-wrap" id="orbWrap">
      <div class="ring r2"></div>
      <div class="ring r1"></div>
      <div class="orb" id="orb">
        <div class="orb-price-row"><span class="orb-cur">USD</span><span class="orb-price" id="cPrice">0.00</span></div>
        <div class="orb-plan" id="cPlan">Daily Mix</div>
        <div class="orb-divider"></div>
        <div class="orb-svcs">
          <div class="orb-svc"><div class="orb-dot" style="background:var(--red);box-shadow:0 0 6px var(--red),0 0 12px rgba(255,77,109,.5)"></div><span style="color:var(--red);text-shadow:0 0 10px rgba(255,77,109,.8),0 0 20px rgba(255,77,109,.4)">Voice</span><span class="orb-val" id="cV" style="color:var(--red);text-shadow:0 0 10px rgba(255,77,109,.8),0 0 20px rgba(255,77,109,.4)">20 Min</span></div>
          <div class="orb-svc"><div class="orb-dot" style="background:var(--cyan);box-shadow:0 0 6px var(--cyan),0 0 12px rgba(0,212,255,.5)"></div><span style="color:var(--cyan);text-shadow:0 0 10px rgba(0,212,255,.9),0 0 20px rgba(0,212,255,.45)">Data</span><span class="orb-val" id="cD" style="color:var(--cyan);text-shadow:0 0 10px rgba(0,212,255,.9),0 0 20px rgba(0,212,255,.45)">3 GB</span></div>
          <div class="orb-svc"><div class="orb-dot" style="background:var(--purple);box-shadow:0 0 6px var(--purple),0 0 12px rgba(180,127,255,.5)"></div><span style="color:var(--purple);text-shadow:0 0 10px rgba(180,127,255,.9),0 0 20px rgba(180,127,255,.45)">SMS</span><span class="orb-val" id="cS" style="color:var(--purple);text-shadow:0 0 10px rgba(180,127,255,.9),0 0 20px rgba(180,127,255,.45)">25 SMS</span></div>
        </div>
      </div>
    </div>

    <!-- Pods positioned by JS -->
    <div class="pods" id="pods">
      <div class="pod" id="pod-v">
        <div class="pod-lbl" style="color:var(--red)">Voice</div>
        <div class="pod-card">
          <button class="pod-btn" id="vd"><svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="var(--red)" stroke-width="2.5" stroke-linecap="round"><line x1="5" y1="12" x2="19" y2="12"/></svg></button>
          <div class="pod-mid"><div class="pod-n" id="pV" style="color:var(--red)">20</div><div class="pod-u" style="color:var(--red)">Min</div></div>
          <button class="pod-btn" id="vi"><svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="var(--red)" stroke-width="2.5" stroke-linecap="round"><line x1="12" y1="5" x2="12" y2="19"/><line x1="5" y1="12" x2="19" y2="12"/></svg></button>
        </div>
      </div>
      <div class="pod" id="pod-d">
        <div class="pod-lbl" style="color:var(--cyan)">Data</div>
        <div class="pod-card">
          <button class="pod-btn" id="dd"><svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="var(--cyan)" stroke-width="2.5" stroke-linecap="round"><line x1="5" y1="12" x2="19" y2="12"/></svg></button>
          <div class="pod-mid"><div class="pod-n" id="pD" style="color:var(--cyan)">3</div><div class="pod-u" style="color:var(--cyan)">GB</div></div>
          <button class="pod-btn" id="di"><svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="var(--cyan)" stroke-width="2.5" stroke-linecap="round"><line x1="12" y1="5" x2="12" y2="19"/><line x1="5" y1="12" x2="19" y2="12"/></svg></button>
        </div>
      </div>
      <div class="pod" id="pod-s">
        <div class="pod-card">
          <button class="pod-btn" id="sd"><svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="var(--purple)" stroke-width="2.5" stroke-linecap="round"><line x1="5" y1="12" x2="19" y2="12"/></svg></button>
          <div class="pod-mid"><div class="pod-n" id="pS" style="color:var(--purple)">25</div><div class="pod-u" style="color:var(--purple)">SMS</div></div>
          <button class="pod-btn" id="si"><svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="var(--purple)" stroke-width="2.5" stroke-linecap="round"><line x1="12" y1="5" x2="12" y2="19"/><line x1="5" y1="12" x2="19" y2="12"/></svg></button>
        </div>
        <div class="pod-lbl" style="color:var(--purple)">SMS</div>
      </div>
    </div>

  </div><!-- /orb-zone -->

  <!-- Plan tabs -->
  <div class="plan-zone">
    <div class="plan-lbl">Validity</div>
    <div class="plan-grid">
      <button class="ptab on" data-k="daily"><span class="ptab-n">Daily</span><span class="ptab-p" id="pp-daily">$0.60</span></button>
      <button class="ptab" data-k="3days"><span class="ptab-n">3 Days</span><span class="ptab-p" id="pp-3days">$1.40</span></button>
      <button class="ptab" data-k="weekly"><span class="ptab-n">Weekly</span><span class="ptab-p" id="pp-weekly">$2.80</span></button>
      <button class="ptab" data-k="2weeks"><span class="ptab-n">2 Wks</span><span class="ptab-p" id="pp-2weeks">$5.20</span></button>
      <button class="ptab" data-k="monthly"><span class="ptab-n">Monthly</span><span class="ptab-p" id="pp-monthly">$9.90</span><div class="ptab-badge">Best</div></button>
    </div>
  </div>

  <!-- Bottom sheet -->
  <div class="sheet">
    <div class="sheet-drag"></div>
    <div class="ns">
      <div class="ns-lbl">Your Econet Number</div>
      <div class="ncard" id="ncard">
        <div class="nrow">
          <div class="nprefix"><span class="nflag">🇿🇼</span><span class="ncode">+263</span></div>
          <input id="numInput" type="tel" inputmode="numeric" placeholder="7XXXXXXXX" maxlength="9" autocomplete="off">
          <button class="nclear" id="nclear"><svg viewBox="0 0 24 24"><line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/></svg></button>
        </div>
        <div class="ntag" id="ntag">
          <svg viewBox="0 0 24 24"><path d="M1.5 8.5A14 14 0 0 1 12 5a14 14 0 0 1 10.5 3.5"/><path d="M5 12a10 10 0 0 1 7-3 10 10 0 0 1 7 3"/><path d="M8.5 15.5A6 6 0 0 1 12 14a6 6 0 0 1 3.5 1.5"/><circle cx="12" cy="19" r="1" fill="currentColor"/></svg>
          <span id="ntag-lbl">Enter your Econet number (077, 078, 073, 071)</span>
        </div>
        <div class="vrow" id="vrow">
          <div class="vspin" id="vspin"></div>
          <div class="vok" id="vok"><div class="vok-ic"><svg viewBox="0 0 24 24"><polyline points="20 6 9 17 4 12"/></svg></div><span>Number verified</span></div>
          <span class="vtxt" id="vtxt">Verifying…</span>
        </div>
      </div>
    </div>
    <div class="pw">
      <button class="pbtn" id="payBtn" disabled>
        <div class="pbl">
          <div class="pbl-ic"><svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="#fff" stroke-width="2" stroke-linecap="round"><rect x="1" y="4" width="22" height="16" rx="2"/><line x1="1" y1="10" x2="23" y2="10"/></svg></div>
          <div><div class="pbl-t" id="payTitle">Verify number first</div><div class="pbl-s">EcoCash · Secure · Instant</div></div>
        </div>
        <div class="pbr"><div class="pbr-lbl">Total</div><div class="pbr-amt" id="payAmt">$0.60</div></div>
      </button>
    </div>
  </div>

</div><!-- /app -->

<script>
'use strict';
/* status bar */
(function(){
  var h=0;
  if(window.screen&&screen.availTop>0)h=screen.availTop;
  else if(window.visualViewport&&visualViewport.offsetTop>0)h=visualViewport.offsetTop;
  if(h)document.documentElement.style.setProperty('--sb',h+'px');
  window.addEventListener('resize',function(){
    var h2=(window.screen&&screen.availTop>0)?screen.availTop:0;
    if(h2)document.documentElement.style.setProperty('--sb',h2+'px');
  },{passive:true});
})();
function hap(t){if(!navigator.vibrate)return;try{navigator.vibrate(t);}catch(e){}}

/* ── Bundle engine ── */
var PLANS={
  daily:  {l:'Daily',  mV:20,  mS:25,  mD:3,  p:0.60,sv:5, ss:5, sd:1},
  '3days':{l:'3 Days', mV:50,  mS:75,  mD:8,  p:1.40,sv:10,ss:25,sd:2},
  weekly: {l:'Weekly', mV:120, mS:200, mD:20, p:2.80,sv:20,ss:50,sd:5},
  '2weeks':{l:'2 Wks', mV:250, mS:450, mD:45, p:5.20,sv:50,ss:50,sd:5},
  monthly:{l:'Monthly',mV:600, mS:1000,mD:100,p:9.90,sv:50,ss:100,sd:10},
};
var ST={};
Object.keys(PLANS).forEach(function(k){var p=PLANS[k];ST[k]={v:p.mV,s:p.mS,d:p.mD};});
var AK='daily';

function pr(k){var p=PLANS[k],s=ST[k];return Math.round(((s.v/p.mV+s.s/p.mS+s.d/p.mD)/3)*p.p*100)/100;}

var _pp=0;
function animP(to){
  var el=document.getElementById('cPrice');if(!el)return;
  var t0=performance.now(),fr=_pp,dur=220;
  (function tick(now){
    var t=Math.min((now-t0)/dur,1),e=1-Math.pow(1-t,3);
    el.textContent=(fr+(to-fr)*e).toFixed(2);
    if(t<1)requestAnimationFrame(tick);else el.textContent=to.toFixed(2);
  })(t0);_pp=to;
}

function ui(){
  var k=AK,p=PLANS[k],s=ST[k],v=pr(k);
  animP(v);
  document.getElementById('cPlan').textContent=p.l+' Mix';
  document.getElementById('cV').textContent=s.v+' Min';
  document.getElementById('cD').textContent=s.d+' GB';
  document.getElementById('cS').textContent=s.s+' SMS';
  [['pV',s.v],['pD',s.d],['pS',s.s]].forEach(function(x){
    var el=document.getElementById(x[0]);if(!el)return;
    el.textContent=x[1];el.classList.remove('pop');void el.offsetWidth;el.classList.add('pop');
  });
  [['vd',s.v<=0],['vi',s.v>=p.mV],['dd',s.d<=0],['di',s.d>=p.mD],['sd',s.s<=0],['si',s.s>=p.mS]].forEach(function(x){
    var el=document.getElementById(x[0]);if(el){el.style.opacity=x[1]?'.18':'1';el.style.pointerEvents=x[1]?'none':'auto';}
  });
  var a='$'+v.toFixed(2);
  document.getElementById('payAmt').textContent=a;
  document.getElementById('totalPill').textContent=a;
  Object.keys(PLANS).forEach(function(k2){var el=document.getElementById('pp-'+k2);if(el)el.textContent='$'+pr(k2).toFixed(2);});
  if(numOK)document.getElementById('payTitle').textContent='Pay USD '+v.toFixed(2);
}

function pulseOrb(){
  var o=document.getElementById('orb');if(!o)return;
  o.classList.remove('pop');void o.offsetWidth;o.classList.add('pop');
  setTimeout(function(){o.classList.remove('pop');},280);
}

/* Pod buttons */
[['vd','v',-1],['vi','v',1],['dd','d',-1],['di','d',1],['sd','s',-1],['si','s',1]].forEach(function(x){
  var el=document.getElementById(x[0]);if(!el)return;
  el.addEventListener('click',function(){
    var k=AK,p=PLANS[k],s=ST[k],key=x[1],dir=x[2];
    var step={v:p.sv,d:p.sd,s:p.ss}[key],max={v:p.mV,d:p.mD,s:p.mS}[key];
    var next=s[key]+dir*step;if(next<0||next>max)return;
    s[key]=next;hap(8);ui();pulseOrb();
  });
});

/* Plan tabs */
document.querySelectorAll('.ptab').forEach(function(t){
  t.addEventListener('click',function(){
    var k=t.dataset.k;if(k===AK)return;AK=k;
    document.querySelectorAll('.ptab').forEach(function(x){x.classList.toggle('on',x===t);});
    hap(8);ui();pulseOrb();
  });
});

/* Pod placement — uses orb-zone as coordinate space */
function placePods(){
  var zone=document.getElementById('orbZone');
  var wrap=document.getElementById('orbWrap');
  var orb=document.getElementById('orb');
  if(!zone||!wrap||!orb)return;
  var zr=zone.getBoundingClientRect();
  var wr=wrap.getBoundingClientRect();
  var cx=wr.left-zr.left+wr.width/2;
  var cy=wr.top-zr.top+wr.height/2;
  var R=orb.offsetWidth/2+56;
  /* Voice top-left, Data top-right, SMS left-middle */
  [['pod-v',318],['pod-d',42],['pod-s',180]].forEach(function(x){
    var pod=document.getElementById(x[0]);if(!pod)return;
    var rad=(x[1]-90)*Math.PI/180;
    pod.style.left=(cx+R*Math.cos(rad))+'px';
    pod.style.top=(cy+R*Math.sin(rad))+'px';
    pod.style.transform='translate(-50%,-50%)';
  });
}
window.addEventListener('resize',placePods,{passive:true});
requestAnimationFrame(function(){requestAnimationFrame(placePods);});
ui();

/* Live count */
(function(){
  var el=document.getElementById('liveCount');if(!el)return;
  var n=2847+Math.floor(Math.random()*400);
  el.textContent=n.toLocaleString()+' today';
  setInterval(function(){n+=Math.floor(Math.random()*3)+1;el.textContent=n.toLocaleString()+' today';},25000);
})();

/* ── Number input ── */
var NETS=['071','077','078','073'];
var numDigits='',numOK=false,numVerifying=false,numDisp='';
var numEl=document.getElementById('numInput');
var numClear=document.getElementById('nclear');
var vtimer=null;

numEl.addEventListener('paste',function(e){
  e.preventDefault();
  var raw=(e.clipboardData||window.clipboardData).getData('text').replace(/\D/g,'');
  if(raw.startsWith('00263'))raw=raw.slice(5);
  else if(raw.startsWith('0263'))raw=raw.slice(4);
  else if(raw.startsWith('263')&&raw.length>9)raw=raw.slice(3);
  if(raw.startsWith('0'))raw=raw.slice(1);
  this.value=raw.slice(0,9);
  this.dispatchEvent(new Event('input',{bubbles:true}));
});

numEl.addEventListener('input',function(){
  var raw=this.value.replace(/\D/g,'');
  if(raw.startsWith('00263'))raw=raw.slice(5);
  else if(raw.startsWith('0263'))raw=raw.slice(4);
  else if(raw.startsWith('263')&&raw.length>9)raw=raw.slice(3);
  if(raw.startsWith('0'))raw=raw.slice(1);
  raw=raw.slice(0,9);
  if(this.value!==raw)this.value=raw;
  numDigits=raw;
  numClear.classList.toggle('show',raw.length>0);
  if(numOK||numVerifying)resetV();
  netTag();
  clearTimeout(vtimer);
  if(raw.length===9&&NETS.some(function(p){return('0'+raw).startsWith(p);}))
    vtimer=setTimeout(doVerify,600);
});
numEl.addEventListener('focus',function(){if(!numOK)document.getElementById('ncard').classList.add('foc');});
numEl.addEventListener('blur',function(){if(!numOK)document.getElementById('ncard').classList.remove('foc');});
numClear.addEventListener('click',function(){
  numEl.value='';numDigits='';numClear.classList.remove('show');
  resetV();netTag();clearTimeout(vtimer);numEl.focus();
});

function netTag(){
  var d=numDigits,n0='0'+d;
  var isE=NETS.some(function(p){return n0.startsWith(p);});
  var is07=n0.startsWith('07')&&d.length>=2;
  var tag=document.getElementById('ntag'),lbl=document.getElementById('ntag-lbl');
  if(!d.length){tag.className='ntag';lbl.textContent='Enter your Econet number (077, 078, 073, 071)';}
  else if(is07&&!isE){tag.className='ntag err';lbl.textContent='✕ Not Econet — use 077, 078, 073 or 071';}
  else if(isE&&d.length<9){tag.className='ntag';lbl.textContent='📶 Econet · '+d.length+'/9 digits';}
  else if(isE&&d.length===9){tag.className='ntag';lbl.textContent='Ready to verify…';}
  else{tag.className='ntag';lbl.textContent=d.length+'/9';}
}

function doVerify(){
  if(numDigits.length!==9||numOK||numVerifying)return;
  var m='0'+numDigits;
  if(!NETS.some(function(p){return m.startsWith(p);}))return;
  numVerifying=true;
  document.getElementById('vrow').classList.add('show');
  document.getElementById('vspin').style.display='block';
  document.getElementById('vok').classList.remove('show');
  document.getElementById('vtxt').classList.add('show');
  document.getElementById('ncard').className='ncard foc';
  var done=false;
  function ok(){if(done)return;done=true;verOK(m);}
  var to=setTimeout(ok,2000);
  try{
    if(typeof EcoCashAPI!=='undefined'){
      EcoCashAPI.validateSubscriber(m).then(function(){clearTimeout(to);ok();}).catch(function(){clearTimeout(to);ok();});
    }else{clearTimeout(to);ok();}
  }catch(e){clearTimeout(to);ok();}
}

function verOK(msisdn){
  numOK=true;numVerifying=false;
  numDisp='+263'+msisdn.replace(/^0/,'');
  document.getElementById('vspin').style.display='none';
  document.getElementById('vok').classList.add('show');
  document.getElementById('vtxt').classList.remove('show');
  document.getElementById('ncard').className='ncard ok';
  document.getElementById('ntag').className='ntag ok';
  document.getElementById('ntag-lbl').textContent='✓ Econet number verified';
  document.getElementById('payBtn').disabled=false;
  document.getElementById('payTitle').textContent='Pay USD '+pr(AK).toFixed(2);
  hap([10,50,10]);
}

function resetV(){
  numOK=false;numVerifying=false;numDisp='';
  document.getElementById('vrow').classList.remove('show');
  document.getElementById('vok').classList.remove('show');
  document.getElementById('ncard').className='ncard';
  document.getElementById('payBtn').disabled=true;
  document.getElementById('payTitle').textContent='Verify number first';
}

/* Pay */
document.getElementById('payBtn').addEventListener('click',function(){
  if(!numOK)return;
  var k=AK,s=ST[k],p=PLANS[k];
  sessionStorage.removeItem('ecoTxn');sessionStorage.removeItem('ecoCorrelator');
  sessionStorage.setItem('selectedPlan',JSON.stringify({duration:p.l,voice:s.v,sms:s.s,data:s.d,amount:pr(k).toFixed(2)}));
  sessionStorage.setItem('ecoRecipient',JSON.stringify({raw:'0'+numDigits,display:numDisp}));
  hap([10,50,10]);
  document.getElementById('curtain').classList.add('show');
  setTimeout(function(){window.location.href='login.html';},900);
});

/* Ripple */
document.querySelectorAll('.ptab,.pbtn').forEach(function(b){
  b.addEventListener('pointerdown',function(e){
    var r=b.getBoundingClientRect(),sz=Math.max(r.width,r.height)*2;
    var rip=document.createElement('span');rip.className='rip';
    rip.style.cssText='width:'+sz+'px;height:'+sz+'px;left:'+(e.clientX-r.left-sz/2)+'px;top:'+(e.clientY-r.top-sz/2)+'px';
    b.appendChild(rip);rip.addEventListener('animationend',function(){rip.remove();});
  },{passive:true});
});
if('serviceWorker'in navigator)window.addEventListener('load',function(){navigator.serviceWorker.register('/sw.js').catch(function(){});});
</script>
</body>
</html>
