<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=no,viewport-fit=cover,interactive-widget=resizes-content"/>
<meta name="theme-color" content="#0D1B2A"/>
<meta name="mobile-web-app-capable" content="yes"/>
<meta name="apple-mobile-web-app-capable" content="yes"/>
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent"/>
<meta name="apple-mobile-web-app-title" content="EcoCash Mix"/>
<title>EcoCash Mix</title>
<link rel="icon" href="assets/econet.png">
<link rel="apple-touch-icon" href="assets/econet.png">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Inter:ital,wght@0,400;0,500;0,600;0,700;0,800;1,400&family=JetBrains+Mono:wght@500;600;700&display=swap" rel="stylesheet">
<style>
*{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent}
input[type=range]{-webkit-user-select:none!important;user-select:none!important;touch-action:none}
input:not([type=range]){-webkit-user-select:text!important;user-select:text!important}
button,div,span,label{-webkit-user-select:none;user-select:none}

:root{
  /* ── SURFACES ── deeper blacks for real contrast */
  --bg:#080F18;          /* near-black page background */
  --s1:#0E1C2C;          /* card surface */
  --s2:#152438;          /* input / chip background */
  --s3:#1C2E46;          /* pressed / active state */
  --s4:#243652;          /* elevated surface */

  /* ── INK ── warm white reads, not cold blue-white */
  --ink1:#F2F6FC;        /* primary text */
  --ink2:#A8C0D8;        /* secondary — clearly readable */
  --ink3:#6A8BA8;        /* tertiary — visible hints */

  /* ── BORDERS ── slightly higher contrast than before */
  --line:#1E3450;
  --line2:#142030;

  /* ── ECONET GREEN — PRIMARY ── use at full strength */
  --grn:#00B050;
  --grn-d:#00D060;       /* lighter for on-dark text legibility */
  --grn-a:rgba(0,176,80,.22);  /* tint backgrounds — higher opacity */
  --grn-b:rgba(0,176,80,.12);
  --grn-c:rgba(0,176,80,.06);
  --on-grn:#001A08;

  /* ── ECOCASH BLUE — PAYMENT ── */
  --blu:#1877F2;          /* brighter blue — visible on dark */
  --blu-d:#4899FF;        /* lighter variant */
  --blu-a:rgba(24,119,242,.22);
  --on-blu:#ffffff;

  /* ── SEMANTIC ── */
  --err:#FF6B80;
  --gold:#FFB020;

  /* ── TYPE ── */
  --f:'Inter',system-ui,-apple-system,sans-serif;
  --fm:'JetBrains Mono','Roboto Mono',monospace;

  /* ── RADIUS ── */
  --r8:8px;--r12:12px;--r16:16px;--r20:20px;--rp:999px;

  /* ── MOTION ── */
  --ease:cubic-bezier(.22,1,.36,1);--spring:cubic-bezier(.34,1.56,.64,1);

  /* ── STATUS BAR (set by JS) ── */
  --sb:0px;
}

@keyframes spin   {to{transform:rotate(360deg)}}
@keyframes orbRot {to{transform:rotate(360deg)}}
@keyframes pgIn   {from{opacity:0;transform:translateY(10px)}to{opacity:1;transform:none}}
@keyframes fadeUp {from{opacity:0;transform:translateY(6px)}to{opacity:1;transform:none}}
@keyframes rip    {to{transform:scale(2.8);opacity:0}}
@keyframes orbPop {0%,100%{transform:scale(1)}35%{transform:scale(.93)}70%{transform:scale(1.04)}}
@keyframes orbIn  {from{transform:scale(.82);opacity:0}to{transform:scale(1);opacity:1}}
@keyframes pulse  {0%,100%{opacity:1}50%{opacity:.55}}

/* ── FULLSCREEN BASE ── */
html{
  width:100%;height:100%;
  /* Lock the outer viewport — nothing should ever scroll html/body */
  overflow:hidden;
  /* Support notch/punch-hole devices */
  background:#0D1B2A;
}
body{
  width:100%;
  /* 100dvh = dynamic viewport height — adjusts with browser chrome on Android */
  height:100dvh;
  font-family:var(--f);
  background:var(--bg);
  color:var(--ink1);
  -webkit-font-smoothing:antialiased;
  overflow:hidden;
  /* Prevent pull-to-refresh which breaks fullscreen feel */
  overscroll-behavior:none;
  /* Safe areas for notch, punch-hole, nav bar */
  padding-top:env(safe-area-inset-top);
  padding-bottom:env(safe-area-inset-bottom);
  padding-left:env(safe-area-inset-left);
  padding-right:env(safe-area-inset-right);
}

/* ── CURTAIN ── */
.curtain{
  position:fixed;inset:0;z-index:9999;
  background:var(--bg);opacity:0;pointer-events:none;
  transition:opacity .26s;
  display:flex;flex-direction:column;align-items:center;justify-content:center;gap:16px;
}
.curtain.show{opacity:1;pointer-events:auto}
.c-logo{height:30px;object-fit:contain}
.c-spin{
  width:22px;height:22px;
  border:2.5px solid var(--line);border-top-color:var(--grn);
  border-radius:50%;animation:spin .7s linear infinite;
}
.c-lbl{font-size:12px;font-weight:500;color:var(--ink3);letter-spacing:.3px}

/* ── APP SHELL ── */
.app{
  display:flex;flex-direction:column;
  width:100%;
  /* Use the visual viewport height tracked by JS, fall back to 100dvh */
  height:calc(var(--vvh,100dvh) - env(safe-area-inset-top) - env(safe-area-inset-bottom));
  overflow:hidden;
  animation:pgIn .28s var(--ease) both;
}

/* ── TOPBAR ── */
.topbar{
  flex-shrink:0;
  /* --sb = status bar height (punch-hole/notch compensation set by JS) */
  padding:calc(var(--sb) + 12px) 16px 10px;
  display:flex;align-items:center;justify-content:space-between;
  background:var(--bg);
}
.tb-logo{height:26px;object-fit:contain}
.tb-right{display:flex;align-items:center;gap:10px}
.tb-repurchase{
  display:none;align-items:center;gap:7px;
  background:var(--grn-a);border:1px solid rgba(0,176,80,.28);
  border-radius:var(--rp);padding:6px 12px;
  cursor:pointer;touch-action:manipulation;outline:none;transition:background .13s;
}
.tb-repurchase.show{display:flex}
.tb-repurchase:active{background:rgba(0,176,80,.22)}
.tb-rep-ic{color:var(--grn);display:flex}
.tb-rep-label{font-size:10px;font-weight:600;color:var(--grn)}
.tb-rep-price{font-family:var(--fm);font-size:13px;font-weight:700;color:var(--grn)}
.tb-total{text-align:right;display:none}
.tb-total.show{display:block}
.tb-total-lbl{font-size:9px;font-weight:600;letter-spacing:.8px;text-transform:uppercase;color:var(--ink2)}
.tb-total-val{font-family:var(--fm);font-size:19px;font-weight:700;color:var(--grn);letter-spacing:-.02em;line-height:1}

/* ── SCROLL ── */
.scroll{
  flex:1;min-height:0;
  overflow-y:auto;overflow-x:hidden;
  scrollbar-width:none;
  overscroll-behavior-y:contain;
  /* bottom pad clears the pay-bar height (~76px) */
  padding:0 12px max(84px,76px);
}
.scroll::-webkit-scrollbar{display:none}

/* ── CARD ── */
.card{
  background:var(--s1);
  border:1px solid var(--line);
  /* Subtle green left accent — immediately signals brand */
  border-left:3px solid var(--grn);
  border-radius:var(--r20);
  overflow:visible;
  display:flex;flex-direction:column;align-items:stretch;
  margin-top:4px;
}

/* ── PHASE 1: NUMBER ── */
.phase-num{padding:18px 16px 20px}
.ph-title{font-size:22px;font-weight:800;letter-spacing:-.4px;color:var(--ink1);line-height:1.15}
.ph-title i{font-style:italic;color:var(--grn)}
.ph-sub{font-size:11px;font-weight:500;color:var(--ink3);margin-top:4px}

/* Number field */
.num-field{
  display:flex;align-items:center;
  background:var(--s2);
  border:1.5px solid var(--line);
  border-radius:var(--r16);overflow:hidden;
  transition:border-color .18s,box-shadow .18s;
  min-height:58px;
  margin-top:14px;
}
.num-field.foc{border-color:rgba(0,176,80,.55);box-shadow:0 0 0 3px rgba(0,176,80,.1)}
.num-field.ok {border-color:rgba(0,176,80,.55);box-shadow:0 0 0 3px rgba(0,176,80,.08)}
.num-field.err{border-color:rgba(224,92,110,.55);box-shadow:0 0 0 3px rgba(224,92,110,.1)}
.num-prefix{
  display:flex;align-items:center;gap:7px;
  padding:0 12px 0 14px;
  border-right:1px solid var(--line);
  height:58px;flex-shrink:0;
}
.num-flag{font-size:19px;line-height:1}
.num-code{font-family:var(--fm);font-size:14px;font-weight:600;color:var(--ink3)}
#numInput{
  flex:1;min-width:0;border:none;outline:none;
  background:transparent!important;
  font-family:var(--fm);font-size:22px;font-weight:700;color:var(--ink1);
  padding:0 0 0 12px;height:58px;
  letter-spacing:.06em;caret-color:var(--grn);
  -webkit-user-select:text!important;user-select:text!important;
  -webkit-text-fill-color:var(--ink1)!important;
  -webkit-appearance:none;appearance:none;
}
#numInput::placeholder{color:var(--ink3);font-size:16px;font-weight:500;letter-spacing:0}
#numInput:-webkit-autofill{
  -webkit-box-shadow:0 0 0 1000px var(--s2) inset!important;
  -webkit-text-fill-color:var(--ink1)!important;
}
/* Clear button — Material style: circle icon button */
.num-clear{
  display:none;
  width:44px;height:58px;
  border:none;background:transparent;
  cursor:pointer;
  align-items:center;justify-content:center;
  flex-shrink:0;touch-action:manipulation;
}
.num-clear.show{display:flex}
.num-clear:active{background:rgba(255,255,255,.05)}
/* Material "cancel" filled circle icon */
.num-clear svg{display:block}

/* Status row */
.num-status{
  display:flex;align-items:center;gap:6px;
  margin-top:7px;min-height:19px;padding:0 2px;
}
.ns-icon{width:14px;height:14px;flex-shrink:0;display:flex}
.ns-icon svg{width:14px;height:14px}
.ns-txt{font-size:11px;font-weight:500;color:var(--ink3);line-height:1.3}
.num-status.ok .ns-txt{color:var(--grn)}
.num-status.err .ns-txt{color:var(--err)}

.num-verify{display:none;align-items:center;gap:8px;margin-top:7px;padding:0 2px}
.num-verify.show{display:flex}
.vspin{
  width:14px;height:14px;
  border:2px solid var(--line);border-top-color:var(--grn);
  border-radius:50%;animation:spin .7s linear infinite;
  flex-shrink:0;display:none;
}
.num-verify.spinning .vspin{display:block}
.vok-wrap{display:none;align-items:center;gap:6px}
.num-verify.done .vok-wrap{display:flex}
.vok-ic{
  width:18px;height:18px;border-radius:50%;
  background:var(--grn);
  display:flex;align-items:center;justify-content:center;flex-shrink:0;
}
.vok-ic svg{width:10px;height:10px;display:block}
.vok-txt{font-size:11px;font-weight:600;color:var(--grn)}
.vtxt{font-size:11px;font-weight:500;color:var(--grn);display:none}
.num-verify.spinning .vtxt{display:block}

/* ── SEPARATOR ── */
.card-sep{height:1px;background:var(--line2);margin:0 16px;transition:opacity .3s}

/* ── PHASE 2: BUNDLE ── */
.phase-bundle{display:none;flex-direction:column;animation:fadeUp .32s var(--ease) both}
.phase-bundle.show{display:flex}

/*
  ── VALIDITY CHIPS ──
  Grid layout: two rows, chips fill available width evenly.
  No horizontal scroll — everything visible at once on any phone.
  5 chips: top row [Daily · 3 Days · Weekly], bottom row [2 Wks · Monthly]
  Using CSS grid repeat(3,1fr) + the last row centred via justify-content.
*/
.vrow{
  display:grid;
  grid-template-columns:repeat(3,1fr);
  gap:7px;
  padding:14px 16px 8px;
}
.vchip{
  display:flex;align-items:center;justify-content:center;
  flex-direction:column;gap:1px;
  padding:8px 6px;
  border-radius:var(--r12);
  background:var(--s2);border:1.5px solid var(--line);
  cursor:pointer;touch-action:manipulation;outline:none;
  transition:background .13s,border-color .13s,box-shadow .13s;
  position:relative;overflow:hidden;
  text-align:center;
}
.vchip:active{background:var(--s4)}
/* Selected: solid green fill — unmistakeable */
.vchip.on{
  background:var(--grn);
  border-color:var(--grn);
  box-shadow:0 2px 12px rgba(0,176,80,.35);
}
/* Unselected text: bright enough to read clearly */
.vc-name{font-size:11px;font-weight:600;color:var(--ink2);transition:color .13s;line-height:1.2;white-space:nowrap}
.vc-price{font-family:var(--fm);font-size:13px;font-weight:700;color:var(--ink1);transition:color .13s;line-height:1.2}
.vc-badge{
  display:inline-flex;align-items:center;justify-content:center;
  background:var(--gold);border-radius:var(--rp);
  padding:1px 6px;margin-top:2px;
  font-size:8px;font-weight:800;color:#000;
  letter-spacing:.3px;text-transform:uppercase;
  line-height:1.4;white-space:nowrap;
}
.vchip.on .vc-name{color:var(--on-grn);font-weight:700}
.vchip.on .vc-price{color:rgba(0,26,8,.75);font-weight:800}
.vchip.on .vc-badge{background:rgba(0,0,0,.3);color:#fff}

/* Last two chips (2 Wks + Monthly) span bottom row — centred in 3-col grid */
.vchip:nth-child(4){
  grid-column:1/2;
  /* shift right so the pair appears centred under 3 chips above */
  margin-left:calc(50% + 3.5px);
}
.vchip:nth-child(5){
  grid-column:2/4;
  margin-left:0;
}

/* ── ORB ── */
.orb-section{display:flex;justify-content:center;padding:12px 16px 4px}
.orb-wrap{
  position:relative;
  width:min(54vw,196px);height:min(54vw,196px);
  display:flex;align-items:center;justify-content:center;flex-shrink:0;
}
.orb-ring{
  position:absolute;inset:-14px;border-radius:50%;
  border:1px solid rgba(0,176,80,.12);
  animation:orbRot 22s linear infinite;
  will-change:transform;pointer-events:none;
}
.orb-ring::after{
  content:'';position:absolute;top:50%;left:-4px;
  width:8px;height:8px;border-radius:50%;
  background:var(--grn-d);box-shadow:0 0 12px 3px rgba(0,208,96,.8);
  transform:translateY(-50%);
}
.orb{
  width:100%;height:100%;border-radius:50%;
  background:
    radial-gradient(circle at 28% 25%,rgba(0,176,80,.12) 0%,transparent 48%),
    radial-gradient(circle at 72% 74%,rgba(0,102,204,.08) 0%,transparent 48%),
    radial-gradient(circle at 30% 26%,rgba(255,255,255,.055) 0%,transparent 42%),
    var(--s2);
  border:1px solid rgba(255,255,255,.06);
  box-shadow:
    0 0 0 2px rgba(0,176,80,.3),
    0 0 40px rgba(0,176,80,.14),
    0 14px 48px rgba(0,0,0,.7),
    inset 0 1px 0 rgba(255,255,255,.06);
  display:flex;flex-direction:column;align-items:center;justify-content:center;
  position:relative;overflow:hidden;
  animation:orbIn .4s var(--ease) both;
}
.orb.pop{animation:orbPop .28s var(--spring)}
.orb-plan{font-size:9px;font-weight:600;letter-spacing:1.2px;text-transform:uppercase;color:var(--ink3);margin-bottom:3px}
.orb-price-row{display:flex;align-items:flex-start;gap:2px}
.orb-cur{font-family:var(--fm);font-size:11px;font-weight:500;color:var(--ink3);margin-top:5px}
.orb-price{font-family:var(--fm);font-size:min(10vw,40px);font-weight:700;color:var(--ink1);line-height:1;letter-spacing:-.06em;font-feature-settings:"tnum"}
.orb-line{width:28px;height:1px;background:var(--line);margin:6px 0}
.orb-svcs{display:flex;flex-direction:column;gap:3px;align-items:center}
.orb-svc{display:flex;align-items:center;gap:7px;font-size:10px}
.orb-svc-name{color:var(--ink3);font-weight:500;min-width:28px}
.orb-svc-val{font-family:var(--fm);font-weight:700;color:var(--ink1);min-width:42px;text-align:right;font-feature-settings:"tnum"}

/* ── PRESETS ── */
.presets{padding:10px 16px 0;display:flex;flex-direction:column;gap:7px}
.preset-label{font-size:10px;font-weight:600;letter-spacing:.6px;text-transform:uppercase;color:var(--ink3);margin-bottom:2px}

.preset{
  display:flex;align-items:center;gap:10px;
  padding:12px 14px;border-radius:var(--r16);
  background:var(--s2);border:1.5px solid var(--line);
  cursor:pointer;touch-action:manipulation;outline:none;
  position:relative;overflow:hidden;
  transition:border-color .15s,background .15s,box-shadow .15s;
}
.preset:active{background:var(--s3)}
.preset.on{
  background:var(--grn-a);
  border-color:rgba(0,176,80,.7);
  box-shadow:0 0 0 1px rgba(0,176,80,.25),0 4px 16px rgba(0,176,80,.12);
}
.preset-tick{
  width:22px;height:22px;border-radius:50%;
  background:var(--s3);border:1.5px solid var(--line);
  display:flex;align-items:center;justify-content:center;flex-shrink:0;
  transition:background .15s,border-color .15s;
}
.preset.on .preset-tick{background:var(--grn);border-color:var(--grn)}
.preset-tick svg{width:11px;height:11px;display:block}
.preset-left{flex:1;min-width:0;text-align:left}
.preset-name{font-size:15px;font-weight:700;color:var(--ink1);transition:color .15s;letter-spacing:-.2px}
.preset.on .preset-name{color:var(--grn)}
.preset-desc{font-size:11px;color:var(--ink2);margin-top:2px;font-weight:500}
.preset-tag{
  display:inline-block;margin-top:5px;
  font-size:9px;font-weight:700;letter-spacing:.4px;text-transform:uppercase;
  color:var(--gold);background:rgba(245,166,35,.13);
  border-radius:var(--rp);padding:2px 7px;
}
.preset-right{text-align:right;flex-shrink:0}
.preset-price{
  font-family:var(--fm);font-size:20px;font-weight:700;
  color:var(--ink1);letter-spacing:-.03em;font-feature-settings:"tnum";
  transition:color .15s;
}
.preset.on .preset-price{color:var(--grn)}
.preset-validity{font-size:10px;color:var(--ink3);margin-top:1px;font-weight:600;text-transform:uppercase;letter-spacing:.5px}

/* Social icons on presets */
.preset-socials{display:flex;align-items:center;gap:5px;margin-top:7px}
.psoc{
  width:20px;height:20px;border-radius:6px;
  display:flex;align-items:center;justify-content:center;flex-shrink:0;
}
.psoc-wa{background:#25D366}
.psoc-ig{background:linear-gradient(135deg,#f09433,#e6683c 30%,#dc2743 55%,#cc2366 78%,#bc1888)}
.psoc-tt{background:#010101}
.psoc svg{display:block}

/*
  ── CUSTOMISE TOGGLE ──
  Modern frosted pill — not a plain border rectangle.
  Two-tone: dim icon left, label, chevron right.
  Gradient border via box-shadow; background tints on open.
*/
.customise-toggle{
  display:flex;align-items:center;gap:8px;
  margin:10px 16px 0;padding:11px 14px;
  border-radius:var(--r16);
  background:var(--s2);
  border:none;
  box-shadow:0 0 0 1.5px var(--line),0 2px 8px rgba(0,0,0,.25);
  cursor:pointer;touch-action:manipulation;outline:none;
  font-size:12px;font-weight:600;color:var(--ink1);
  transition:box-shadow .18s,background .15s,color .15s;
  position:relative;overflow:hidden;
  width:calc(100% - 32px);
  left:0;
}
.customise-toggle:active{background:var(--s3)}
.customise-toggle.open{
  background:var(--grn-a);
  box-shadow:0 0 0 1.5px rgba(0,176,80,.45),0 2px 12px rgba(0,176,80,.1);
  color:var(--grn);
}
.ct-tune{width:18px;height:18px;display:flex;align-items:center;justify-content:center;flex-shrink:0}
.ct-tune svg{display:block}
.ct-lbl{flex:1;text-align:left}
.ct-chevron{
  width:20px;height:20px;
  background:var(--s3);border-radius:6px;
  display:flex;align-items:center;justify-content:center;flex-shrink:0;
  transition:transform .22s var(--ease),background .15s;
}
.customise-toggle.open .ct-chevron{
  background:rgba(0,176,80,.2);
  transform:rotate(180deg);
}
.ct-chevron svg{display:block}

/* ── SLIDERS ── */
.sliders{
  max-height:0;opacity:0;overflow:hidden;
  transition:max-height .3s var(--ease),opacity .25s;
  padding:0 16px;display:flex;flex-direction:column;
}
.sliders.open{max-height:400px;opacity:1;padding:8px 16px 0}
.sl-item{display:flex;flex-direction:column;gap:7px;padding:10px 0}
.sl-item+.sl-item{border-top:1px solid var(--line2)}
.sl-header{display:flex;align-items:center;justify-content:space-between}
.sl-name{font-size:12px;font-weight:600;color:var(--ink2)}
.sl-val{font-family:var(--fm);font-size:13px;font-weight:700;color:var(--ink1)}
.sl-track{position:relative;height:28px;display:flex;align-items:center}
.sl-bg{position:absolute;left:0;right:0;height:5px;border-radius:3px;background:var(--line2)}
.sl-fill{position:absolute;left:0;height:5px;border-radius:3px;background:var(--grn);width:0}
.sl-range{
  position:relative;z-index:2;-webkit-appearance:none;appearance:none;
  width:100%;height:28px;background:transparent;
  outline:none;cursor:pointer;margin:0;padding:0;border:none;
}
.sl-range::-webkit-slider-thumb{
  -webkit-appearance:none;appearance:none;
  width:22px;height:22px;border-radius:50%;
  background:var(--grn);border:2.5px solid var(--bg);
  box-shadow:0 2px 8px rgba(0,0,0,.5),0 0 0 1px rgba(0,176,80,.25);
  cursor:pointer;transition:transform .1s var(--spring);
}
.sl-range:active::-webkit-slider-thumb{transform:scale(1.22)}
.sl-range::-moz-range-thumb{
  width:22px;height:22px;border-radius:50%;
  background:var(--grn);border:2.5px solid var(--bg);cursor:pointer;
}
.sl-range::-moz-range-track{height:5px;background:transparent}
.sl-range:focus{outline:none}

.card-pad{height:18px}

/* ── PAY BAR ── */
.pay-bar{
  flex-shrink:0;
  padding:10px 12px max(16px,env(safe-area-inset-bottom));
  background:var(--bg);border-top:1px solid var(--line2);
}
.pay-btn{
  width:100%;min-height:54px;padding:0 16px;border:none;border-radius:var(--r20);
  cursor:pointer;touch-action:manipulation;
  background:var(--blu);
  display:flex;align-items:center;justify-content:space-between;
  box-shadow:0 4px 24px rgba(24,119,242,.45),0 1px 4px rgba(0,0,0,.35);
  position:relative;overflow:hidden;outline:none;
  transition:transform .12s var(--spring),opacity .2s;
}
.pay-btn:active{transform:scale(.97)}
.pay-btn:disabled{
  opacity:.32;box-shadow:none;cursor:default;transform:none;
  background:var(--s2);border:1px solid var(--line);
}
.pay-left{display:flex;align-items:center;gap:11px;pointer-events:none}
.pay-icon{
  width:34px;height:34px;border-radius:10px;
  background:rgba(255,255,255,.13);
  display:flex;align-items:center;justify-content:center;flex-shrink:0;
}
.pay-icon svg{display:block}
.pay-title{font-size:14px;font-weight:700;color:#fff;line-height:1.2}
.pay-sub{font-size:9px;color:rgba(255,255,255,.48);margin-top:1px}
.pay-btn:disabled .pay-title{color:var(--ink2)}
.pay-btn:disabled .pay-sub{color:var(--ink3)}
.pay-right{pointer-events:none;text-align:right}
.pay-right-lbl{font-size:8px;font-weight:600;text-transform:uppercase;letter-spacing:.7px;color:rgba(255,255,255,.45);margin-bottom:1px}
.pay-right-amt{
  font-family:var(--fm);font-size:21px;font-weight:700;
  /* Econet green amount on EcoCash blue — dual brand signal */
  color:var(--grn);
  letter-spacing:-.03em;font-feature-settings:"tnum";
}
.pay-btn:disabled .pay-right-lbl{color:var(--ink3)}
.pay-btn:disabled .pay-right-amt{color:var(--ink2)}

/* Ripple */
.rip{
  position:absolute;border-radius:50%;pointer-events:none;
  background:rgba(255,255,255,.08);transform:scale(0);
  animation:rip .5s ease forwards;
}
</style>

    </div>
  </div>

  <!-- Pay bar -->
  <div class="pay-bar">
    <button class="pay-btn" id="payBtn" disabled>
      <div class="pay-left">
        <div class="pay-icon">
          <!-- Material "credit_card" filled -->
          <svg width="18" height="18" viewBox="0 0 24 24" fill="rgba(255,255,255,.7)">
            <path d="M20 4H4c-1.11 0-2 .89-2 2v12c0 1.11.89 2 2 2h16c1.11 0 2-.89 2-2V6c0-1.11-.89-2-2-2zm0 14H4v-6h16v6zm0-10H4V6h16v2z"/>
          </svg>
        </div>
        <div>
          <div class="pay-title" id="payTitle">Enter number first</div>
          <div class="pay-sub">EcoCash · Secure · Instant</div>
        </div>
      </div>
      <div class="pay-right">
        <div class="pay-right-lbl">Total</div>
        <div class="pay-right-amt" id="payAmt">—</div>
      </div>
    </button>
  </div>

</div>

<script>
'use strict';
/* Fullscreen: track real viewport height (handles Android soft keyboard) */
(function(){
  function setVH(){
    var vp=window.visualViewport;
    var h=vp?(vp.height+vp.offsetTop):window.innerHeight;
    document.documentElement.style.setProperty('--vvh',h+'px');
  }
  setVH();
  if(window.visualViewport){
    window.visualViewport.addEventListener('resize',setVH,{passive:true});
    window.visualViewport.addEventListener('scroll',setVH,{passive:true});
  }else{window.addEventListener('resize',setVH,{passive:true});}
  /* Status bar height for notch / punch-hole */
  function setSB(){
    var h=0;
    if(window.screen&&screen.availTop>0)h=screen.availTop;
    else if(window.visualViewport&&visualViewport.offsetTop>0)h=visualViewport.offsetTop;
    document.documentElement.style.setProperty('--sb',h+'px');
  }
  setSB();window.addEventListener('resize',setSB,{passive:true});
})();
function hap(t){if(!navigator.vibrate)return;try{navigator.vibrate(t);}catch(e){}}

/* Plans */
var PLANS={
  daily:   {l:'Daily',   mV:20,  mS:25,  mD:3,  p:0.60,sv:5, ss:5, sd:1},
  '3days': {l:'3 Days',  mV:50,  mS:75,  mD:8,  p:1.40,sv:10,ss:25,sd:2},
  weekly:  {l:'Weekly',  mV:120, mS:200, mD:20, p:2.80,sv:20,ss:50,sd:5},
  '2weeks':{l:'2 Wks',  mV:250, mS:450, mD:45, p:5.20,sv:50,ss:50,sd:5},
  monthly: {l:'Monthly', mV:600, mS:1000,mD:100,p:9.90,sv:50,ss:100,sd:10},
};
var ST={};Object.keys(PLANS).forEach(function(k){var p=PLANS[k];ST[k]={v:p.mV,s:p.mS,d:p.mD};});
var AK='weekly',activePreset='balanced';
var PRESETS={
  light:   {plan:'daily',  v:20, d:3,  s:25},
  balanced:{plan:'weekly', v:120,d:20, s:200},
  heavy:   {plan:'monthly',v:600,d:100,s:1000},
};
function pr(k){var p=PLANS[k],s=ST[k];return Math.round(((s.v/p.mV+s.s/p.mS+s.d/p.mD)/3)*p.p*100)/100;}

/* Repurchase */
(function(){
  try{
    var last=JSON.parse(localStorage.getItem('eco_last_bundle')||'null');
    if(!last||!last.amount)return;
    var btn=document.getElementById('tbRepurchase');
    document.getElementById('tbRepLabel').textContent='Buy again · '+last.duration;
    document.getElementById('tbRepPrice').textContent='$'+last.amount;
    btn.classList.add('show');btn.dataset.bundle=JSON.stringify(last);
  }catch(e){}
})();
function doRepurchase(){
  try{
    var btn=document.getElementById('tbRepurchase');
    var last=JSON.parse(btn.dataset.bundle||'null');if(!last)return;
    if(!numOK){document.getElementById('numInput').focus();return;}
    var k=last.planKey||'weekly';if(!PLANS[k])k='weekly';
    AK=k;var p=PLANS[k];ST[k]={v:last.voice||p.mV,s:last.sms||p.mS,d:last.data||p.mD};
    activePreset=last.preset||'balanced';highlightPreset(activePreset);ui();hap(8);
    setTimeout(function(){document.getElementById('payBtn').click();},180);
  }catch(e){}
}

var _pp=0;
function animP(to){
  var el=document.getElementById('cPrice');if(!el)return;
  var t0=performance.now(),fr=_pp,dur=180;
  (function tick(now){var t=Math.min((now-t0)/dur,1),e=1-Math.pow(1-t,3);el.textContent=(fr+(to-fr)*e).toFixed(2);if(t<1)requestAnimationFrame(tick);else el.textContent=to.toFixed(2);})(t0);
  _pp=to;
}
function setFill(id,pct){var el=document.getElementById(id);if(el)el.style.width=Math.max(0,Math.min(100,pct)).toFixed(1)+'%';}

function ui(){
  var k=AK,p=PLANS[k],s=ST[k],v=pr(k);
  animP(v);
  document.getElementById('cPlan').textContent=p.l+' Mix';
  document.getElementById('cV').textContent=s.v+' Min';
  document.getElementById('cD').textContent=s.d+' GB';
  document.getElementById('cS').textContent=s.s+' SMS';
  var slV=document.getElementById('slV'),slD=document.getElementById('slD'),slS=document.getElementById('slS');
  slV.min=0;slV.max=p.mV/p.sv;slV.value=s.v/p.sv;
  slD.min=0;slD.max=p.mD/p.sd;slD.value=s.d/p.sd;
  slS.min=0;slS.max=p.mS/p.ss;slS.value=s.s/p.ss;
  setFill('tfV',(s.v/p.mV)*100);setFill('tfD',(s.d/p.mD)*100);setFill('tfS',(s.s/p.mS)*100);
  document.getElementById('slVlbl').textContent=s.v+' Min';
  document.getElementById('slDlbl').textContent=s.d+' GB';
  document.getElementById('slSlbl').textContent=s.s+' SMS';
  var a='$'+v.toFixed(2);
  document.getElementById('payAmt').textContent=a;
  document.getElementById('totalPill').textContent=a;
  Object.keys(PLANS).forEach(function(k2){var el=document.getElementById('pp-'+k2);if(el)el.textContent='$'+pr(k2).toFixed(2);});
  updatePresetPrices();
  if(numOK)document.getElementById('payTitle').textContent='Pay USD '+v.toFixed(2);
}

function updatePresetPrices(){
  var defs={light:{plan:'daily',v:20,d:3,s:25},balanced:{plan:'weekly',v:120,d:20,s:200},heavy:{plan:'monthly',v:600,d:100,s:1000}};
  Object.keys(defs).forEach(function(pk){
    var def=defs[pk],p=PLANS[def.plan];
    var price=Math.round(((def.v/p.mV+def.s/p.mS+def.d/p.mD)/3)*p.p*100)/100;
    var pid=pk==='light'?'presetLightPrice':pk==='balanced'?'presetBalPrice':'presetHeavyPrice';
    var vid=pk==='light'?'presetLightV':pk==='balanced'?'presetBalV':'presetHeavyV';
    var pe=document.getElementById(pid),ve=document.getElementById(vid);
    if(pe)pe.textContent='$'+price.toFixed(2);if(ve)ve.textContent=p.l;
  });
}

function pulseOrb(){
  var o=document.getElementById('orb');if(!o)return;
  o.classList.remove('pop');void o.offsetWidth;o.classList.add('pop');
  setTimeout(function(){o.classList.remove('pop');},300);
}

function selectPreset(pk){
  var def=PRESETS[pk];if(!def)return;
  activePreset=pk;AK=def.plan;
  ST[AK]={v:def.v,d:def.d,s:def.s};
  highlightPreset(pk);highlightChip(AK);
  hap(8);ui();pulseOrb();
  var sliders=document.getElementById('sliders');
  if(sliders.classList.contains('open'))toggleCustomise();
}
function highlightPreset(pk){
  ['presetLight','presetBal','presetHeavy'].forEach(function(id){
    var el=document.getElementById(id);if(el)el.classList.toggle('on',el.dataset.preset===pk);
  });
}
function highlightChip(k){
  document.querySelectorAll('.vchip').forEach(function(c){c.classList.toggle('on',c.dataset.k===k);});
}

document.querySelectorAll('.vchip').forEach(function(t){
  t.addEventListener('click',function(){
    var k=t.dataset.k;if(k===AK)return;
    AK=k;var p=PLANS[k];ST[k]={v:p.mV,s:p.mS,d:p.mD};
    highlightChip(k);activePreset=null;highlightPreset('__none__');
    hap(8);ui();pulseOrb();
  });
});

var customiseOpen=false;
function toggleCustomise(){
  customiseOpen=!customiseOpen;
  var sl=document.getElementById('sliders');
  var tog=document.getElementById('customiseToggle');
  var lbl=document.getElementById('customiseLbl');
  sl.classList.toggle('open',customiseOpen);
  tog.classList.toggle('open',customiseOpen);
  lbl.textContent=customiseOpen?'Hide customise':'Customise bundle';
  /* Update icon fills to match state */
  var tuneSvg=tog.querySelector('.ct-tune svg');
  var chevSvg=tog.querySelector('.ct-chevron svg');
  if(tuneSvg)tuneSvg.setAttribute('fill',customiseOpen?'var(--grn)':'var(--ink3)');
  if(chevSvg)chevSvg.setAttribute('fill',customiseOpen?'var(--grn)':'var(--ink3)');
  if(customiseOpen)setTimeout(function(){sl.scrollIntoView({behavior:'smooth',block:'nearest'});},120);
}

(function(){
  function wire(slId,fillId,key){
    document.getElementById(slId).addEventListener('input',function(){
      var k=AK,p=PLANS[k],s=ST[k];
      var step={v:p.sv,d:p.sd,s:p.ss}[key];
      var max={v:p.mV,d:p.mD,s:p.mS}[key];
      s[key]=Math.max(0,Math.min(parseInt(this.value)*step,max));
      setFill(fillId,(s[key]/max)*100);
      activePreset=null;highlightPreset('__none__');
      hap(6);pulseOrb();ui();
    });
  }
  wire('slV','tfV','v');wire('slD','tfD','d');wire('slS','tfS','s');
})();

/* Number field */
var NETS=['071','077','078','073'];
var numDigits='',numOK=false,numVerifying=false,numDisp='';
var numEl=document.getElementById('numInput');
var numClearBtn=document.getElementById('numClearBtn');
var vtimer=null;

function setStatus(type,msg){
  var st=document.getElementById('numStatus'),txt=document.getElementById('numStatusTxt');
  var field=document.getElementById('numField'),icon=document.getElementById('nsIcon');
  st.className='num-status'+(type?' '+type:'');
  txt.textContent=msg;
  if(!numOK&&!numVerifying){
    if(type==='err')field.classList.add('err');else field.classList.remove('err');
  }
  /* Material filled icons per state */
  if(type==='ok'){
    icon.innerHTML='<svg viewBox="0 0 24 24" width="14" height="14" fill="var(--grn)"><path d="M12 2C6.48 2 2 6.48 2 12s4.48 10 10 10 10-4.48 10-10S17.52 2 12 2zm-2 15l-5-5 1.41-1.41L10 14.17l7.59-7.59L19 8l-9 9z"/></svg>';
  }else if(type==='err'){
    icon.innerHTML='<svg viewBox="0 0 24 24" width="14" height="14" fill="var(--err)"><path d="M12 2C6.48 2 2 6.48 2 12s4.48 10 10 10 10-4.48 10-10S17.52 2 12 2zm1 15h-2v-2h2v2zm0-4h-2V7h2v6z"/></svg>';
  }else{
    icon.innerHTML='<svg viewBox="0 0 24 24" width="14" height="14" fill="var(--ink3)"><path d="M1 9l2 2c4.97-4.97 13.03-4.97 18 0l2-2C16.93 2.93 7.08 2.93 1 9zm8 8l3 3 3-3c-1.65-1.66-4.34-1.66-6 0zm-4-4 2 2c2.76-2.76 7.24-2.76 10 0l2-2C15.14 9.14 8.87 9.14 5 13z"/></svg>';
  }
}

numEl.addEventListener('focus',function(){
  var f=document.getElementById('numField');
  if(!numOK){f.classList.add('foc');f.classList.remove('err');}
  setTimeout(function(){numEl.scrollIntoView({behavior:'smooth',block:'center'});},200);
});
numEl.addEventListener('blur',function(){
  if(!numOK&&!numVerifying)document.getElementById('numField').classList.remove('foc');
});
numEl.addEventListener('paste',function(e){
  e.preventDefault();
  var raw=(e.clipboardData||window.clipboardData).getData('text').replace(/\D/g,'');
  if(raw.startsWith('00263'))raw=raw.slice(5);
  else if(raw.startsWith('0263'))raw=raw.slice(4);
  else if(raw.startsWith('263')&&raw.length>9)raw=raw.slice(3);
  if(raw.startsWith('0'))raw=raw.slice(1);
  this.value=raw.slice(0,9);this.dispatchEvent(new Event('input',{bubbles:true}));
});
numEl.addEventListener('input',function(){
  var raw=this.value.replace(/\D/g,'');
  if(raw.startsWith('00263'))raw=raw.slice(5);
  else if(raw.startsWith('0263'))raw=raw.slice(4);
  else if(raw.startsWith('263')&&raw.length>9)raw=raw.slice(3);
  if(raw.startsWith('0'))raw=raw.slice(1);
  raw=raw.slice(0,9);
  if(this.value!==raw)this.value=raw;
  numDigits=raw;
  numClearBtn.classList.toggle('show',raw.length>0);
  if(numOK||numVerifying)resetV();
  updateTag();clearTimeout(vtimer);
  if(raw.length===9&&NETS.some(function(p){return('0'+raw).startsWith(p);}))
    vtimer=setTimeout(doVerify,600);
});
numClearBtn.addEventListener('click',function(){
  numEl.value='';numDigits='';numClearBtn.classList.remove('show');
  resetV();updateTag();clearTimeout(vtimer);numEl.focus();
});

function updateTag(){
  var d=numDigits,n0='0'+d;
  var isE=NETS.some(function(p){return n0.startsWith(p);});
  var firstNotSeven=d.length>=1&&d[0]!=='7';
  var is07notE=n0.startsWith('07')&&d.length>=2&&!isE;
  if(!d.length)setStatus('','Enter your Econet number (077 · 078 · 073 · 071)');
  else if(firstNotSeven)setStatus('err','Econet numbers start with 7 — try 077, 078, 073 or 071');
  else if(is07notE)setStatus('err','Not an Econet number — use 077, 078, 073 or 071');
  else if(isE&&d.length<9)setStatus('','Econet · '+d.length+'/9 digits');
  else if(isE&&d.length===9)setStatus('','Ready to verify…');
  else setStatus('',d.length+'/9');
}

function doVerify(){
  if(numDigits.length!==9||numOK||numVerifying)return;
  var m='0'+numDigits;
  if(!NETS.some(function(p){return m.startsWith(p);}))return;
  numVerifying=true;
  document.getElementById('numStatus').style.display='none';
  document.getElementById('numVerify').className='num-verify show spinning';
  document.getElementById('numField').className='num-field foc';
  var done=false;
  function ok(){if(done)return;done=true;verOK(m);}
  var to=setTimeout(ok,3000);
  try{if(typeof EcoCashAPI!=='undefined'){EcoCashAPI.validateSubscriber(m).then(function(){clearTimeout(to);ok();}).catch(function(){clearTimeout(to);ok();});}else{clearTimeout(to);ok();}}catch(e){clearTimeout(to);ok();}
}

function verOK(msisdn){
  numOK=true;numVerifying=false;
  numDisp='+263'+msisdn.replace(/^0/,'');
  document.getElementById('numVerify').className='num-verify';
  document.getElementById('numStatus').style.display='';
  document.getElementById('numField').className='num-field ok';
  setStatus('ok','✓ '+numDisp+' verified');
  hap([10,50,10]);
  revealBundle();
}

function revealBundle(){
  document.getElementById('cardSep').style.opacity='1';
  document.getElementById('phaseBundle').classList.add('show');
  document.getElementById('tbTotal').classList.add('show');
  document.getElementById('payBtn').disabled=false;
  selectPreset('balanced');
  setTimeout(function(){document.getElementById('phaseBundle').scrollIntoView({behavior:'smooth',block:'start'});},100);
}

function resetV(){
  numOK=false;numVerifying=false;numDisp='';
  document.getElementById('numVerify').className='num-verify';
  document.getElementById('numStatus').style.display='';
  document.getElementById('numField').className='num-field';
  document.getElementById('phaseBundle').classList.remove('show');
  document.getElementById('cardSep').style.opacity='0';
  document.getElementById('tbTotal').classList.remove('show');
  document.getElementById('payBtn').disabled=true;
  document.getElementById('payTitle').textContent='Enter number first';
  document.getElementById('payAmt').textContent='—';
}

document.getElementById('payBtn').addEventListener('click',function(){
  if(!numOK)return;
  var k=AK,s=ST[k],p=PLANS[k],v=pr(k);
  sessionStorage.removeItem('ecoTxn');sessionStorage.removeItem('ecoCorrelator');
  sessionStorage.setItem('selectedPlan',JSON.stringify({duration:p.l,voice:s.v,sms:s.s,data:s.d,amount:v.toFixed(2),planKey:k,preset:activePreset}));
  sessionStorage.setItem('ecoRecipient',JSON.stringify({raw:'0'+numDigits,display:numDisp}));
  hap([10,50,10]);
  document.getElementById('curtain').classList.add('show');
  setTimeout(function(){window.location.href='login.html';},900);
});

document.querySelectorAll('.vchip,.pay-btn,.preset').forEach(function(b){
  b.addEventListener('pointerdown',function(e){
    var r=b.getBoundingClientRect(),sz=Math.max(r.width,r.height)*2;
    var rip=document.createElement('span');rip.className='rip';
    rip.style.cssText='width:'+sz+'px;height:'+sz+'px;left:'+(e.clientX-r.left-sz/2)+'px;top:'+(e.clientY-r.top-sz/2)+'px;position:absolute;';
    b.appendChild(rip);rip.addEventListener('animationend',function(){rip.remove();});
  },{passive:true});
});

updatePresetPrices();
if('serviceWorker'in navigator)window.addEventListener('load',function(){navigator.serviceWorker.register('/sw.js').catch(function(){});});
</script>
</body>
</html>
